name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: agent-bom version
      description: "Run `agent-bom --version` or `pip show agent-bom`"
      placeholder: "e.g. 0.59.1"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - pip
        - Docker
        - GitHub Action
        - From source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `agent-bom scan --enrich`, it..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Run `agent-bom scan ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any error messages or stack traces. **Redact any secrets or sensitive paths.**
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04, Windows 11"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.4"
