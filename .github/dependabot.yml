version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/ui"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/sdks/typescript"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
