version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/ui"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    ignore:
      # ui/package.json and ui/Dockerfile intentionally pin the supported UI
      # runtime to Node 24 LTS (`engines.node`: >=22 <25). Dependabot should
      # not keep opening Node 25/26 base-image PRs that CI is designed to
      # reject.
      - dependency-name: "node"
        versions: [">=25"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
    groups:
      next-stack:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/eslint-plugin-next"
      react-stack:
        patterns:
          - "react"
          - "react-dom"

  - package-ecosystem: "npm"
    directory: "/sdks/typescript"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
