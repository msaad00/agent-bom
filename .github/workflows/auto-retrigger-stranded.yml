name: Auto-Retrigger Stranded PRs

# Permanent fix for the recurring "approved PR frozen behind main" and
# "PR frozen after Update branch" patterns.
#
# Branch protection requires PR heads to include current main. When main moves,
# approved auto-merge PRs can sit behind base until someone clicks Update
# branch. If that update is performed by automation, the resulting commit can be
# authored by GITHUB_TOKEN; GitHub Actions intentionally does NOT trigger
# pull_request workflows from GITHUB_TOKEN-authored events (anti-loop guard), so
# the PR can then end up with missing or stale check-runs on the current head.
# Background: docs/operations/CI_RUNBOOK.md.
#
# This workflow polls regularly, runs immediately after main advances, and can
# be dispatched on demand. It first refreshes same-repo auto-merge PRs that are
# behind main, then retriggers any PR whose current head SHA is missing or has a
# stale required check.
#
# The refresh/retrigger token must be a dedicated GitHub App token or PAT.
# GITHUB_TOKEN-authored pushes and close/reopen events do not recursively
# trigger pull_request workflows, so falling back to GITHUB_TOKEN recreates the
# frozen-PR loop this workflow is meant to break.

on:
  push:
    branches: [main]
  schedule:
    # GitHub-hosted schedules are best-effort and can be delayed during busy
    # windows. Odd-minute slots avoid the most contended top-of-hour queue.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to refresh/retrigger immediately"
        required: false
        type: string
      min_age_minutes:
        description: "Minimum PR age before scheduled scans refresh/retrigger"
        required: false
        default: "3"
        type: string
      require_auto_merge:
        description: "Only refresh PRs with auto-merge enabled"
        required: false
        default: true
        type: boolean
      refresh_ready_prs:
        description: "Refresh approved auto-merge PRs that are behind main"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: auto-retrigger-stranded
  cancel-in-progress: false

jobs:
  scan:
    name: Scan and retrigger
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Find and retrigger stranded PRs
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
          AUTOMATION_SSH_SIGNING_KEY: ${{ secrets.AUTOMATION_SSH_SIGNING_KEY }}
          REQUIRED_CHECKS: "Lint and Type Check,Test (Python 3.11),Test (Python 3.13),Build Package,Security Scan,CodeQL,Test (Python 3.14)"
          MIN_AGE_MINUTES: ${{ inputs.min_age_minutes || '3' }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
          REQUIRE_AUTO_MERGE: ${{ github.event_name != 'workflow_dispatch' || inputs.require_auto_merge }}
          REFRESH_READY_PRS: ${{ github.event_name != 'workflow_dispatch' || inputs.refresh_ready_prs }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::AUTOMATION_GITHUB_TOKEN is not configured; skipping auto refresh/retrigger. GITHUB_TOKEN-authored events cannot start PR checks."
            exit 0
          fi

          if [ "${REFRESH_READY_PRS}" = "true" ]; then
            scripts/refresh_ready_prs.sh
          fi

          if [ -n "${PR_NUMBER}" ]; then
            echo "Manual retrigger requested for PR #${PR_NUMBER}."
            scripts/retrigger_stranded_pr.sh "${PR_NUMBER}"
            exit 0
          fi

          echo "Listing open PRs…"
          mapfile -t PRS < <(
            gh pr list \
              --state open \
              --limit 50 \
              --json number,headRefOid,updatedAt,isDraft \
              --jq '.[] | select(.isDraft == false) | "\(.number) \(.headRefOid) \(.updatedAt)"'
          )

          NOW_EPOCH="$(date -u +%s)"
          CHECKED=0
          RETRIGGERED=0

          for line in "${PRS[@]}"; do
            read -r PR SHA UPDATED <<< "$line"
            UPDATED_EPOCH="$(date -u -d "$UPDATED" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$UPDATED" +%s)"
            AGE_SECONDS=$(( NOW_EPOCH - UPDATED_EPOCH ))
            if [ "$AGE_SECONDS" -lt $(( 60 * MIN_AGE_MINUTES )) ]; then
              echo "PR #${PR}: too young (${AGE_SECONDS}s old), skipping."
              continue
            fi

            CHECKED=$(( CHECKED + 1 ))
            if [ -x scripts/retrigger_stranded_pr.sh ]; then
              if scripts/retrigger_stranded_pr.sh "$PR"; then
                RETRIGGERED=$(( RETRIGGERED + 1 ))
              else
                echo "PR #${PR}: retrigger script failed (continuing with next PR)."
              fi
            else
              echo "scripts/retrigger_stranded_pr.sh not executable on this checkout; skipping."
            fi
          done

          echo
          echo "Summary: ${CHECKED} eligible PR(s) checked, ${RETRIGGERED} retrigger command(s) completed."
