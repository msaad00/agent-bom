name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Bandit (Static Security Analysis)
        run: uv run bandit -r src/ --severity-level medium

      - name: pip-audit (Dependency Vulnerabilities)
        run: uv run pip-audit  # all vulns must be fixed; no ignores

      - name: OSV Scanner (declared dep ranges)
        run: |
          curl -fsSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v1.9.2/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --lockfile dashboard/requirements.txt
          # pyproject.toml is covered by pip-audit above (installs + scans the full dep tree)

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

  # 2. Linting + Type Checking
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src/

      - name: MyPy
        run: uv run mypy src/

  # 3. Tests
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra api --extra mcp-server

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=agent_bom --cov-report=term-missing --cov-fail-under=80 -m "not network"

  # 3b. Alpine/musl compatibility test
  # Runs the test suite inside an Alpine Linux container (musl libc) to catch
  # glibc-only assumptions in code, compiled extensions, or path handling.
  test-alpine:
    name: Test (Alpine/musl)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: python:3.12-alpine
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build deps (Alpine)
        run: |
          apk add --no-cache gcc musl-dev libffi-dev openssl-dev git

      - name: Install uv
        run: pip install uv --quiet

      - name: Install project dependencies
        run: uv sync --extra dev --extra api --extra mcp-server

      - name: Run tests (musl)
        run: uv run pytest tests/ -q --tb=short -m "not network" -x

  # 3c. PR Base Branch Guard — prevent stacked PRs targeting feature branches
  base-branch-check:
    name: PR Base Branch Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - name: Verify PR targets main
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          if [ "$BASE" != "main" ]; then
            echo "::error::PR targets '$BASE' instead of 'main'. All PRs must target main to prevent merge-order issues and lost code."
            echo ""
            echo "If you have dependent PRs, rebase each onto main independently."
            echo "Do NOT use stacked PR base branches — they cause cascading conflicts"
            echo "and code loss when parent branches are deleted after merge."
            exit 1
          fi
          echo "✓ PR correctly targets main"

  # 3c. Version Alignment Check
  version-check:
    name: Version Alignment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Verify version consistency
        run: |
          # Extract version from pyproject.toml
          PYPROJECT_VER=$(python -c "
          import re
          text = open('pyproject.toml').read()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1))
          ")

          # Extract fallback version from __init__.py
          INIT_VER=$(python -c "
          import re
          text = open('src/agent_bom/__init__.py').read()
          m = re.search(r'\"(\d+\.\d+\.\d+)\"', text)
          print(m.group(1))
          ")

          # Extract Dockerfile.mcp ARG VERSION
          DOCKER_VER=$(python -c "
          import re
          text = open('integrations/toolhive/Dockerfile.mcp').read()
          m = re.search(r'ARG VERSION=(\S+)', text)
          print(m.group(1))
          ")

          # Extract server.json version
          SERVER_VER=$(python -c "
          import json
          data = json.load(open('integrations/toolhive/server.json'))
          print(data['version'])
          ")

          # Extract Dockerfile.sse ARG VERSION
          SSE_VER=$(python -c "
          import re
          text = open('Dockerfile.sse').read()
          m = re.search(r'ARG VERSION=(\S+)', text)
          print(m.group(1))
          ")

          # Extract Dockerfile.runtime ARG VERSION
          RUNTIME_VER=$(python -c "
          import re
          text = open('Dockerfile.runtime').read()
          m = re.search(r'ARG VERSION=(\S+)', text)
          print(m.group(1))
          ")

          # Extract Dockerfile.snowpark ARG VERSION
          SNOWPARK_VER=$(python -c "
          import re
          text = open('Dockerfile.snowpark').read()
          m = re.search(r'ARG VERSION=(\S+)', text)
          print(m.group(1))
          ")

          # Extract Helm Chart appVersion
          HELM_VER=$(python -c "
          import re
          text = open('deploy/helm/agent-bom/Chart.yaml').read()
          m = re.search(r'appVersion:\s*\"([^\"]+)\"', text)
          print(m.group(1))
          ")

          # Extract MCP Registry server.json version
          REGISTRY_VER=$(python -c "
          import json
          data = json.load(open('integrations/mcp-registry/server.json'))
          print(data['version'])
          ")

          echo "pyproject.toml:       $PYPROJECT_VER"
          echo "__init__.py:          $INIT_VER"
          echo "Dockerfile.mcp:       $DOCKER_VER"
          echo "Dockerfile.sse:       $SSE_VER"
          echo "Dockerfile.runtime:   $RUNTIME_VER"
          echo "Dockerfile.snowpark:  $SNOWPARK_VER"
          echo "server.json (TH):     $SERVER_VER"
          echo "server.json (MCP):    $REGISTRY_VER"
          echo "Chart.yaml:           $HELM_VER"

          MISMATCH=0
          for LABEL_VER in \
            "__init__.py:$INIT_VER" \
            "Dockerfile.mcp:$DOCKER_VER" \
            "Dockerfile.sse:$SSE_VER" \
            "Dockerfile.runtime:$RUNTIME_VER" \
            "Dockerfile.snowpark:$SNOWPARK_VER" \
            "server.json (ToolHive):$SERVER_VER" \
            "server.json (MCP Registry):$REGISTRY_VER" \
            "Chart.yaml appVersion:$HELM_VER"; do
            LABEL="${LABEL_VER%%:*}"
            VER="${LABEL_VER#*:}"
            if [ "$PYPROJECT_VER" != "$VER" ]; then
              echo "::error::Version mismatch: pyproject.toml ($PYPROJECT_VER) != $LABEL ($VER)"
              MISMATCH=1
            fi
          done

          if [ "$MISMATCH" -eq 1 ]; then
            echo "::error::Version numbers must be aligned across all files. Run: python scripts/bump-version.py $PYPROJECT_VER"
            exit 1
          fi
          echo "All version numbers aligned at $PYPROJECT_VER"

  # 4. Build Python Package
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [security, lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: '3.11'

      - name: Build and verify
        run: |
          uv run --with build==1.4.0 python -m build
          uvx twine==6.2.0 check dist/*

      - name: Upload package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-package
          path: dist/

  # 5. Docker Build + Scan (multi-arch)
  docker:
    name: Docker (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [security, lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate multi-arch build (linux/amd64 + linux/arm64)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t agent-bom:multiarch \
            .

      - name: Build and load amd64 image for smoke test + scan
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t agent-bom:test \
            .

      - name: Smoke test
        run: docker run --rm agent-bom:test --version

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: agent-bom:test
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

  # 6. agent-bom Self-Scan (dogfooding with test SBOM)
  agent-bom-scan:
    name: agent-bom Self-Scan
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          python-version: '3.11'

      - name: Install agent-bom from source
        run: uv sync

      - name: Run agent-bom scan (ingest test SBOM)
        run: |
          uv run agent-bom scan --sbom tests/fixtures/test-sbom.cdx.json -f sarif -o results.sarif || true
          if [ ! -f results.sarif ]; then
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"agent-bom"}},"results":[]}]}' > results.sarif
          fi

      # SARIF upload removed: uploading a non-CodeQL SARIF category from CI
      # creates a "code scanning configuration" that GitHub expects on every PR.
      # If any PR run skips or fails, it shows "1 configuration not found".
      # Scan results are visible in the workflow output instead.

  # 7. Dogfood GitHub Action (test action.yml via uses: ./)
  action-dogfood:
    name: Dogfood GitHub Action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run agent-bom action from local checkout
        uses: ./
        with:
          sbom: tests/fixtures/test-sbom.cdx.json
          format: sarif
          upload-sarif: 'false'
