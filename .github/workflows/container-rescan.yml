name: Container Re-Scan

# Daily rescan of published multi-arch images for new fixable CVEs.
# Container scanner checks both linux/amd64 and linux/arm64 variants.
# SARIF uploaded to GitHub Security tab. Never blocks main.

on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC
  workflow_dispatch:

permissions: {}  # deny all by default; jobs declare only what they need

jobs:
  rescan:
    name: Rescan — ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      security-events: write  # required: SARIF upload to GitHub Security tab
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            sarif_category: container-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            sarif_category: container-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-python
        with:
          python-version: '3.11'

      - name: Install agent-bom for the image scan
        run: uv sync --frozen --extra dev

      - name: Pull ${{ matrix.platform }} image
        run: docker pull --platform ${{ matrix.platform }} agentbom/agent-bom:latest

      - name: Container image scan table (fixable MEDIUM+)
        id: image_scan_table
        continue-on-error: true
        # Self-hosted image gate (dogfood). agent-bom reads the pulled image
        # from the local Docker daemon (via docker save). Native OS-layer
        # (dpkg/rpm/apk) + app-dependency scanning at MEDIUM+ severity
        # (agent-bom has no separate UNKNOWN tier), unfixable findings excluded
        # (= ignore-unfixed), and the .image-scan-ignore CVE allowlist.
        run: |
          uv run agent-bom image agentbom/agent-bom:latest \
            --ignore .image-scan-ignore \
            --exclude-unfixable \
            --fail-on-severity medium

      - name: Container image scan SARIF
        id: image_scan_sarif
        continue-on-error: true
        # Non-gating SARIF export for the GitHub Security tab. Same scan policy
        # as the table gate above; emits the same allowlist-filtered findings.
        run: |
          uv run agent-bom image agentbom/agent-bom:latest \
            --ignore .image-scan-ignore \
            --exclude-unfixable \
            -f sarif -o image-scan-${{ matrix.sarif_category }}.sarif

      - name: Detect SARIF output
        id: sarif
        if: always()
        run: |
          SARIF_FILE="image-scan-${{ matrix.sarif_category }}.sarif"
          if [ -f "$SARIF_FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$SARIF_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF to GitHub Security tab
        if: always() && steps.sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ${{ steps.sarif.outputs.path }}
          category: ${{ matrix.sarif_category }}

      - name: Warn when SARIF was not generated
        if: always() && steps.sarif.outputs.exists != 'true'
        run: |
          echo "::warning::Container scan SARIF was not generated for ${{ matrix.platform }}. Check the preceding scanner step for workflow/config errors."

      - name: Flag actionable CVEs found
        if: steps.image_scan_table.outcome == 'failure'
        run: |
          echo "::warning::Container scan found fixable MEDIUM+ CVEs in agentbom/agent-bom:latest (${{ matrix.platform }}). Check SARIF in Security tab."

      - name: Open or close base image vulnerability issue
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="base-image-vulnerability: agentbom/agent-bom:latest has actionable findings on ${{ matrix.platform }}"
          gh label create base-image-vulnerability --color B60205 --description "Automated base image vulnerability findings" >/dev/null 2>&1 || true
          gh label create security-preventive --color 0E8A16 --description "Preventive daily security automation findings" >/dev/null 2>&1 || true
          gh label create automated --color 5319E7 --description "Opened or updated automatically by CI" >/dev/null 2>&1 || true
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')

          if [ "${{ steps.image_scan_table.outcome }}" = "failure" ]; then
            BODY=$(cat <<EOF
          ## Automated Base Image Vulnerability Alert

          Daily image rescan found fixable \`MEDIUM+\` findings in \`agentbom/agent-bom:latest\`.

          - Platform: \`${{ matrix.platform }}\`
          - SARIF category: \`${{ matrix.sarif_category }}\`
          - Source workflow: \`.github/workflows/container-rescan.yml\`
          - Policy: container scans run with \`agent-bom image --fail-on-severity medium --exclude-unfixable\`

          Review the GitHub Security tab and the workflow logs for the current image findings.
          EOF
          )
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$BODY"
            else
              gh issue create --title "$TITLE" --label "base-image-vulnerability,security-preventive,automated" --body "$BODY"
            fi
          elif [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "Daily image rescan is clean again; closing the automated base image vulnerability alert."
          fi
