# Auto-approve dependabot patch/minor PRs after a short quarantine window.
#
# Dependabot PRs still require branch protection checks (CI, linting,
# security scan) — this workflow only adds the second approval so the
# 2-review requirement is satisfied without human toil. New dependency PRs are
# intentionally not approved immediately so newly published malicious packages
# have time to be flagged by registries and advisory feeds.
#
# Major version bumps are NOT auto-approved and require manual review.

name: Dependabot Auto-Approve

on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    if: >-
      (
        github.actor == 'dependabot[bot]' ||
        github.actor == 'app/dependabot'
      ) &&
      (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'app/dependabot'
      ) &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enforce dependency quarantine window
        id: quarantine
        env:
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
          MIN_AGE_SECONDS: "86400"
        run: |
          created_epoch="$(date -u -d "$PR_CREATED_AT" +%s)"
          now_epoch="$(date -u +%s)"
          age_seconds="$((now_epoch - created_epoch))"
          if [ "$age_seconds" -lt "$MIN_AGE_SECONDS" ]; then
            remaining="$((MIN_AGE_SECONDS - age_seconds))"
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Dependabot auto-approval until the 24h quarantine window has elapsed (${remaining}s remaining). Re-run this workflow after the window if CI is still green."
            exit 0
          fi
          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Auto-approve patch and minor updates
        if: >-
          steps.quarantine.outputs.eligible == 'true' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log skipped major update
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "::notice::Skipping auto-approve for major version bump: ${{ steps.metadata.outputs.dependency-names }} (${{ steps.metadata.outputs.previous-version }} → ${{ steps.metadata.outputs.new-version }})"
          echo "Major version bumps require manual review."
