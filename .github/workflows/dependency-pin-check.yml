name: Action Pin Freshness

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-pins:
    name: Check GitHub Action SHA freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: List action references
        run: |
          echo "=== GitHub Action references across workflows ==="
          grep -rh 'uses:' .github/workflows/*.yml | grep '@' | sort -u
          echo "=== Review monthly for updates ==="
