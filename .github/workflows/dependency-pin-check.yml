name: Action Pin Freshness

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-pins:
    name: Check GitHub Action SHA freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: List action references
        run: |
          echo "=== GitHub Action references across workflows ==="
          grep -rh 'uses:' .github/workflows/*.yml | grep '@' | sort -u
          echo "=== Review monthly for updates ==="
