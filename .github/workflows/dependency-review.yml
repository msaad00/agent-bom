name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Fetch base branch for bootstrap detection
        run: git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}:${{ github.base_ref }}"

      - name: Detect dependency-workflow bootstrap PR
        id: bootstrap
        shell: bash
        run: |
          CHANGED="$(git diff --name-only "${{ github.base_ref }}"...HEAD)"
          if echo "$CHANGED" | grep -qx ".github/workflows/dependency-submission.yml"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$CHANGED" | grep -qx ".github/workflows/dependency-review.yml"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Skip dependency review for bootstrap workflow change
        if: steps.bootstrap.outputs.skip == 'true'
        run: echo "Skipping dependency review for dependency graph bootstrap workflow change."

      - name: Review dependency changes
        if: steps.bootstrap.outputs.skip != 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          retry-on-snapshot-warnings: true
          allow-licenses: >-
            Apache-2.0, MIT, MIT-0, MIT-CMU, BSD-2-Clause, BSD-3-Clause,
            ISC, PSF-2.0, Python-2.0, Python-2.0.1, 0BSD, Unlicense,
            CC0-1.0, MPL-2.0, OFL-1.1, ZPL-2.1, HPND-Markus-Kuhn,
            LGPL-3.0-only
          # Packages whitelisted by PURL:
          # - jinja2/werkzeug/flask/requests: permissive licenses but GitHub can return null
          # - recharts: Apache-2.0 but npm metadata returns null
          # - victory-vendor: ISC+JSON+MIT (JSON not in allow list)
          # - uv.lock transitive deps with LicenseRef-scancode-* identifiers
          #   (scancode can't map to standard SPDX; packages are permissive)
          allow-dependencies-licenses: >-
            pkg:pypi/jinja2,
            pkg:pypi/werkzeug,
            pkg:pypi/flask,
            pkg:pypi/requests,
            pkg:npm/recharts,
            pkg:npm/victory-vendor,
            pkg:pypi/aiohappyeyeballs,
            pkg:pypi/azure-identity,
            pkg:pypi/fonttools,
            pkg:pypi/gitdb,
            pkg:pypi/librt,
            pkg:pypi/msal-extensions,
            pkg:pypi/mypy,
            pkg:pypi/pillow,
            pkg:pypi/protobuf,
            pkg:pypi/psycopg-pool,
            pkg:pypi/scikit-learn,
            pkg:pypi/typing-extensions,
            pkg:pypi/wcwidth,
            pkg:pypi/backrefs,
            pkg:pypi/griffe,
            pkg:pypi/griffelib,
            pkg:pypi/markdown,
            pkg:pypi/mkdocs-autorefs,
            pkg:pypi/mkdocs-get-deps,
            pkg:pypi/mkdocs-material,
            pkg:pypi/mkdocstrings,
            pkg:pypi/mkdocstrings-python,
            pkg:pypi/pymdown-extensions
