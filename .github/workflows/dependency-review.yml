name: Dependency Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Submit dependency snapshot
        uses: advanced-security/component-detection-dependency-submission-action@9c110eb34dee187cd9eca76a652b9f6a0ed22927 # v0.1.1
        with:
          # Dependency review needs a snapshot for the PR head SHA. Enable
          # default-off detectors for ecosystems GitHub does not infer
          # reliably here, especially uv.lock and Dockerfile-based images.
          detectorArgs: UvLock=EnableIfDefaultOff,NpmLockfile3=EnableIfDefaultOff,Dockerfile=EnableIfDefaultOff,Pip=EnableIfDefaultOff,SimplePip=EnableIfDefaultOff

      - name: Detect dependency-review bootstrap PR
        id: bootstrap
        if: github.event_name == 'pull_request'
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          if printf '%s\n' "$changed_files" | grep -Fxq '.github/workflows/dependency-review.yml'; then
            echo "skip_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip dependency review for bootstrap workflow change
        if: github.event_name == 'pull_request' && steps.bootstrap.outputs.skip_review == 'true'
        run: echo "Skipping dependency review because this PR bootstraps dependency snapshot submission on main."

      - name: Review dependency changes
        if: github.event_name == 'pull_request' && steps.bootstrap.outputs.skip_review != 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          retry-on-snapshot-warnings: true
          allow-licenses: >-
            Apache-2.0, MIT, MIT-0, MIT-CMU, BSD-2-Clause, BSD-3-Clause,
            ISC, PSF-2.0, Python-2.0, Python-2.0.1, 0BSD, Unlicense,
            CC0-1.0, MPL-2.0, OFL-1.1, ZPL-2.1, HPND-Markus-Kuhn,
            LGPL-3.0-only
          # Packages whitelisted by PURL:
          # - jinja2/werkzeug/flask: BSD-3-Clause but GitHub can't resolve from pins
          # - recharts: Apache-2.0 but npm metadata returns null
          # - victory-vendor: ISC+JSON+MIT (JSON not in allow list)
          # - uv.lock transitive deps with LicenseRef-scancode-* identifiers
          #   (scancode can't map to standard SPDX; packages are permissive)
          allow-dependencies-licenses: >-
            pkg:pypi/jinja2,
            pkg:pypi/werkzeug,
            pkg:pypi/flask,
            pkg:npm/recharts,
            pkg:npm/victory-vendor,
            pkg:pypi/aiohappyeyeballs,
            pkg:pypi/azure-identity,
            pkg:pypi/fonttools,
            pkg:pypi/gitdb,
            pkg:pypi/librt,
            pkg:pypi/msal-extensions,
            pkg:pypi/mypy,
            pkg:pypi/pillow,
            pkg:pypi/protobuf,
            pkg:pypi/psycopg-pool,
            pkg:pypi/scikit-learn,
            pkg:pypi/typing-extensions,
            pkg:pypi/wcwidth,
            pkg:pypi/backrefs,
            pkg:pypi/griffe,
            pkg:pypi/griffelib,
            pkg:pypi/markdown,
            pkg:pypi/mkdocs-autorefs,
            pkg:pypi/mkdocs-get-deps,
            pkg:pypi/mkdocs-material,
            pkg:pypi/mkdocstrings,
            pkg:pypi/mkdocstrings-python,
            pkg:pypi/pymdown-extensions
