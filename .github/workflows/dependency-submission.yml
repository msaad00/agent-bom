name: Dependency Submission

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  dependency-submission:
    name: Submit dependency snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Submit dependency graph snapshot
        uses: advanced-security/component-detection-dependency-submission-action@9c110eb34dee187cd9eca76a652b9f6a0ed22927 # v0.1.1
        with:
          detectorArgs: >-
            UvLock=EnableIfDefaultOff
            NpmLockfile3=EnableIfDefaultOff
            Pip=EnableIfDefaultOff
            SimplePip=EnableIfDefaultOff
            Dockerfile=EnableIfDefaultOff
            Spdx22=EnableIfDefaultOff
