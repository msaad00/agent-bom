name: Deploy MCP SSE

# Deploys the SSE container to Railway from the trusted release tag checkout.
# Requires RAILWAY_TOKEN secret and DEPLOY_TARGET=railway variable.
# Optional: RAILWAY_SERVICE variable to specify the service name.
#
# Post-deploy: verifies the deployed version matches the release tag.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: >-
      ${{
        vars.DEPLOY_TARGET == 'railway'
      }}
    steps:
      - name: Resolve trusted release tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          REF="$REF_NAME"
          # Only release tags are deployable. Branches and partial semver refs
          # are rejected before any repository code is checked out.
          if ! echo "$REF" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Refusing to deploy non-semver ref: $REF"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          echo "Deploying trusted release tag: $REF"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checkout matches trusted release tag
        env:
          EXPECTED_TAG: ${{ steps.tag.outputs.ref }}
          EXPECTED_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git fetch --force --tags origin "refs/tags/$EXPECTED_TAG:refs/tags/$EXPECTED_TAG"
          TAG_SHA=$(git rev-list -n 1 "$EXPECTED_TAG^{commit}")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Checked-out commit $HEAD_SHA does not match $EXPECTED_TAG commit $TAG_SHA"
            exit 1
          fi
          REPO_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1))
          ")
          if [ "$REPO_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Checked-out version $REPO_VERSION does not match release tag $EXPECTED_TAG"
            exit 1
          fi
          echo "Checked-out version: $REPO_VERSION"
          echo "repo_version=$REPO_VERSION" >> "$GITHUB_ENV"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.30.5  # pinned — update periodically

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN not set — cannot deploy to Railway. Set the secret or disable DEPLOY_TARGET."
            exit 1
          fi
          if [ -n "$RAILWAY_SERVICE" ]; then
            railway up --service "$RAILWAY_SERVICE" --detach
          else
            railway up --detach
          fi

      - name: Post-deploy version check
        env:
          RAILWAY_MCP_URL: ${{ vars.RAILWAY_MCP_URL }}
          RAILWAY_MCP_BEARER_TOKEN: ${{ secrets.RAILWAY_MCP_BEARER_TOKEN }}
        run: |
          echo "Waiting 60s for Railway to rebuild and start..."
          sleep 60
          DEPLOY_URL="${RAILWAY_MCP_URL:-https://agent-bom-mcp.up.railway.app}"
          HEALTH_URL=$(PYTHONPATH=src python3 -m agent_bom.deployment_probe --base-url "$DEPLOY_URL" --resolve-only)
          echo "Checking $HEALTH_URL"
          RESPONSE=$(PYTHONPATH=src python3 -m agent_bom.deployment_probe \
            --base-url "$DEPLOY_URL" \
            --bearer-token "${RAILWAY_MCP_BEARER_TOKEN:-}" \
            --attempts 5 \
            --backoff-seconds 30 \
            --timeout 15 2>/dev/null || true)
          if [ -n "$RESPONSE" ]; then
            echo "Health response: $RESPONSE"
            DEPLOYED_VERSION=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data.get('version', 'unknown'))
          except Exception:
              print('unknown')
          " 2>/dev/null || echo "unknown")
            echo "Deployed version: $DEPLOYED_VERSION"
            echo "Expected version: $repo_version"
            if [ "$DEPLOYED_VERSION" = "$repo_version" ]; then
              echo "✅ Version match confirmed"
              exit 0
            elif [ "$DEPLOYED_VERSION" = "unknown" ]; then
              echo "⚠️ Could not extract version from health endpoint — auth or startup may still be incomplete"
            else
              echo "::warning::Version mismatch — deployed=$DEPLOYED_VERSION expected=$repo_version"
            fi
          else
            echo "::warning::Health endpoint not ready after retries"
          fi
          echo "::warning::Could not verify deployed version — check Railway manually"
