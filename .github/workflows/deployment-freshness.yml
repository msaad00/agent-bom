name: Deployment Freshness

# Checks that the protected Railway surface serves the latest release and that
# the Smithery catalog listing is live with a non-empty tool inventory. Runs
# daily and on-demand. Opens an issue if stale or misconfigured.

on:
  schedule:
    - cron: "0 8 * * *"  # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get expected version from repo
        id: expected
        run: |
          VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Expected version: $VERSION"

      - name: Check Railway deployment
        id: railway
        continue-on-error: true
        env:
          RAILWAY_MCP_URL: ${{ vars.RAILWAY_MCP_URL }}
          RAILWAY_MCP_BEARER_TOKEN: ${{ secrets.RAILWAY_MCP_BEARER_TOKEN }}
        run: |
          DEPLOY_URL="${RAILWAY_MCP_URL:-https://agent-bom-mcp.up.railway.app}"
          HEALTH_URL=$(PYTHONPATH=src python3 -m agent_bom.deployment_probe --base-url "$DEPLOY_URL" --resolve-only)
          echo "Checking $HEALTH_URL ..."
          RESPONSE=$(PYTHONPATH=src python3 -m agent_bom.deployment_probe \
            --base-url "$DEPLOY_URL" \
            --bearer-token "${RAILWAY_MCP_BEARER_TOKEN:-}" \
            --attempts 3 \
            --backoff-seconds 5 \
            --timeout 15 2>/dev/null || echo '{}')
          DEPLOYED=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data.get('version', 'unknown'))
          except Exception:
              print('unreachable')
          ")
          echo "railway_version=$DEPLOYED" >> "$GITHUB_OUTPUT"
          echo "Railway version: $DEPLOYED (expected: ${{ steps.expected.outputs.version }})"
          if [ "$DEPLOYED" = "unknown" ] || [ "$DEPLOYED" = "unreachable" ]; then
            echo "probe_failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not verify Railway version from $HEALTH_URL"
          elif [ "$DEPLOYED" != "${{ steps.expected.outputs.version }}" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Smithery catalog listing
        id: public
        continue-on-error: true
        env:
          SMITHERY_SERVER_QUALIFIED_NAME: ${{ vars.SMITHERY_SERVER_QUALIFIED_NAME }}
        run: |
          QUALIFIED_NAME="${SMITHERY_SERVER_QUALIFIED_NAME:-agent-bom/agent-bom}"
          RESPONSE=$(python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          name = os.environ.get("SMITHERY_SERVER_QUALIFIED_NAME") or "agent-bom/agent-bom"
          if "/" not in name:
              print(json.dumps({"error": f"invalid Smithery qualified name: {name!r}"}))
              sys.exit(1)
          namespace, server = name.split("/", 1)
          url = "https://api.smithery.ai/servers/" + urllib.parse.quote(namespace, safe="") + "/" + urllib.parse.quote(server, safe="")
          req = urllib.request.Request(
              url,
              headers={"Accept": "application/json", "User-Agent": "agent-bom-deployment-freshness"},
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as response:
                  data = json.loads(response.read().decode("utf-8", errors="replace"))
          except (OSError, urllib.error.URLError, json.JSONDecodeError) as exc:
              print(json.dumps({"error": str(exc), "url": url}))
              sys.exit(1)
          tools = data.get("tools") if isinstance(data.get("tools"), list) else []
          print(json.dumps({
              "qualified_name": data.get("qualifiedName"),
              "remote": bool(data.get("remote")),
              "deployment_url": data.get("deploymentUrl") or "",
              "tool_count": len(tools),
          }, separators=(",", ":")))
          PY
          ) || {
            echo "public_version=unreachable" >> "$GITHUB_OUTPUT"
            echo "tool_count=unknown" >> "$GITHUB_OUTPUT"
            echo "auth_required=smithery-oauth" >> "$GITHUB_OUTPUT"
            echo "probe_failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not verify Smithery catalog listing"
            exit 0
          }
          STATE=$(echo "$RESPONSE" | EXPECTED_QUALIFIED_NAME="$QUALIFIED_NAME" python3 -c "
          import json, os, sys
          data = json.load(sys.stdin)
          if data.get('qualified_name') != os.environ['EXPECTED_QUALIFIED_NAME'] or not data.get('remote') or not data.get('deployment_url') or int(data.get('tool_count') or 0) < 1:
              print('invalid')
          else:
              print('catalog_live')
          ")
          TOOL_COUNT=$(echo "$RESPONSE" | python3 -c "import json, sys; print(json.load(sys.stdin).get('tool_count', 'unknown'))")
          DEPLOY_URL=$(echo "$RESPONSE" | python3 -c "import json, sys; print(json.load(sys.stdin).get('deployment_url', 'unknown'))")
          echo "public_version=$STATE" >> "$GITHUB_OUTPUT"
          echo "tool_count=$TOOL_COUNT" >> "$GITHUB_OUTPUT"
          echo "auth_required=smithery-oauth" >> "$GITHUB_OUTPUT"
          echo "Smithery catalog state: $STATE"
          echo "Smithery deployment URL: $DEPLOY_URL"
          echo "Smithery tool count: $TOOL_COUNT"
          if [ "$STATE" != "catalog_live" ]; then
            echo "probe_failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Smithery catalog listing is missing remote deployment metadata or tools"
          fi

      - name: Open issue if deployment surfaces drift or public endpoint is misconfigured
        if: steps.railway.outputs.stale == 'true' || steps.public.outputs.stale == 'true' || steps.public.outputs.auth_gate == 'true' || steps.public.outputs.probe_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXPECTED="${{ steps.expected.outputs.version }}"
          RAILWAY="${{ steps.railway.outputs.railway_version }}"
          PUBLIC="${{ steps.public.outputs.public_version }}"
          PUBLIC_TOOLS="${{ steps.public.outputs.tool_count }}"
          PUBLIC_AUTH="${{ steps.public.outputs.auth_required }}"
          TITLE="supply-chain-drift: deployment surfaces out of sync with $EXPECTED"

          gh label create supply-chain-drift --color FBCA04 --description "Automated supply-chain or deployment drift detection" >/dev/null 2>&1 || true
          gh label create security-preventive --color 0E8A16 --description "Preventive daily security automation findings" >/dev/null 2>&1 || true
          gh label create automated --color 5319E7 --description "Opened or updated automatically by CI" >/dev/null 2>&1 || true

          # Check if an issue already exists
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$(cat <<EOF
          ## Supply-Chain Drift Check Failed

          | Surface | Version | Expected | Auth Required | Tool Count |
          |---------|---------|----------|---------------|------------|
          | Railway (protected) | $RAILWAY | $EXPECTED | true | — |
          | Public marketplace | $PUBLIC | $EXPECTED | $PUBLIC_AUTH | $PUBLIC_TOOLS |

          **Action**: Ensure the protected Railway deployment is fresh and the Smithery catalog API lists a remote deployment with tools, then re-run this workflow.

          This issue was auto-updated by the deployment-freshness workflow.
          EOF
          )"
            exit 0
          fi

          gh issue create \
            --title "$TITLE" \
            --label "supply-chain-drift,security-preventive,automated" \
            --body "$(cat <<EOF
          ## Supply-Chain Drift Check Failed

          | Surface | Version | Expected | Auth Required | Tool Count |
          |---------|---------|----------|---------------|------------|
          | Railway (protected) | $RAILWAY | $EXPECTED | true | — |
          | Public marketplace | $PUBLIC | $EXPECTED | $PUBLIC_AUTH | $PUBLIC_TOOLS |

          **Action**: Ensure the protected Railway deployment is fresh and the Smithery catalog API lists a remote deployment with tools, then re-run this workflow.

          This issue was auto-created by the deployment-freshness workflow.
          EOF
          )"

      - name: Open or update misconfiguration issue for unmonitored surfaces
        if: steps.public.outputs.not_configured == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "deployment-monitoring: a deployment surface is UNMONITORED (missing config)";
            const labels = ["supply-chain-drift", "security-preventive", "automated"];

            const unmonitored = [
              "**Smithery / public marketplace** — set repo variable `SMITHERY_SERVER_QUALIFIED_NAME` only if the listing is not `agent-bom/agent-bom`. The monitor checks Smithery's catalog API because Smithery-hosted remotes are OAuth-gated and do not expose agent-bom `/health`.",
            ];

            const body = [
              "## Deployment surface is unmonitored",
              "",
              "One or more deployment surfaces have no monitoring configuration, so drift on them is invisible. This issue replaces the old silent `::notice:: skipping` behavior.",
              "",
              ...unmonitored.map((u) => `- ${u}`),
              "",
              "Set the named repo variable(s) under **Settings → Secrets and variables → Actions → Variables**, then re-run the **Deployment Freshness** workflow. This issue auto-closes once every surface is monitored.",
            ].join("\n");

            for (const name of labels) {
              try { await github.rest.issues.createLabel({ owner, repo, name }); } catch (e) {}
            }
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", labels: "supply-chain-drift", per_page: 100,
            });
            const match = existing.find((issue) => issue.title === title);
            if (match) {
              await github.rest.issues.createComment({ owner, repo, issue_number: match.number, body });
              return;
            }
            await github.rest.issues.create({ owner, repo, title, body, labels });

      - name: Close misconfiguration issue when every surface is monitored
        if: steps.public.outputs.not_configured != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="deployment-monitoring: a deployment surface is UNMONITORED (missing config)"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "All deployment surfaces are now configured for monitoring; closing the misconfiguration alert."
          fi

      - name: Close supply-chain drift issue when deployment is fresh
        if: steps.railway.outputs.stale != 'true' && steps.railway.outputs.probe_failed != 'true' && steps.public.outputs.not_configured != 'true' && steps.public.outputs.stale != 'true' && steps.public.outputs.probe_failed != 'true' && steps.public.outputs.auth_gate != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          EXPECTED="${{ steps.expected.outputs.version }}"
          TITLE="supply-chain-drift: deployment surfaces out of sync with $EXPECTED"
          # Match by title (not just label) so we never close the separate
          # surface-freshness or unmonitored-surface tracking issues that share
          # the supply-chain-drift label.
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "Deployment freshness check is clean again; closing the automated supply-chain drift alert."
          fi
