name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'site-docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
  workflow_call:
    inputs:
      deploy:
        description: 'Deploy built docs to GitHub Pages'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-python
        with:
          python-version: '3.11'

      - name: Build site
        run: >-
          uv tool run
          --from mkdocs==1.6.1
          --with mkdocs-material==9.7.5
          --with mkdocstrings==1.0.3
          --with mkdocstrings-python==2.0.3
          mkdocs build --strict

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name != 'workflow_call' || inputs.deploy == true) }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Serialize only real Pages deployments. Keeping this at job level (not the
    # whole workflow) means build-only validation runs — e.g. the release
    # workflow calling this with deploy:false — never join the pages group and
    # so can't cancel an in-progress deploy. cancel-in-progress:false lets a
    # running production deploy finish instead of being cancelled mid-flight.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
