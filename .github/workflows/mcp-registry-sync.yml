name: MCP Registry Sync

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Also triggerable manually from the Actions tab

permissions: {}  # all permissions denied by default; jobs declare only what they need

jobs:
  sync:
    name: Sync MCP registry (new servers + version refresh)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-python
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync

      - name: Fetch official MCP server list
        id: fetch
        run: |
          uv run python - <<'EOF'
          from pathlib import Path

          from agent_bom.mcp_official_registry import (
              sync_from_legacy_github_registry_sync,
              sync_from_official_registry_sync,
          )

          result = sync_from_official_registry_sync(max_pages=10, page_size=100)
          if result.total_fetched == 0:
              result = sync_from_legacy_github_registry_sync()
              if result.total_fetched == 0:
                  print("Official MCP Registry unavailable and legacy fallback returned no entries — skipping new-server sync")

          print(
              f"MCP registry source={result.source} "
              f"source_url={result.source_url} fetched={result.total_fetched} "
              f"added={result.added} skipped={result.skipped} fallback={result.fallback_used}"
          )
          Path("/tmp/new_count").write_text(str(result.added))
          Path("/tmp/sync_source").write_text(result.source)
          Path("/tmp/sync_source_url").write_text(result.source_url)
          EOF

      - name: Refresh registry versions from npm/PyPI
        id: refresh
        run: |
          uv run python - <<'EOF'
          import asyncio, json, httpx
          from pathlib import Path

          REGISTRY_PATH = Path("src/agent_bom/mcp_registry.json")
          NPM = "https://registry.npmjs.org"
          PYPI = "https://pypi.org/pypi"

          async def fetch_version(client, pkg, ecosystem):
              try:
                  if ecosystem == "npm":
                      encoded = pkg.replace("/", "%2F")
                      r = await client.get(f"{NPM}/{encoded}/latest", timeout=10)
                      if r.status_code == 200:
                          return r.json().get("version")
                  elif ecosystem == "pypi":
                      r = await client.get(f"{PYPI}/{pkg}/json", timeout=10)
                      if r.status_code == 200:
                          return r.json().get("info", {}).get("version")
              except Exception:
                  pass
              return None

          async def main():
              data = json.loads(REGISTRY_PATH.read_text())
              sem, updated = asyncio.Semaphore(5), 0

              async def update_one(client, entry):
                  nonlocal updated
                  async with sem:
                      v = await fetch_version(client, entry["package"], entry["ecosystem"])
                      if v and v != entry.get("latest_version"):
                          entry["latest_version"] = v
                          entry["version_source"] = entry["ecosystem"]
                          updated += 1

              async with httpx.AsyncClient() as client:
                  tasks = [update_one(client, e) for e in data["servers"].values()]
                  await asyncio.gather(*tasks)

              if updated:
                  from datetime import datetime, timezone
                  data["_updated"] = datetime.now(timezone.utc).strftime("%Y-%m-%d")
                  REGISTRY_PATH.write_text(json.dumps(data, indent=2) + "\n")
                  print(f"Refreshed {updated} package version(s)")

              Path("/tmp/version_count").write_text(str(updated))

          asyncio.run(main())
          EOF

      - name: Enrich registry with CVE data (OSV + EPSS + KEV)
        id: cve
        run: |
          uv run python - <<'EOF'
          import asyncio, json, sys
          from pathlib import Path

          sys.path.insert(0, "src")
          REGISTRY_PATH = Path("src/agent_bom/mcp_registry.json")

          async def main():
              from agent_bom.registry import enrich_registry_with_cves
              result = await enrich_registry_with_cves(dry_run=False)
              print(f"Scannable: {result.scannable}, With CVEs: {result.enriched}")
              print(f"Total CVEs: {result.total_cves}, Critical: {result.total_critical}, KEV: {result.total_kev}")
              for d in result.details[:10]:
                  print(f"  {d['server']}: {d['cve_count']} CVEs")
              Path("/tmp/cve_count").write_text(str(result.enriched))

          asyncio.run(main())
          EOF

      - name: Read counts
        id: count
        run: |
          echo "new_count=$(cat /tmp/new_count)" >> "$GITHUB_OUTPUT"
          echo "version_count=$(cat /tmp/version_count 2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"
          echo "cve_count=$(cat /tmp/cve_count 2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"
          echo "sync_source=$(cat /tmp/sync_source 2>/dev/null || echo unknown)" >> "$GITHUB_OUTPUT"
          echo "sync_source_url=$(cat /tmp/sync_source_url 2>/dev/null || echo unknown)" >> "$GITHUB_OUTPUT"

      - name: Configure signed automation commits
        id: signing
        if: steps.count.outputs.new_count != '0' || steps.count.outputs.version_count != '0' || steps.count.outputs.cve_count != '0'
        env:
          AUTOMATION_SSH_SIGNING_KEY: ${{ secrets.AUTOMATION_SSH_SIGNING_KEY }}
        run: |
          if [ -z "$AUTOMATION_SSH_SIGNING_KEY" ]; then
            # Graceful skip: scheduled runs on repos without the signing
            # secret previously hard-failed daily.  Skip the PR-create
            # step and exit successfully so the cron stops alerting.
            # Repos that want signed automation PRs can set the secret
            # per docs/AUTOMATION_SIGNING.md and the next run will sign.
            echo "AUTOMATION_SSH_SIGNING_KEY not configured — skipping PR creation."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$AUTOMATION_SSH_SIGNING_KEY" > "$HOME/.ssh/automation_signing_key"
          chmod 600 "$HOME/.ssh/automation_signing_key"
          ssh-keygen -y -f "$HOME/.ssh/automation_signing_key" > "$HOME/.ssh/automation_signing_key.pub"
          eval "$(ssh-agent -s)"
          ssh-add "$HOME/.ssh/automation_signing_key"
          git config user.name "github-actions[bot]"
          git config user.email "34316639+msaad00@users.noreply.github.com"
          git config gpg.format ssh
          git config user.signingkey "$HOME/.ssh/automation_signing_key.pub"
          git config commit.gpgsign true
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Create PR if registry changed
        if: (steps.count.outputs.new_count != '0' || steps.count.outputs.version_count != '0' || steps.count.outputs.cve_count != '0') && steps.signing.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_COUNT: ${{ steps.count.outputs.new_count }}
          VERSION_COUNT: ${{ steps.count.outputs.version_count }}
          CVE_COUNT: ${{ steps.count.outputs.cve_count }}
          SOURCE: ${{ steps.count.outputs.sync_source }}
          SOURCE_URL: ${{ steps.count.outputs.sync_source_url }}
        run: |
          BRANCH="chore/mcp-registry-$(date +%Y%m%d)"
          git switch -C "$BRANCH" origin/main
          git add src/agent_bom/mcp_registry.json
          git commit -S -m "chore: sync MCP registry — ${NEW_COUNT} new, ${VERSION_COUNT} versions, ${CVE_COUNT} with CVEs"
          git push --force-with-lease origin "$BRANCH"
          BODY="Automated weekly sync from the official MCP server registry.

          **New-server source:** ${SOURCE} (${SOURCE_URL})
          **New servers added:** ${NEW_COUNT}
          **Versions refreshed:** ${VERSION_COUNT}
          **Servers with CVE data:** ${CVE_COUNT}

          Please review the changes in \`src/agent_bom/mcp_registry.json\` before merging."
          PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr edit "$PR_NUMBER" \
              --title "chore: sync MCP registry — ${NEW_COUNT} new, ${VERSION_COUNT} versions, ${CVE_COUNT} CVE-enriched" \
              --body "$BODY"
          else
            gh pr create \
              --title "chore: sync MCP registry — ${NEW_COUNT} new, ${VERSION_COUNT} versions, ${CVE_COUNT} CVE-enriched" \
              --body "$BODY" \
              --base main
          fi

      - name: No changes
        if: steps.count.outputs.new_count == '0' && steps.count.outputs.version_count == '0' && steps.count.outputs.cve_count == '0'
        run: echo "MCP registry is up to date — no new servers, version changes, or CVE updates found."
