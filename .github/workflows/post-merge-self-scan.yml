name: Post-Merge Self-Scan

# Runs agent-bom against its own source code after every merge to main.
# Uploads SARIF findings to GitHub Security tab. Never blocks main — informational only.

on:
  push:
    branches: [main]
  schedule:
    # Nightly at 03:00 UTC — catches new CVEs even without a code push
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      fail_on_critical:
        description: "Exit 1 if critical CVE found (default: false, informational only)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  self-sast-scan:
    name: Self SAST scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required: SARIF upload to GitHub Security tab
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install agent-bom (from source)
        run: uv sync --extra dev

      - name: Run self dep scan (--self-scan)
        id: dep_scan
        run: |
          set +e
          mkdir -p sarif
          uv run agent-bom scan --self-scan --format sarif -o sarif/self-dep-full.sarif \
            --fail-on-severity high --quiet
          echo "dep_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Filter SARIF to HIGH+ only (strip low/medium noise from Security tab)
        if: always()
        run: |
          python3 -c "
          import json, sys
          try:
              d = json.load(open('sarif/self-dep-full.sarif'))
              for run in d.get('runs', []):
                  results = run.get('results', [])
                  # Keep only error-level results (HIGH/CRITICAL in SARIF)
                  filtered = [r for r in results if r.get('level') == 'error']
                  # Keep only rules referenced by filtered results
                  kept_ids = {r['ruleId'] for r in filtered}
                  rules = run.get('tool', {}).get('driver', {}).get('rules', [])
                  run['tool']['driver']['rules'] = [r for r in rules if r['id'] in kept_ids]
                  run['results'] = filtered
              json.dump(d, open('sarif/self-dep.sarif', 'w'), indent=2)
              print(f'SARIF filtered: {len(results)} total → {len(filtered)} HIGH+ results')
          except Exception as e:
              print(f'SARIF filter error: {e}')
              # Fall back to full SARIF if filtering fails
              import shutil
              shutil.copy('sarif/self-dep-full.sarif', 'sarif/self-dep.sarif')
          "

      - name: Print full dep scan summary (all severities, for logs)
        if: always()
        run: |
          uv run agent-bom scan --self-scan --quiet 2>&1 | tail -20 || true

      - name: Run SAST scan on source code (--code)
        id: sast_scan
        run: |
          set +e
          uv run agent-bom scan \
            --code src/agent_bom \
            --format sarif \
            -o sarif/self-sast.sarif \
            --quiet
          echo "sast_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Upload dep scan SARIF
        if: always() && hashFiles('sarif/self-dep.sarif') != ''
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: sarif/self-dep.sarif
          category: agent-bom-self-dep

      - name: Upload SAST SARIF
        if: always() && hashFiles('sarif/self-sast.sarif') != ''
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: sarif/self-sast.sarif
          category: agent-bom-self-sast

      - name: Fail on critical (optional, only when explicitly requested)
        if: inputs.fail_on_critical == true
        run: |
          if [ "${{ steps.dep_scan.outputs.dep_exit }}" != "0" ]; then
            echo "::error::Critical vulnerability found in self dep scan — check Security tab"
            exit 1
          fi

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install agent-bom (from source)
        run: uv sync --extra dev

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p sbom
          set +e
          uv run agent-bom scan --self-scan --format cyclonedx -o sbom/agent-bom.cdx.json --quiet
          echo "SBOM generated (exit $?)"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-${{ github.sha }}
          path: sbom/agent-bom.cdx.json
          retention-days: 90
