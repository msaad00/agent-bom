name: PR Security Gate

# Hard gate on PRs: pip-audit must pass using machine-readable JSON output
# and agent-bom self-scans its own installed deps. This complements the
# existing cve-freshness.yml scheduled job by catching regressions on PRs,
# not just twice a week.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-security-gate-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-scanning-config-pr:
    name: Code scanning config placeholders
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - name: Write empty agent-bom SARIF
        run: |
          mkdir -p sarif
          cat > sarif/empty-agent-bom.sarif <<'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "agent-bom",
                    "version": "0.0.0",
                    "informationUri": "https://github.com/msaad00/agent-bom"
                  }
                },
                "results": []
              }
            ]
          }
          EOF

      - name: Upload scheduled config placeholder
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: sarif/empty-agent-bom.sarif
          category: agent-bom-scheduled

      - name: Upload dependency self-scan config placeholder
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: sarif/empty-agent-bom.sarif
          category: agent-bom-self-dep

      - name: Upload SAST self-scan config placeholder
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: sarif/empty-agent-bom.sarif
          category: agent-bom-self-sast

  pip-audit-pr:
    name: pip-audit on PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install runtime deps (not dev) — scan the shipping dep set
        run: uv sync --frozen --extra api --extra postgres --extra mcp-server --extra oidc

      - name: Run pip-audit with JSON gate
        run: |
          set +e
          uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-3219 \
            -s osv \
            --format json \
            --output audit.json
          set -e

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("audit.json")
          if not path.is_file():
              raise SystemExit("pip-audit did not produce audit.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          fixable = []
          severe = []
          for dependency in data.get("dependencies", []):
              dep_name = dependency.get("name", "<unknown>")
              dep_version = dependency.get("version", "<unknown>")
              for vuln in dependency.get("vulns", []):
                  vuln_id = vuln.get("id", "<unknown>")
                  severity = str(vuln.get("severity") or vuln.get("severity_level") or "").upper()
                  fix_versions = vuln.get("fix_versions") or []
                  if severity in {"HIGH", "CRITICAL"}:
                      severe.append(f"{dep_name} {dep_version} {vuln_id} severity={severity}")
                  if fix_versions:
                      fixable.append(f"{dep_name} {dep_version} {vuln_id} fixes={','.join(fix_versions)}")
          if severe:
              print("::error::pip-audit found HIGH/CRITICAL vulnerabilities:")
              print("\n".join(severe[:20]))
              raise SystemExit(1)
          if fixable:
              print("::error::pip-audit found vulnerabilities with available fixes:")
              print("\n".join(fixable[:20]))
              raise SystemExit(1)
          print("pip-audit JSON gate passed: no HIGH/CRITICAL or fixable findings")
          PY

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-report
          path: audit.json

  self-scan-pr:
    name: agent-bom self-scan on PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload SARIF
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install agent-bom + dev extras
        run: uv sync --frozen --extra dev

      - name: Self-scan current agent-bom dependencies
        id: self_scan
        run: |
          set +e
          uv run agent-bom scan --self-scan \
            --format sarif \
            -o self-scan.sarif \
            --fail-on-severity high \
            --exclude-unfixable \
            --quiet
          SCAN_EXIT=$?
          set -e

          if [ ! -s self-scan.sarif ]; then
            echo "::error::agent-bom self-scan did not produce self-scan.sarif"
            exit 2
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("self-scan.sarif").read_text(encoding="utf-8"))
          run = (data.get("runs") or [{}])[0]
          results = run.get("results") or []
          rules = {
              rule.get("id"): rule
              for rule in (run.get("tool", {}).get("driver", {}).get("rules") or [])
          }
          high_or_critical = []
          kev = 0
          for result in results:
              props = rules.get(result.get("ruleId"), {}).get("properties", {})
              score = float(props.get("security-severity") or 0)
              kev += 1 if props.get("kev") else 0
              if score >= 7.0:
                  high_or_critical.append(result.get("ruleId", "<unknown>"))
          print(f"agent-bom self-scan SARIF findings: total={len(results)} high_or_critical={len(high_or_critical)} kev={kev}")
          if kev:
              print(f"::warning::agent-bom self-scan found {kev} KEV-listed finding(s)")
          PY

          exit "$SCAN_EXIT"

      - name: Upload SARIF to code-scanning
        if: always() && hashFiles('self-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: self-scan.sarif
          category: agent-bom-self-scan
