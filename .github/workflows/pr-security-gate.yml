name: PR Security Gate

# Hard gate on PRs: pip-audit must pass using machine-readable JSON output
# and agent-bom self-scans its own installed deps. This complements the
# existing cve-freshness.yml scheduled job by catching regressions on PRs,
# not just twice a week.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-security-gate-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-scanning-config-pr:
    name: Code scanning config placeholders
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Write empty agent-bom SARIF
        run: |
          mkdir -p sarif
          cat > sarif/empty-agent-bom.sarif <<'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "agent-bom",
                    "version": "0.0.0",
                    "informationUri": "https://github.com/msaad00/agent-bom"
                  }
                },
                "results": []
              }
            ]
          }
          EOF

      - name: Upload scheduled config placeholder
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: sarif/empty-agent-bom.sarif
          category: agent-bom-scheduled

      - name: Upload dependency self-scan config placeholder
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: sarif/empty-agent-bom.sarif
          category: agent-bom-self-dep

      - name: Upload SAST self-scan config placeholder
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: sarif/empty-agent-bom.sarif
          category: agent-bom-self-sast

  pip-audit-pr:
    name: pip-audit on PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install runtime deps (not dev) — scan the shipping dep set
        run: uv sync --frozen --extra api --extra postgres --extra mcp-server --extra oidc

      - name: Run pip-audit with JSON gate
        run: |
          set +e
          uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-3219 \
            -s osv \
            --format json \
            --output audit.json
          set -e

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("audit.json")
          if not path.is_file():
              raise SystemExit("pip-audit did not produce audit.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          fixable = []
          severe = []
          for dependency in data.get("dependencies", []):
              dep_name = dependency.get("name", "<unknown>")
              dep_version = dependency.get("version", "<unknown>")
              for vuln in dependency.get("vulns", []):
                  vuln_id = vuln.get("id", "<unknown>")
                  severity = str(vuln.get("severity") or vuln.get("severity_level") or "").upper()
                  fix_versions = vuln.get("fix_versions") or []
                  if severity in {"HIGH", "CRITICAL"}:
                      severe.append(f"{dep_name} {dep_version} {vuln_id} severity={severity}")
                  if fix_versions:
                      fixable.append(f"{dep_name} {dep_version} {vuln_id} fixes={','.join(fix_versions)}")
          if severe:
              print("::error::pip-audit found HIGH/CRITICAL vulnerabilities:")
              print("\n".join(severe[:20]))
              raise SystemExit(1)
          if fixable:
              print("::error::pip-audit found vulnerabilities with available fixes:")
              print("\n".join(fixable[:20]))
              raise SystemExit(1)
          print("pip-audit JSON gate passed: no HIGH/CRITICAL or fixable findings")
          PY

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-report
          path: audit.json

  self-scan-pr:
    name: agent-bom self-scan on PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install agent-bom + dev extras
        run: uv sync --frozen --extra dev

      - name: Self-scan fixture SBOM for regressions
        id: self_scan
        run: |
          # Scan once; capture SARIF + JSON so downstream steps can read both.
          # `|| true` because fixture SBOMs intentionally contain CVEs — we
          # want the report, not a hard failure on the fixture's baseline.
          uv run agent-bom sbom tests/fixtures/test-sbom.cdx.json -f sarif -o self-scan.sarif || true
          uv run agent-bom sbom tests/fixtures/test-sbom.cdx.json -f json -o self-scan.json || true

          # If the scan produced neither artifact, surface a minimal SARIF so
          # the upload step has something valid to hand to code-scanning and
          # operators still see the scan ran.
          if [ ! -s self-scan.sarif ]; then
            cat > self-scan.sarif <<'EOF'
          {"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[{"tool":{"driver":{"name":"agent-bom","version":"0.0.0"}},"results":[]}]}
          EOF
          fi

          # KEV count is advisory — we surface it for the operator, never fail.
          if [ -s self-scan.json ]; then
            KEV_COUNT=$(python -c "
          import json
          try:
              with open('self-scan.json') as f:
                  data = json.load(f)
              print(sum(1 for v in data.get('vulnerabilities', []) if v.get('kev')))
          except Exception:
              print('0')
          ")
            echo "Fixture SBOM reports ${KEV_COUNT} KEV-listed findings"
            if [ "${KEV_COUNT:-0}" -gt 0 ]; then
              echo "::warning::fixture SBOM contains ${KEV_COUNT} KEV-listed CVE(s) — investigate before merging if this is a new baseline"
            fi
          fi

      - name: Upload SARIF to code-scanning
        if: always() && hashFiles('self-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: self-scan.sarif
          category: agent-bom-self-scan
