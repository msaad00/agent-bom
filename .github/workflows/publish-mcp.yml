name: Publish MCP Container

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions: {}  # all permissions denied by default; jobs declare only what they need

jobs:
  publish-stdio:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # required for SLSA provenance attestation
      attestations: write   # required for SBOM + provenance attestations
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Always read version from pyproject.toml as source of truth
          PYPROJECT_VER=$(python3 -c "import re; m=re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()); print(m.group(1))")
          echo "version=${PYPROJECT_VER}" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=v${PYPROJECT_VER}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${HEAD_BRANCH:-v${PYPROJECT_VER}}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push MCP container (stdio)
        id: build-stdio
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deploy/docker/Dockerfile.mcp
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-bom:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/agent-bom:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=agent-bom
            org.opencontainers.image.description=Security scanner for AI infrastructure — MCP server (stdio)
            org.opencontainers.image.created=${{ github.event.workflow_run.created_at || github.event.repository.updated_at }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/agent-bom
          subject-digest: ${{ steps.build-stdio.outputs.digest }}
          push-to-registry: true

  publish-sse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # required for SLSA provenance attestation
      attestations: write   # required for SBOM + provenance attestations
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Always read version from pyproject.toml as source of truth
          PYPROJECT_VER=$(python3 -c "import re; m=re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read()); print(m.group(1))")
          echo "version=${PYPROJECT_VER}" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=v${PYPROJECT_VER}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${HEAD_BRANCH:-v${PYPROJECT_VER}}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push MCP container (SSE)
        id: build-sse
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: deploy/docker/Dockerfile.sse
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-bom-sse:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/agent-bom-sse:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=agent-bom-sse
            org.opencontainers.image.description=Security scanner for AI infrastructure — MCP server (streamable HTTP)
            org.opencontainers.image.created=${{ github.event.workflow_run.created_at || github.event.repository.updated_at }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/agent-bom-sse
          subject-digest: ${{ steps.build-sse.outputs.digest }}
          push-to-registry: true
