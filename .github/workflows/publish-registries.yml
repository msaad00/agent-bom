name: Publish to Registries

# Auto-publishes to Smithery and ClawHub after a successful Release workflow.
# Secrets needed (add via Settings → Secrets):
#   SMITHERY_API_TOKEN  — Smithery service token (smithery.ai → API tokens)
#   CLAWHUB_TOKEN       — ClawHub auth token (clawhub.ai → Settings)
# Optional vars:
#   SMITHERY_MCP_URL    — Explicit public, unauthenticated MCP endpoint for Smithery
#   GLAMA_WEBHOOK_URL   — Glama rebuild webhook (POST JSON: ref, commit, version, dockerfile)

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smithery:
    name: Publish to Smithery
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version
        id: meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # workflow_dispatch may run from main or a tag — prefer tag, fall back to pyproject.toml
            REF="${GITHUB_REF_NAME#v}"
            if echo "$REF" | grep -qE '^[0-9]+\.[0-9]+'; then
              VERSION="$REF"
            else
              VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            fi
          else
            VERSION="${HEAD_BRANCH#v}"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Smithery configuration
        id: smithery_config
        env:
          SMITHERY_API_TOKEN: ${{ secrets.SMITHERY_API_TOKEN }}
          SMITHERY_MCP_URL: ${{ vars.SMITHERY_MCP_URL }}
        run: |
          if [ -z "${SMITHERY_MCP_URL:-}" ]; then
            echo "::notice::SMITHERY_MCP_URL not configured — skipping Smithery publish"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$SMITHERY_MCP_URL" in
            https://server.smithery.ai/*|http://server.smithery.ai/*)
              echo "::warning::SMITHERY_MCP_URL points at Smithery's hosted proxy, not agent-bom's upstream MCP origin. Skipping Smithery publish to avoid publishing the proxy back to itself."
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          if [ -z "${SMITHERY_API_TOKEN:-}" ]; then
            echo "::notice::SMITHERY_API_TOKEN not configured — skipping Smithery publish"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      # Post-publish liveness probe of the configured upstream endpoint. Best-effort
      # confirmation, NOT a gate: Smithery rebuilds the server asynchronously
      # (the new version may not be live for minutes). A hard failure here
      # previously red-failed the whole publish even though the catalog push
      # (next step) succeeded. Warn instead so staleness stays visible without
      # burning the run.
      - name: Validate Smithery public endpoint
        if: steps.smithery_config.outputs.enabled == 'true'
        continue-on-error: true
        env:
          SMITHERY_MCP_URL: ${{ vars.SMITHERY_MCP_URL }}
        run: |
          if RESPONSE=$(PYTHONPATH=src python3 -m agent_bom.deployment_probe \
              --base-url "$SMITHERY_MCP_URL" \
              --attempts 3 \
              --backoff-seconds 5 \
              --timeout 15 2>&1); then
            PUBLIC_VERSION=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              print(json.load(sys.stdin).get('version', 'unknown'))
          except Exception:
              print('unknown')
          ")
            PUBLIC_TOOLS=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              print(data.get('tool_count', data.get('mcp_metrics', {}).get('tool_count', 'unknown')))
          except Exception:
              print('unknown')
          ")
            echo "Smithery upstream endpoint version: ${PUBLIC_VERSION}"
            echo "Smithery upstream endpoint tool count: ${PUBLIC_TOOLS}"
          else
            echo "::warning::Could not read version from the configured Smithery upstream endpoint (${SMITHERY_MCP_URL}). Expected while Smithery is still rebuilding (async). The catalog publish below still runs; deployment-freshness owns hard drift detection."
          fi

      - name: Publish to Smithery
        if: steps.smithery_config.outputs.enabled == 'true'
        env:
          SMITHERY_API_TOKEN: ${{ secrets.SMITHERY_API_TOKEN }}
          SMITHERY_MCP_URL: ${{ vars.SMITHERY_MCP_URL }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          QUALIFIED_NAME="agent-bom%2Fagent-bom"
          MCP_URL="${SMITHERY_MCP_URL}"

          echo "Publishing agent-bom v${VERSION} to Smithery..."

          # Retry up to 3 times with exponential backoff (handles transient 5xx)
          for ATTEMPT in 1 2 3; do
            HTTP_STATUS=$(curl -s --connect-timeout 10 --max-time 30 \
              -o /tmp/smithery-response.json -w "%{http_code}" \
              -X PUT "https://api.smithery.ai/servers/${QUALIFIED_NAME}/releases" \
              -H "Authorization: Bearer ${SMITHERY_API_TOKEN}" \
              -F "payload={
                \"type\": \"external\",
                \"upstreamUrl\": \"${MCP_URL}\",
                \"configSchema\": {
                  \"type\": \"object\",
                  \"properties\": {
                    \"NVD_API_KEY\": {
                      \"type\": \"string\",
                      \"description\": \"NVD API key for higher rate limits on CVSS enrichment (optional)\"
                    }
                  },
                  \"required\": []
                }
              }")

            echo "Smithery attempt ${ATTEMPT}/3 — HTTP ${HTTP_STATUS}"

            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "Smithery publish succeeded"
              break
            elif [ "$HTTP_STATUS" -eq 429 ] && [ "$ATTEMPT" -lt 3 ]; then
              DELAY=$((ATTEMPT * 15))
              echo "Rate limited — retrying in ${DELAY}s..."
              sleep "$DELAY"
            elif [ "$HTTP_STATUS" -ge 500 ] && [ "$ATTEMPT" -lt 3 ]; then
              DELAY=$((ATTEMPT * 10))
              echo "Server error — retrying in ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "::error::Smithery publish failed with HTTP ${HTTP_STATUS}"
              # Log only error message, not full response (may contain auth context)
              jq -r '.error // .message // "unknown error"' /tmp/smithery-response.json 2>/dev/null || echo "(non-JSON response)"
              exit 1
            fi
          done

  glama:
    name: Trigger Glama Rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin to the release commit so manifest/Dockerfile checks and webhook
          # payload match the tag the Release workflow just published.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Extract release metadata
        id: meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REF="${GITHUB_REF_NAME#v}"
            if echo "$REF" | grep -qE '^[0-9]+\.[0-9]+'; then
              VERSION="$REF"
            else
              VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            fi
            RELEASE_REF="refs/tags/v${VERSION}"
            RELEASE_SHA=$(git rev-parse HEAD)
          else
            VERSION="${HEAD_BRANCH#v}"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            fi
            RELEASE_REF="refs/tags/${HEAD_BRANCH}"
            RELEASE_SHA="${HEAD_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify Glama build manifest
        run: python scripts/check_glama_listing.py --verify-manifest

      - name: Trigger Glama rebuild
        env:
          GLAMA_WEBHOOK_URL: ${{ vars.GLAMA_WEBHOOK_URL }}
          RELEASE_REF: ${{ steps.meta.outputs.release_ref }}
          RELEASE_SHA: ${{ steps.meta.outputs.release_sha }}
          VERSION: ${{ steps.meta.outputs.version }}
          GLAMA_DOCKERFILE: integrations/glama/Dockerfile
        run: |
          if [ -z "$GLAMA_WEBHOOK_URL" ]; then
            echo "::warning::GLAMA_WEBHOOK_URL not configured — verifying Glama auto-sync freshness instead"
            echo "To enable instant rebuild, set GLAMA_WEBHOOK_URL in repo variables"
            exit 0
          fi
          PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({
              "ref": os.environ["RELEASE_REF"],
              "commit": os.environ["RELEASE_SHA"],
              "version": os.environ["VERSION"],
              "dockerfile": os.environ["GLAMA_DOCKERFILE"],
          }, separators=(",", ":")))')
          echo "Triggering Glama rebuild for ${RELEASE_REF} (${RELEASE_SHA:0:7}) using ${GLAMA_DOCKERFILE}"
          HTTP_STATUS=$(curl -s --connect-timeout 10 --max-time 30 \
            -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            -X POST "$GLAMA_WEBHOOK_URL")
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "Glama rebuild triggered successfully"
          else
            echo "::warning::Glama rebuild trigger returned HTTP ${HTTP_STATUS} — may need manual rebuild"
          fi

      # Glama re-crawls listings on its own cadence (can be hours), so a tight
      # post-trigger freshness window legitimately fails on release day even
      # though the rebuild was triggered. Warn instead of red-failing the
      # publish; the listing self-resolves once Glama re-crawls.
      - name: Verify Glama listing freshness
        continue-on-error: true
        env:
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if ! python scripts/check_glama_listing.py --expected "$EXPECTED_VERSION" --retries 6 --delay-seconds 30; then
            echo "::warning::Glama listing not yet refreshed to the new version. Glama re-crawls asynchronously (can take hours); the rebuild was already triggered, so this self-resolves. Listing: https://glama.ai/mcp/servers/msaad00/agent-bom"
          fi

  clawhub:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version
        id: meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # workflow_dispatch may run from main or a tag — prefer tag, fall back to pyproject.toml
            REF="${GITHUB_REF_NAME#v}"
            if echo "$REF" | grep -qE '^[0-9]+\.[0-9]+'; then
              VERSION="$REF"
            else
              VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            fi
          else
            VERSION="${HEAD_BRANCH#v}"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Check ClawHub configuration
        id: clawhub_config
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "${CLAWHUB_TOKEN:-}" ]; then
            echo "::notice::CLAWHUB_TOKEN not configured — skipping ClawHub publish"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Install ClawHub CLI
        if: steps.clawhub_config.outputs.enabled == 'true'
        run: |
          npm install -g clawhub@latest
          # `clawhub --version` is not a supported option on the current CLI, so
          # use --help as a binary-present probe instead. `npm install -g` already
          # exits non-zero on install failure; this just confirms the command is
          # on PATH before the publish step runs.
          clawhub --help > /dev/null

      - name: Publish to ClawHub
        if: steps.clawhub_config.outputs.enabled == 'true'
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          echo "Publishing agent-bom v${VERSION} to ClawHub..."
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser

          _publish_skill() {
            local DIR="$1" SLUG="$2" FATAL="${3:-true}"
            local DISPLAY_NAME="${4:-$SLUG}"

            if [ ! -d "$DIR" ]; then
              echo "::warning::No files found in ${DIR} — skipping"
              return 0
            fi

            # Idempotency: if the exact same version already exists on ClawHub,
            # treat it as success rather than churning the retry loop. Run the
            # publish once and capture output so we can detect the 'already
            # exists' signal in the retry-or-exit branch below.
            local TMP_OUT
            TMP_OUT=$(mktemp)
            for ATTEMPT in 1 2 3; do
              echo "ClawHub ${SLUG} attempt ${ATTEMPT}/3..."
              if clawhub publish "$DIR" \
                --slug "$SLUG" \
                --name "$DISPLAY_NAME" \
                --version "$VERSION" \
                --changelog "Release v${VERSION}" \
                --tags latest 2>&1 | tee "$TMP_OUT"; then
                echo "ClawHub ${SLUG} v${VERSION} published"
                rm -f "$TMP_OUT"
                return 0
              fi
              # Idempotent path: ClawHub reports 'already exists' / 'version
              # already published' / HTTP 409 when the same version is re-pushed.
              # That's success for a re-run of the same release — close #1547.
              if grep -qiE 'already (exists|published)|version.*conflict|http 409|status.*409' "$TMP_OUT"; then
                echo "::notice::ClawHub ${SLUG} v${VERSION} already published — treating as success (idempotent)"
                rm -f "$TMP_OUT"
                return 0
              fi
              echo "ClawHub ${SLUG} publish failed"
              if [ "$ATTEMPT" -lt 3 ]; then
                sleep $((ATTEMPT * 10))
              fi
            done
            rm -f "$TMP_OUT"
            if [ "$FATAL" = "true" ]; then
              echo "::error::ClawHub ${SLUG} publish failed after 3 attempts"
              return 1
            else
              echo "::warning::ClawHub ${SLUG} publish failed — non-fatal"
              return 0
            fi
          }

          # Curated, focused skills only. Do not publish the oversized omnibus root
          # skill to ClawHub — keep the marketplace surface small and guardrailed.
          _publish_skill "integrations/openclaw/scan"       "agent-bom-scan"       true  "agent-bom scan"
          _publish_skill "integrations/openclaw/compliance" "agent-bom-compliance" false "agent-bom compliance"
          _publish_skill "integrations/openclaw/registry"   "agent-bom-registry"   false "agent-bom registry"
          _publish_skill "integrations/openclaw/runtime"    "agent-bom-runtime"    false "agent-bom runtime"
          _publish_skill "integrations/openclaw/discover-aws" "agent-bom-discover-aws" false "agent-bom discover aws"
          _publish_skill "integrations/openclaw/discover-azure" "agent-bom-discover-azure" false "agent-bom discover azure"
          _publish_skill "integrations/openclaw/discover-gcp" "agent-bom-discover-gcp" false "agent-bom discover gcp"
          _publish_skill "integrations/openclaw/discover-snowflake" "agent-bom-discover-snowflake" false "agent-bom discover snowflake"
          _publish_skill "integrations/openclaw/ingest" "agent-bom-ingest" false "agent-bom ingest"
          _publish_skill "integrations/openclaw/vulnerability-intel" "agent-bom-vulnerability-intel" false "agent-bom vulnerability intel"
