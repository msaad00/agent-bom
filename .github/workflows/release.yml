name: Release

on:
  push:
    tags:
      - "v*.*.*"  # semver only — excludes floating tags like v0

permissions: {}  # all permissions denied by default; jobs declare only what they need

jobs:
  version-guard:
    name: Verify tag/version alignment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject version matches tag
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          tag = "${{ steps.meta.outputs.version }}"
          text = Path("pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          if not m:
              raise SystemExit("pyproject.toml version not found")
          pkg = m.group(1)
          if pkg != tag:
              raise SystemExit(f"Tag version {tag} does not match pyproject version {pkg}")
          print(f"Version aligned: {pkg}")
          PY

  build:
    name: Build distribution
    needs: version-guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Build dashboard
        run: |
          cd ui && npm ci && NEXT_EXPORT=1 npm run build
          cp -r out ../src/agent_bom/ui_dist

      - name: Build package
        run: rm -rf dist/ && uv run --with build==1.4.0 python -m build

      - name: Verify package
        run: uvx twine==6.2.0 check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-package-distributions
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: [build, self-scan-gate, container-gate]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-bom
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  docker-publish:
    name: Publish to Docker Hub
    needs: [build, self-scan-gate, container-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # required for SLSA provenance attestation
      attestations: write   # required for SBOM + provenance attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.meta.outputs.version }}
          provenance: true   # SLSA provenance attestation — enables Docker Scout policy evaluation
          sbom: true         # SBOM attestation — enables Docker Scout supply chain policies
          tags: |
            agentbom/agent-bom:${{ steps.meta.outputs.version }}
            agentbom/agent-bom:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=agent-bom
            org.opencontainers.image.description=AI security scanner for agents, MCP, containers, cloud, and runtime
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Sync Docker Hub README
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          TOKEN=$(curl -sf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Docker Hub login failed"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          DESCRIPTION=$(cat DOCKER_HUB_README.md | jq -Rs .)
          curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://hub.docker.com/v2/repositories/agentbom/agent-bom/" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"full_description\": ${DESCRIPTION}, \"description\": \"AI security scanner for agents, MCP, containers, cloud, and runtime\"}"

      - name: Clean up old Docker Hub tags (keep last 10)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          REPO="agentbom/agent-bom"
          TOKEN=$(curl -sf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.token')
          [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ] && { echo "::warning::Docker Hub login failed — skipping cleanup"; exit 0; }
          echo "::add-mask::$TOKEN"

          ALL_TAGS=$(curl -sf "https://hub.docker.com/v2/repositories/${REPO}/tags/?page_size=100&ordering=-last_updated" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.results[].name')
          SEMVER_TAGS=$(echo "$ALL_TAGS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true)
          KEEP=$(echo "$SEMVER_TAGS" | head -n 10)

          for tag in $ALL_TAGS; do
            echo "$tag" | grep -qE '^(latest|0)$' && continue
            echo "$KEEP" | grep -qxF "$tag" && continue
            echo "Deleting $tag"
            curl -sf -o /dev/null -X DELETE \
              "https://hub.docker.com/v2/repositories/${REPO}/tags/${tag}" \
              -H "Authorization: Bearer $TOKEN" || true
          done

  container-gate:
    name: Container release gate
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build release candidate image
        run: docker build -t agent-bom:release-test .

      - name: Smoke test release image
        run: docker run --rm agent-bom:release-test --version

      - name: Trivy image scan gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: agent-bom:release-test
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivyignores: .trivyignore

  self-scan-gate:
    name: Self-scan release gate
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install agent-bom (from source)
        run: uv sync --extra dev

      - name: npm audit (ui/ deps) — block release on high/critical
        run: |
          cd ui
          npm ci --ignore-scripts
          npm audit --audit-level=high

      - name: Self dep scan — block release on critical CVE
        run: |
          mkdir -p sarif
          uv run agent-bom scan --self-scan \
            --format sarif \
            -o sarif/release-self-dep.sarif \
            --fail-on-severity critical \
            --exclude-unfixable \
            --quiet

      - name: Upload release self-scan SARIF
        if: always() && hashFiles('sarif/release-self-dep.sarif') != ''
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: sarif/release-self-dep.sarif
          category: agent-bom-release-gate

  sbom:
    name: Generate CycloneDX SBOM
    needs: [build, self-scan-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Generate CycloneDX SBOM (cyclonedx-py — standard)
        run: uv run --with cyclonedx-bom==7.2.2 cyclonedx-py environment -o agent-bom-sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: agent-bom-sbom
          path: agent-bom-sbom.cdx.json

  sign:
    name: Sign distribution with Sigstore
    needs: [build, self-scan-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Sigstore OIDC
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign wheels and sdist
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob "$f" --yes --bundle "${f}.sigstore.json"
          done

      - name: Upload signed bundles
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-package-signatures
          path: dist/*.sigstore.json

  provenance:
    name: Generate SLSA provenance
    needs: [build, self-scan-gate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Export provenance bundles for release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p provenance
          for f in dist/*.whl dist/*.tar.gz; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            digest=$(sha256sum "$f" | awk '{print $1}')
            gh attestation download "$f" \
              --repo "${{ github.repository }}" \
              --format json
            src="sha256:${digest}.jsonl"
            [ -f "$src" ] || src="sha256-${digest}.jsonl"
            if [ ! -f "$src" ]; then
              echo "Expected provenance bundle for $name was not downloaded" >&2
              exit 1
            fi
            mv "$src" "provenance/${name}.intoto.jsonl"
          done

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: slsa-provenance
          path: provenance/
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    # Only requires PyPI publish — Docker Hub is best-effort (needs external secrets)
    needs: [pypi-publish, sign, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Download signatures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-signatures
          path: dist/

      - name: Download provenance bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: slsa-provenance
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — uploading assets"
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "agent-bom $TAG" \
              --generate-notes
          fi

      - name: Update floating major tag (v0)
        run: |
          MAJOR=$(echo "${{ github.ref_name }}" | grep -oP '^v\d+')
          if [ -n "$MAJOR" ]; then
            git tag -f "$MAJOR" "${{ github.ref_name }}"
            git push origin "$MAJOR" --force
            echo "Updated floating tag $MAJOR → ${{ github.ref_name }}"
          fi
