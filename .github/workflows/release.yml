name: Release

on:
  push:
    tags:
      - "v*.*.*"  # semver only — excludes floating tags like v0

permissions: {}  # all permissions denied by default; jobs declare only what they need

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-guard:
    name: Verify tag/version alignment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject version matches tag
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          tag = "${{ steps.meta.outputs.version }}"
          text = Path("pyproject.toml").read_text()
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          if not m:
              raise SystemExit("pyproject.toml version not found")
          pkg = m.group(1)
          if pkg != tag:
              raise SystemExit(f"Tag version {tag} does not match pyproject version {pkg}")
          print(f"Version aligned: {pkg}")
          PY

      - name: Verify CHANGELOG contains release entry
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          tag = "${{ steps.meta.outputs.version }}"
          changelog = Path("CHANGELOG.md")
          if not changelog.is_file():
              raise SystemExit("CHANGELOG.md not found")
          text = changelog.read_text(encoding="utf-8")
          if not re.search(rf"^## \[{re.escape(tag)}\](?:\s|$)", text, re.M):
              raise SystemExit(f"CHANGELOG.md is missing release entry: ## [{tag}]")
          print(f"CHANGELOG entry present: {tag}")
          PY

      - name: Verify auxiliary versions track the release tag
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          tag = "${{ steps.meta.outputs.version }}"
          errors: list[str] = []

          # Helm chart `version:` (chart SemVer) and `appVersion:` both track the platform tag.
          chart_text = Path("deploy/helm/agent-bom/Chart.yaml").read_text(encoding="utf-8")
          chart_version = re.search(r"^version:\s*(\S+)", chart_text, re.M)
          chart_app_version = re.search(r'^appVersion:\s*"([^"]+)"', chart_text, re.M)
          if not chart_version:
              errors.append("Chart.yaml: version: not found")
          elif chart_version.group(1) != tag:
              errors.append(f"Chart.yaml version {chart_version.group(1)} does not match tag {tag}")
          if not chart_app_version:
              errors.append("Chart.yaml: appVersion: not found")
          elif chart_app_version.group(1) != tag:
              errors.append(f"Chart.yaml appVersion {chart_app_version.group(1)} does not match tag {tag}")

          # ui/package.json `version` tracks the platform tag so the published image and
          # the bundle manifest agree on what version is shipping.
          ui_pkg = json.loads(Path("ui/package.json").read_text(encoding="utf-8"))
          ui_version = ui_pkg.get("version")
          if ui_version != tag:
              errors.append(f"ui/package.json version {ui_version!r} does not match tag {tag}")

          if errors:
              raise SystemExit("\n".join(errors))
          print(f"Auxiliary versions aligned with {tag}: chart, appVersion, ui/package.json")
          PY

      - name: Block Finder duplicate artifacts
        run: python3 scripts/check_duplicate_artifacts.py

  docs-site:
    name: Rebuild and deploy docs
    needs: version-guard
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/docs.yml
    with:
      deploy: false

  build:
    name: Build distribution
    needs: version-guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Build dashboard
        run: |
          cd ui && npm ci && NEXT_EXPORT=1 npm run build
          cp -r out ../src/agent_bom/ui_dist
          python ../scripts/generate_ui_csp_hashes.py ../src/agent_bom/ui_dist

      - name: Build package
        run: rm -rf dist/ && uv run --with build==1.4.0 python -m build

      - name: Verify package
        run: |
          uvx twine==6.2.0 check dist/*
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("agent_bom-*.whl"))
          required = {
              "agent_bom/data/inventory.schema.json",
              "agent_bom/data/mcp-intelligence.schema.json",
          }
          with ZipFile(wheel) as archive:
              names = set(archive.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"wheel is missing required package data: {', '.join(missing)}")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: [build, self-scan-gate, container-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/agent-bom
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  docker-publish:
    name: Publish to Docker Hub
    needs: [build, self-scan-gate, container-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write       # required for SLSA provenance attestation
      attestations: write   # required for SBOM + provenance attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build-api-image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.meta.outputs.version }}
          provenance: true   # SLSA provenance attestation — enables Docker Scout policy evaluation
          sbom: true         # SBOM attestation — enables Docker Scout supply chain policies
          tags: |
            agentbom/agent-bom:${{ steps.meta.outputs.version }}
            agentbom/agent-bom:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=agent-bom
            org.opencontainers.image.description=Open security scanner for AI supply chain and infrastructure — agents, MCP, packages, containers, cloud, GPU, and runtime.
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign API image
        run: cosign sign --yes "agentbom/agent-bom@${{ steps.build-api-image.outputs.digest }}"

      - name: Attest API image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: index.docker.io/agentbom/agent-bom
          subject-digest: ${{ steps.build-api-image.outputs.digest }}
          push-to-registry: true

      - name: Sync Docker Hub README
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_DESCRIPTION="Open security scanner for AI supply chain and infrastructure: agents, MCP, cloud, GPU, runtime."
          TOKEN=$(curl -sf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Docker Hub login failed"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          DESCRIPTION=$(jq -Rs . < DOCKER_HUB_README.md)
          SHORT_DESCRIPTION_JSON=$(printf '%s' "$SHORT_DESCRIPTION" | jq -Rs .)
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" -X PATCH \
            "https://hub.docker.com/v2/repositories/agentbom/agent-bom/" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"full_description\": ${DESCRIPTION}, \"description\": ${SHORT_DESCRIPTION_JSON}}")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Docker Hub README sync failed (HTTP $HTTP_CODE)"
            cat "$RESPONSE_FILE"
            exit 1
          fi
          rm -f "$RESPONSE_FILE"

      - name: Clean up old Docker Hub tags (keep last 10)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="agentbom/agent-bom"
          CURRENT_VERSION="${{ steps.meta.outputs.version }}"
          TOKEN=$(curl -sf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.token') || {
            echo "::error::Docker Hub login curl failed during cleanup"
            exit 1
          }
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Docker Hub login returned empty token during cleanup"
            exit 1
          fi
          echo "::add-mask::$TOKEN"

          ALL_TAGS=$(curl -sf "https://hub.docker.com/v2/repositories/${REPO}/tags/?page_size=100&ordering=-last_updated" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.results[].name')
          SEMVER_TAGS=$(printf '%s\n' "$ALL_TAGS" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -Vr || true)
          KEEP=$(printf '%s\n%s\n' "$CURRENT_VERSION" "$SEMVER_TAGS" | awk 'NF && !seen[$0]++' | head -n 10)

          echo "Keeping Docker Hub tags:"
          printf '  %s\n' latest 0
          printf '%s\n' "$KEEP" | sed '/^$/d;s/^/  /'

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "$tag" | grep -qE '^(latest|0)$' && continue
            [ "$tag" = "$CURRENT_VERSION" ] && continue
            echo "$KEEP" | grep -qxF "$tag" && continue
            echo "Deleting $tag"
            curl -sf -o /dev/null -X DELETE \
              "https://hub.docker.com/v2/repositories/${REPO}/tags/${tag}" \
              -H "Authorization: Bearer $TOKEN" || true
          done <<< "$ALL_TAGS"

  docker-publish-ui:
    name: Publish UI image
    needs: [build, self-scan-gate, container-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Smoke test UI container
        run: |
          set -euo pipefail
          cleanup() {
            status=$?
            if [ $status -ne 0 ]; then
              docker logs agent-bom-ui-smoke || true
            fi
            docker stop agent-bom-ui-smoke >/dev/null 2>&1 || true
            exit $status
          }
          docker build -f ui/Dockerfile -t agent-bom-ui:release-test ui
          docker run -d --rm --name agent-bom-ui-smoke -p 3000:3000 -e NEXT_PUBLIC_API_URL= agent-bom-ui:release-test
          trap cleanup EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000/ >/dev/null || {
            echo "::error::UI container did not become healthy in time"
            exit 1
          }

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push UI image
        id: build-ui-image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ui
          file: ui/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_URL=
          provenance: true
          sbom: true
          tags: |
            agentbom/agent-bom-ui:${{ steps.meta.outputs.version }}
            agentbom/agent-bom-ui:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=agent-bom-ui
            org.opencontainers.image.description=Standalone browser UI for the self-hosted agent-bom control plane. Requires the agent-bom API image.
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Sync UI Docker Hub README
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_DESCRIPTION="Standalone browser UI for the self-hosted agent-bom control plane. Requires the agent-bom API image."
          TOKEN=$(curl -sf -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Docker Hub login failed"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          DESCRIPTION=$(jq -Rs . < DOCKER_HUB_UI_README.md)
          SHORT_DESCRIPTION_JSON=$(printf '%s' "$SHORT_DESCRIPTION" | jq -Rs .)
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" -X PATCH \
            "https://hub.docker.com/v2/repositories/agentbom/agent-bom-ui/" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"full_description\": ${DESCRIPTION}, \"description\": ${SHORT_DESCRIPTION_JSON}}")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Docker Hub UI README sync failed (HTTP $HTTP_CODE)"
            cat "$RESPONSE_FILE"
            exit 1
          fi
          rm -f "$RESPONSE_FILE"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign UI image
        run: cosign sign --yes "agentbom/agent-bom-ui@${{ steps.build-ui-image.outputs.digest }}"

      - name: Attest UI image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: index.docker.io/agentbom/agent-bom-ui
          subject-digest: ${{ steps.build-ui-image.outputs.digest }}
          push-to-registry: true

  published-image-self-scan:
    name: Self-scan published image
    needs: docker-publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Pull published API image
        run: docker pull agentbom/agent-bom:${{ steps.meta.outputs.version }}

      - name: Scan published API image with agent-bom
        run: uv run agent-bom image agentbom/agent-bom:${{ steps.meta.outputs.version }} --format json --output published-image-self-scan.json

      - name: Upload published image self-scan artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: published-image-self-scan
          path: published-image-self-scan.json

  helm-publish:
    name: Publish Helm chart to OCI
    needs: [version-guard, self-scan-gate, container-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        run: |
          set -euo pipefail
          HELM_VERSION="3.18.6"
          HELM_SHA256="3f43c0aa57243852dd542493a0f54f1396c0bc8ec7296bbb2c01e802010819ce"
          HELM_ARCHIVE="helm-v${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLo "/tmp/${HELM_ARCHIVE}" "https://get.helm.sh/${HELM_ARCHIVE}"
          echo "${HELM_SHA256}  /tmp/${HELM_ARCHIVE}" | sha256sum -c -
          tar -xzf "/tmp/${HELM_ARCHIVE}" -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Package release chart
        run: |
          set -euo pipefail
          rm -rf /tmp/agent-bom-chart
          cp -R deploy/helm/agent-bom /tmp/agent-bom-chart
          python3 - <<'PY'
          from pathlib import Path
          import re

          version = "${{ steps.meta.outputs.version }}"
          chart = Path("/tmp/agent-bom-chart/Chart.yaml")
          text = chart.read_text()
          text = re.sub(r"^version: .+$", f"version: {version}", text, flags=re.MULTILINE)
          text = re.sub(r'^appVersion: ".+"$', f'appVersion: "{version}"', text, flags=re.MULTILINE)
          chart.write_text(text)
          PY
          mkdir -p dist/helm
          helm package /tmp/agent-bom-chart --destination dist/helm

      - name: Login to GHCR OCI registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "${GH_TOKEN}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to OCI registry
        run: helm push "dist/helm/agent-bom-${{ steps.meta.outputs.version }}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Attest Helm chart package
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/helm/agent-bom-${{ steps.meta.outputs.version }}.tgz

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart
          path: dist/helm/agent-bom-${{ steps.meta.outputs.version }}.tgz

  container-gate:
    name: Container release gate
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build release candidate image
        run: docker build -t agent-bom:release-test .

      - name: Smoke test release image
        run: docker run --rm agent-bom:release-test --version

      - name: Image vulnerability scan gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: agent-bom:release-test
          format: table
          severity: MEDIUM,HIGH,CRITICAL,UNKNOWN
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .image-scan-ignore

  self-scan-gate:
    name: Self-scan release gate
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install agent-bom (from source)
        run: uv sync --frozen --extra dev

      - name: Verify release consistency map
        run: python scripts/check_release_consistency.py

      - name: npm audit (ui/ deps) — block release on high/critical
        run: |
          cd ui
          npm ci --ignore-scripts
          npm audit --audit-level=high

      - name: OSV scanner (ui lockfile) — block release on fixable CVEs
        run: |
          OSV_SCANNER_VERSION="v2.3.3"
          OSV_SCANNER_SHA256="777b4bb7ddd10bdcc8a1aa398d37d05e91e866e7586f9cff3fca2f72b8153033"
          curl -fsSL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  /tmp/osv-scanner" | sha256sum -c -
          install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner scan --config osv-scanner.toml --lockfile=ui/package-lock.json 2>&1 | tee /tmp/osv-ui-release.txt || {
            FIXABLE=$(grep -E "^\|" /tmp/osv-ui-release.txt | grep -v "| -- " | grep -v "OSV URL" | grep -v "+--" | head -5)
            if [ -n "$FIXABLE" ]; then
              echo "::error::osv-scanner found UI lockfile vulnerabilities with available fixes:"
              echo "$FIXABLE"
              exit 1
            fi
            echo "::warning::osv-scanner found only unfixable UI lockfile CVEs (no upstream fix) — passing"
          }

      - name: pip-audit (shipping Python deps) — block release on high/critical or fixable CVEs
        run: |
          set +e
          uv run --with pip-audit pip-audit --ignore-vuln CVE-2026-3219 \
            -s osv \
            --format json \
            --output release-pip-audit.json
          set -e

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("release-pip-audit.json")
          if not path.is_file():
              raise SystemExit("pip-audit did not produce release-pip-audit.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          fixable = []
          severe = []
          for dependency in data.get("dependencies", []):
              dep_name = dependency.get("name", "<unknown>")
              dep_version = dependency.get("version", "<unknown>")
              for vuln in dependency.get("vulns", []):
                  vuln_id = vuln.get("id", "<unknown>")
                  severity = str(vuln.get("severity") or vuln.get("severity_level") or "").upper()
                  fix_versions = vuln.get("fix_versions") or []
                  if severity in {"HIGH", "CRITICAL"}:
                      severe.append(f"{dep_name} {dep_version} {vuln_id} severity={severity}")
                  if fix_versions:
                      fixable.append(f"{dep_name} {dep_version} {vuln_id} fixes={','.join(fix_versions)}")
          if severe:
              print("::error::pip-audit found HIGH/CRITICAL vulnerabilities:")
              print("\n".join(severe[:20]))
              raise SystemExit(1)
          if fixable:
              print("::error::pip-audit found vulnerabilities with available fixes:")
              print("\n".join(fixable[:20]))
              raise SystemExit(1)
          print("pip-audit release gate passed: no HIGH/CRITICAL or fixable findings")
          PY

      - name: Self dep scan evidence — bounded, no opportunistic DB refresh
        run: |
          set +e
          mkdir -p sarif
          timeout 240s uv run agent-bom scan --self-scan \
            --format sarif \
            -o sarif/release-self-dep.sarif \
            --fail-on-severity critical \
            --exclude-unfixable \
            --no-auto-update-db \
            --quiet
          scan_exit=$?
          set -e

          if [ "$scan_exit" -eq 124 ]; then
            echo "::warning::agent-bom self-scan evidence timed out after 240s; pip-audit already enforced the dependency release gate."
            cat > sarif/release-self-dep.sarif <<'EOF'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "agent-bom release self-scan",
                    "version": "${{ needs.version-guard.outputs.version }}",
                    "informationUri": "https://github.com/msaad00/agent-bom"
                  }
                },
                "results": []
              }
            ]
          }
          EOF
            exit 0
          fi

          if [ "$scan_exit" -ne 0 ]; then
            echo "::error::agent-bom release self-scan found critical findings or failed with exit ${scan_exit}"
            exit "$scan_exit"
          fi

          if [ ! -s sarif/release-self-dep.sarif ]; then
            echo "::error::agent-bom release self-scan did not produce SARIF evidence"
            exit 2
          fi

      - name: Upload release self-scan SARIF
        if: always() && hashFiles('sarif/release-self-dep.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: sarif/release-self-dep.sarif
          category: agent-bom-release-gate

  sbom:
    name: Generate CycloneDX SBOM
    needs: [build, self-scan-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Generate CycloneDX SBOM (cyclonedx-py — standard)
        run: uv run --with cyclonedx-bom==7.2.2 cyclonedx-py environment -o agent-bom-sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-bom-sbom
          path: agent-bom-sbom.cdx.json

  sign:
    name: Sign distribution with Sigstore
    needs: [build, self-scan-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # required for Sigstore OIDC
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign wheels and sdist
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob "$f" --yes --bundle "${f}.sigstore.json"
          done

      - name: Upload signed bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-signatures
          path: dist/*.sigstore.json

  provenance:
    name: Generate SLSA provenance
    needs: [build, self-scan-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Export provenance bundles for release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p provenance
          for f in dist/*.whl dist/*.tar.gz; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            artifact_path="$(pwd)/$f"
            download_dir=$(mktemp -d)
            (
              cd "$download_dir"
              gh attestation download "$artifact_path" \
                --repo "${{ github.repository }}"
            )
            src=$(find "$download_dir" -maxdepth 1 -type f -name '*.jsonl' | head -n 1 || true)
            if [ -z "$src" ] || [ ! -f "$src" ]; then
              echo "Expected provenance bundle for $name was not downloaded" >&2
              ls -la "$download_dir" >&2 || true
              exit 1
            fi
            mv "$src" "provenance/${name}.intoto.jsonl"
            rm -rf "$download_dir"
          done

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: slsa-provenance
          path: provenance/
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    # Keep the post-publish image self-scan running, but do not let a slow
    # registry scan delay minting the GitHub Release after artifacts are out.
    needs: [pypi-publish, docker-publish, docker-publish-ui, sign, provenance, sbom, helm-publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Download signatures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-signatures
          path: dist/

      - name: Download provenance bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: slsa-provenance
          path: dist/

      - name: Download CycloneDX SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent-bom-sbom
          path: dist/

      - name: Download Helm chart artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-chart
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — uploading assets"
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "agent-bom $TAG" \
              --generate-notes
          fi

      - name: Update floating major tag (v0)
        if: ${{ vars.AGENT_BOM_UPDATE_FLOATING_MAJOR_TAGS == '1' }}
        run: |
          MAJOR=$(echo "${{ github.ref_name }}" | grep -oP '^v\d+')
          if [ -n "$MAJOR" ]; then
            git tag -f "$MAJOR" "${{ github.ref_name }}"
            REMOTE_TAG_SHA="$(git ls-remote --tags origin "refs/tags/${MAJOR}" | awk '{print $1}')"
            if [ -n "$REMOTE_TAG_SHA" ]; then
              git push origin "refs/tags/${MAJOR}:refs/tags/${MAJOR}" \
                --force-with-lease="refs/tags/${MAJOR}:${REMOTE_TAG_SHA}"
            else
              git push origin "refs/tags/${MAJOR}:refs/tags/${MAJOR}"
            fi
            echo "Updated floating tag $MAJOR → ${{ github.ref_name }}"
          fi
