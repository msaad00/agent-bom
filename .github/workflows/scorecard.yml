name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'  # Every Monday at 01:30 UTC
  workflow_dispatch:

permissions: {}

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      # Scorecard results are published to securityscorecards.dev via publish_results: true.
      # We intentionally skip upload-sarif here because Scorecard only runs on main
      # (not PRs), and uploading SARIF creates a "code scanning configuration" that
      # GitHub expects on PRs too — causing "1 configuration not found" neutral checks.
