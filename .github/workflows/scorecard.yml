name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 1 * * 1'  # Every Monday at 01:30 UTC
  workflow_dispatch:

permissions: {}

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      # Scorecard results are published to securityscorecards.dev via publish_results: true.
      # We intentionally skip upload-sarif here because Scorecard only runs on main
      # (not PRs), and uploading SARIF creates a "code scanning configuration" that
      # GitHub expects on PRs too — causing "1 configuration not found" neutral checks.
