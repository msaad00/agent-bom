# agent-bom gitleaks configuration.
#
# Extends the default ruleset (nothing is disabled). When a false-positive
# PATTERN recurs, add a narrowly-scoped allowlist here; .gitleaksignore stays
# for genuine one-off fingerprints. Keep every regex anchored to the specific
# field or shape that misfires — never allowlist by entropy, file glob alone,
# or a broad keyword that could mask a real credential.

title = "agent-bom"

[extend]
useDefault = true

[allowlist]
description = "(1) framework_key fields hold registry slugs, not credentials. (2) The named secret-DETECTION test files intentionally contain non-functional fixture secrets to exercise agent-bom's own scanner (mirrors .github/secret_scanning.yml paths-ignore — file-scoped, never a blanket tests/ exclusion)."
regexTarget = "line"
regexes = [
  '''["']?framework_key["']?\s*[:=]''',
]
paths = [
  '''tests/test_ai_enrich_providers\.py$''',
  '''tests/test_dspm_luhn_secrets\.py$''',
  '''tests/test_security\.py$''',
  '''tests/test_trace_attack_path_routes\.py$''',
  '''tests/test_side_scan\.py$''',
  '''tests/test_db_content_scan\.py$''',
]
