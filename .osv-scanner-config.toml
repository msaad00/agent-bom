# pyopenssl — blocked by snowflake cap
[[IgnoredVulns]]
id = "GHSA-68rp-wp8r-4726"
reason = """
pyopenssl DTLS buffer overflow (fixed in pyopenssl>=26.0.0).
BLOCKER: snowflake-connector-python requires pyopenssl<26.0.0 (checked: v4.3.0 still caps at <26.0.0).
NOT EXPLOITABLE: agent-bom does not use DTLS; the vulnerability is in DTLS record parsing
