repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
        exclude: "^deploy/helm/.*/templates/.*\\.ya?ml$"
      - id: check-json
        exclude: "tsconfig.*\\.json$"
      - id: check-toml
      - id: end-of-file-fixer
        exclude: "\\.(svg|png|gif|ico|woff|woff2|ttf|eot)$"
      - id: trailing-whitespace
        exclude: "\\.(md|mdx)$"
      - id: detect-private-key
        exclude: "^tests/|^sdks/shared/test-fixtures\\.json$"
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary, --disable-error-code, import-untyped]
        files: ^src/
        additional_dependencies: [types-PyYAML]
        pass_filenames: true

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [--severity-level, medium, -r]
        files: ^src/
        exclude: ^tests/
