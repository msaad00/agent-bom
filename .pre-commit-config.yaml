repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
        exclude: "^deploy/helm/.*/templates/.*\\.ya?ml$"
      - id: check-json
        exclude: "tsconfig.*\\.json$"
      - id: check-toml
      - id: end-of-file-fixer
        exclude: "\\.(svg|png|gif|ico|woff|woff2|ttf|eot)$"
      - id: trailing-whitespace
        exclude: "\\.(md|mdx)$"
      - id: detect-private-key
        exclude: "^tests/|^sdks/shared/test-fixtures\\.json$"
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary, --disable-error-code, import-untyped]
        files: ^src/
        additional_dependencies: ["pydantic>=2.0", types-PyYAML]
        pass_filenames: true

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [--severity-level, medium, -r]
        files: ^src/
        exclude: ^tests/

  - repo: local
    hooks:
      # Catches new AGENT_BOM_* env vars added under src/agent_bom/ that are
      # neither declared in config.py nor allowlisted. The generator is pure
      # AST-parsing so it runs cleanly under the pre-commit env without the
      # project venv. Same gate the CI Lint stage runs — pre-commit just
      # surfaces it locally before push.
      - id: env-var-reference-drift
        name: env-var reference drift (config.py + allowlist gate)
        entry: python3 scripts/generate_env_var_reference.py --check
        language: system
        pass_filenames: false
        files: ^(src/agent_bom/.*\.py|src/agent_bom/config\.py|scripts/env_var_allowlist\.txt|docs/operations/ENV_VARS\.md)$
      - id: duplicate-artifact-guard
        name: Finder duplicate artifact guard
        # --working-tree also catches untracked Finder copies (e.g. 'nav 2.tsx')
        # that break local tsc/pytest collection but are never staged, so the
        # tracked-only CI guard misses them. Build/cache dirs are ignored.
        entry: python3 scripts/check_duplicate_artifacts.py --working-tree
        language: system
        pass_filenames: false
        always_run: true
      - id: release-workflow-lint
        name: release workflow call-graph (needs + reusable-workflow permissions)
        # Catches the two release startup_failure classes (undeclared needs.<job>
        # refs; reusable-workflow permission under-grant under a deny-all
        # top-level) before they reach a tag push. actionlint misses the
        # permission case. Network-free, dependency-free.
        entry: python3 scripts/lint_release_workflow.py .github/workflows/release.yml
        language: system
        pass_filenames: false
        files: ^\.github/workflows/(release|docs|deploy-mcp-sse)\.yml$
      - id: release-surface-consistency
        name: release surface and generated atlas consistency
        entry: python3 scripts/check_release_consistency.py
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|README\.md|PYPI_README\.md|DOCKER_HUB_README\.md|CHANGELOG\.md|docs/(DATA_MODEL\.md|openapi/v1\.(json|yaml)|PRODUCT_|RELEASE_|PUBLISHING|MCP_SECURITY_MODEL|AI_INFRASTRUCTURE_SCANNING|ENTERPRISE_DEPLOYMENT)|site-docs/|src/agent_bom/(api/|mcp_registry\.json)|integrations/(mcp-registry|glama|openclaw)/|deploy/|Dockerfile|uv\.lock|scripts/(check_release_consistency|regenerate_data_model_atlas)\.py)
