# ── Profile: DEV ─────────────────────────────────────────────────────────────
# agent-bom full-stack compose — API + Dashboard UI + PostgreSQL
#
# Intended for local developer iteration on the API + UI together. For a
# production-shaped deployment, see docker-compose.platform.yml (Docker
# secrets, internal-only Postgres, separated frontend/backend networks).
# For a single-workstation pilot, see docker-compose.pilot.yml.
#
# Credentials: NEVER put secrets in .env or compose env.
# Postgres + control-plane secrets are file-mounted Docker secrets only:
#   printf '%s' "$(openssl rand -hex 32)" > deploy/secrets/postgres_password
#   printf '%s' "$(openssl rand -hex 32)" > deploy/secrets/postgres_app_password
#   printf '%s' "$(openssl rand -hex 32)" > deploy/secrets/api_key
#   printf '%s' "$(openssl rand -hex 32)" > deploy/secrets/audit_hmac_key
#   printf '%s' "$(openssl rand -hex 32)" > deploy/secrets/browser_session_signing_key
#   printf '%s' "$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" \
#     > deploy/secrets/connections_key
#   chmod 0400 deploy/secrets/*
#
# Usage (local dev):
#   # 1. Generate the mounted secret files FIRST — `up` hard-fails without them:
#   make secrets
#   #    (equivalent: python scripts/deploy/hosted_poc_preflight.py --write-secret --skip-compose)
#   # 2. cp .env.example .env   # ports / non-secret URL only
#   # 3. docker compose -f deploy/docker-compose.fullstack.yml up   (or: make fullstack-up)
#
# Then open:
#   Dashboard  →  http://localhost:3000
#   API docs   →  http://localhost:8422/docs
#
# For production, swap the postgres service for a managed Postgres/Supabase URL
# that uses IAM/cert auth when available, or mount AGENT_BOM_POSTGRES_PASSWORD_FILE
# for the DML-only app role — never the bootstrap/admin role.

services:

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agentbom/agent-bom:0.96.0
    container_name: agent-bom-api
    restart: unless-stopped
    command: api --host 0.0.0.0 --port 8422
    environment:
      # Runtime traffic uses the non-superuser app role so FORCE ROW LEVEL
      # SECURITY cannot be bypassed. Password comes from a mounted secret file
      # — never from env / .env / compose interpolation.
      AGENT_BOM_POSTGRES_URL: postgresql://agent_bom_app@postgres:5432/${POSTGRES_DB:-agent_bom}
      AGENT_BOM_POSTGRES_PASSWORD_FILE: /run/secrets/postgres_app_password
      # Optional enrichment API keys
      NVD_API_KEY: ${NVD_API_KEY:-}
      # Optional cloud scanning
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
      SNOWFLAKE_AUTHENTICATOR: ${SNOWFLAKE_AUTHENTICATOR:-}
      SNOWFLAKE_PRIVATE_KEY_PATH: ${SNOWFLAKE_PRIVATE_KEY_PATH:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # Control-plane secrets are Docker secret files only — never .env interpolation.
      # Use docker-compose.pilot.yml for the explicit loopback-only no-auth workstation demo.
      AGENT_BOM_API_KEY_FILE: /run/secrets/api_key
      AGENT_BOM_AUDIT_HMAC_KEY_FILE: /run/secrets/audit_hmac_key
      AGENT_BOM_BROWSER_SESSION_SIGNING_KEY_FILE: /run/secrets/browser_session_signing_key
      AGENT_BOM_CONNECTIONS_KEY_FILE: /run/secrets/connections_key
      # Local dev stack only: filesystem scans should be explicit in shared API setups.
      AGENT_BOM_API_LOCAL_PATH_SCANS: ${AGENT_BOM_API_LOCAL_PATH_SCANS:-disabled}
    secrets:
      - postgres_app_password
      - api_key
      - audit_hmac_key
      - browser_session_signing_key
      - connections_key
    ports:
      - "127.0.0.1:${API_PORT:-8422}:8422"
    volumes:
      # Mount host MCP config dirs read-only so the API can discover local agents
      - ~/.config:/home/abom/.config:ro
      - ~/.claude:/home/abom/.claude:ro
      # Persist vuln DB, scan cache, and control-plane state for the abom user
      - ~/.agent-bom:/home/abom/.agent-bom
    networks:
      - agent-bom
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8422/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Next.js dashboard ─────────────────────────────────────────────────────
  ui:
    build:
      context: ../ui/
      dockerfile: Dockerfile
    image: agentbom/agent-bom-ui:0.96.0
    container_name: agent-bom-ui
    restart: unless-stopped
    environment:
      # The browser same-origins to this UI; the UI's Node server proxies
      # /v1,/health,/ws to NEXT_PUBLIC_API_URL, which must be the API
      # container's in-network DNS name — not the browser's localhost.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8422}
    ports:
      - "127.0.0.1:${UI_PORT:-3000}:3000"
    networks:
      - agent-bom
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL (dev / self-hosted) ─────────────────────────────────────────
  # For production: replace with Supabase, Railway, or any managed Postgres.
  # Bootstrap password + app-role password are Docker secrets only.
  postgres:
    image: postgres:16-alpine
    container_name: agent-bom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_bom}
      # Bootstrap role name for image init only — the API never connects as this user.
      POSTGRES_USER: ${POSTGRES_USER:-agent_bom}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_APP_PASSWORD_FILE: /run/secrets/postgres_app_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    secrets:
      - postgres_password
      - postgres_app_password
    ports:
      # Only expose locally — remove in production
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/postgres/init-wrapper.sh:/docker-entrypoint-initdb.d/00-init-wrapper.sh:ro
      - ./supabase/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      postgres
        -c password_encryption=scram-sha-256
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl
        -c max_connections=100
        -c shared_buffers=128MB
        -c work_mem=4MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_bom} -d ${POSTGRES_DB:-agent_bom}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - agent-bom

volumes:
  postgres-data:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
  postgres_app_password:
    file: ${POSTGRES_APP_PASSWORD_FILE:-./secrets/postgres_app_password}
  api_key:
    file: ${API_KEY_FILE:-./secrets/api_key}
  audit_hmac_key:
    file: ${AUDIT_HMAC_KEY_FILE:-./secrets/audit_hmac_key}
  browser_session_signing_key:
    file: ${BROWSER_SESSION_SIGNING_KEY_FILE:-./secrets/browser_session_signing_key}
  connections_key:
    file: ${CONNECTIONS_KEY_FILE:-./secrets/connections_key}

networks:
  agent-bom:
    name: agent-bom
