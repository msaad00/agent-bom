# ── Profile: HOSTED POC OVERLAY ──────────────────────────────────────────────
# Hosted POC hardening overlay.
#
# OVERLAY ONLY — this file must be layered on docker-compose.platform.yml; it
# fails standalone `docker compose config` by design (no image/build keys).
#
# Use with docker-compose.platform.yml when a public Caddy/ALB front door is
# the only internet-facing listener:
#
#   docker compose \
#     -f deploy/docker-compose.platform.yml \
#     -f deploy/docker-compose.hosted-poc.yml \
#     up -d --build
#
# The base platform file now binds API and UI to loopback by default. This
# overlay keeps the customer-0 VM posture explicit and sets browser-session
# cookies to Secure because Caddy terminates public TLS on 443 and proxies to
# local HTTP ports.

services:
  api:
    environment:
      # Hardened, customer-facing POC posture: auth stays REQUIRED. Anonymous
      # access and demo-estate seeding are NOT set here — that would open every
      # hosted POC anonymously and trips hosted_poc_preflight (which fails closed
      # on AGENT_BOM_ALLOW_UNAUTHENTICATED_API). The public demo opts into those
      # via deploy/docker-compose.demo-override.yml, layered on top.
      - AGENT_BOM_SESSION_COOKIE_SECURE=1
