version: "3.8"

# ── Profile: PRODUCTION-SHAPED ──────────────────────────────────────────────
# Production-like platform deployment: self-hosted `agent-bom` control plane
# with PostgreSQL, using one product split across two images:
#   - API/runtime image
#   - UI companion image
#
# The API service below builds a local image from this repo and tags it as
# `agent-bom:latest` for compose convenience. The published runtime image
# remains `agentbom/agent-bom:*`.
#
# The UI service uses the published `agentbom/agent-bom-ui:*` image. Teams can
# swap that to a local UI build if they are iterating on the frontend.
#
# Defense in depth:
#   - Postgres on internal 'backend' network only — not reachable from host or internet
#   - API bridges backend + frontend networks
#   - UI on frontend only — cannot reach Postgres directly
#   - App connects as agent_bom_app (DML only, no DDL) when POSTGRES_APP_PASSWORD is set
#   - Postgres credentials sourced from Docker secrets (file-mounted at
#     /run/secrets/...), not raw env. Operators provide:
#         deploy/secrets/postgres_password
#         deploy/secrets/postgres_app_password   (optional, for DML-only role)
#     A starter pair lives at deploy/secrets/.gitkeep with file-permission
#     guidance. The api service still consumes POSTGRES_APP_PASSWORD via
#     env to construct AGENT_BOM_POSTGRES_URL (URL-form requirement);
#     wrapper-based file-only injection is tracked as a #1962 follow-up.
#
# Usage:
#   cp .env.example .env                     # set POSTGRES_APP_PASSWORD only
#   echo -n "$POSTGRES_PASSWORD" > deploy/secrets/postgres_password
#   chmod 0400 deploy/secrets/postgres_password
#   export AGENT_BOM_API_KEY="$(openssl rand -hex 32)"  # or set OIDC env below
#   docker compose -f deploy/docker-compose.platform.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-bom-platform-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_bom}
      POSTGRES_USER: ${POSTGRES_USER:-agent_bom}
      # The postgres image natively reads POSTGRES_PASSWORD_FILE from a
      # mounted secret, keeping the password off the docker inspect surface
      # and out of `docker compose config` output.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/postgres/init-wrapper.sh:/docker-entrypoint-initdb.d/00-init-wrapper.sh:ro
      - ./supabase/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_bom} -d ${POSTGRES_DB:-agent_bom}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: >
      postgres
        -c password_encryption=scram-sha-256
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl
        -c max_connections=100
        -c shared_buffers=128MB
    # NO ports exposed — only reachable from backend network
    networks:
      - backend
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agent-bom:latest
    container_name: agent-bom-api
    command: api --host 0.0.0.0 --port 8422
    ports:
      - "8422:8422"
    environment:
      # Use app user (DML only) when available, fall back to admin for dev
      - AGENT_BOM_POSTGRES_URL=postgresql://${POSTGRES_APP_USER:-${POSTGRES_USER:-agent_bom}}:${POSTGRES_APP_PASSWORD:-${POSTGRES_PASSWORD:?err}}@postgres:5432/${POSTGRES_DB:-agent_bom}
      - AGENT_BOM_API_KEY=${AGENT_BOM_API_KEY:-}
      - AGENT_BOM_OIDC_ISSUER=${AGENT_BOM_OIDC_ISSUER:-}
      - AGENT_BOM_OIDC_AUDIENCE=${AGENT_BOM_OIDC_AUDIENCE:-}
      - AGENT_BOM_DISABLE_DOCS=1
      - AGENT_BOM_API_LOCAL_PATH_SCANS=disabled
      - CORS_ORIGINS=http://localhost:3000,http://ui:3000
      - NVD_API_KEY=${NVD_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8422/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # API bridges both networks: talks to Postgres on backend, serves UI on frontend
    networks:
      - backend
      - frontend
    restart: unless-stopped

  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8422
    image: agentbom/agent-bom-ui:0.84.3
    container_name: agent-bom-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8422
    depends_on:
      api:
        condition: service_healthy
    # UI on frontend only — cannot reach Postgres directly
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres-data:

secrets:
  # Mount-provisioned credentials. Populate the files before `docker compose up`.
  # See the header comment for permissions guidance (chmod 0400).
  postgres_password:
    file: ./secrets/postgres_password

networks:
  backend:
    name: agent-bom-backend
    # Internal: not routable from host — only containers on this network can reach Postgres
    internal: true
  frontend:
    name: agent-bom-frontend
