# ── Profile: PRODUCTION-SHAPED ──────────────────────────────────────────────
# Production-like platform deployment: self-hosted `agent-bom` control plane
# with PostgreSQL, using one product split across two images:
#   - API/runtime image
#   - UI companion image
#
# The API service below builds a local image from this repo and tags it as
# `agent-bom:latest` for compose convenience. The published runtime image
# remains `agentbom/agent-bom:*`.
#
# The UI service uses the published `agentbom/agent-bom-ui:*` image. Teams can
# swap that to a local UI build if they are iterating on the frontend.
#
# Defense in depth:
#   - Postgres on internal 'backend' network only — not reachable from host or internet
#   - API bridges backend + frontend networks
#   - UI on frontend only — cannot reach Postgres directly
#   - App connects as agent_bom_app (DML only, no DDL) — never bootstrap/admin/superuser
#   - Control-plane + Postgres credentials sourced from Docker secrets (file-mounted at
#     /run/secrets/...), never raw env / .env secret values. Operators provide:
#         deploy/secrets/postgres_password
#         deploy/secrets/postgres_app_password
#         deploy/secrets/api_key
#         deploy/secrets/audit_hmac_key
#         deploy/secrets/browser_session_signing_key
#         deploy/secrets/connections_key
#     Placeholders live at deploy/secrets/*.example for documentation only.
#
# Usage:
#   # 1. Generate the mounted secret files FIRST — `up` hard-fails without them:
#   make secrets
#   #    (equivalent: python scripts/deploy/hosted_poc_preflight.py --write-secret --skip-compose;
#   #     or write files manually — see deploy/secrets/README.md)
#   # 2. cp .env.example .env                  # non-secret URL / OIDC issuer only
#   # 3. docker compose -f deploy/docker-compose.platform.yml up --build   (or: make platform-up)

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-bom-platform-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_bom}
      # Bootstrap role for image init only — API never connects as this user.
      POSTGRES_USER: ${POSTGRES_USER:-agent_bom}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_APP_PASSWORD_FILE: /run/secrets/postgres_app_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    secrets:
      - postgres_password
      - postgres_app_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/postgres/init-wrapper.sh:/docker-entrypoint-initdb.d/00-init-wrapper.sh:ro
      - ./supabase/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_bom} -d ${POSTGRES_DB:-agent_bom}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: >
      postgres
        -c password_encryption=scram-sha-256
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl
        -c max_connections=100
        -c shared_buffers=128MB
    # NO ports exposed — only reachable from backend network
    networks:
      - backend
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agent-bom:latest
    container_name: agent-bom-api
    command: api --host 0.0.0.0 --port 8422
    ports:
      - "${AGENT_BOM_API_BIND_HOST:-127.0.0.1}:${API_PORT:-8422}:8422"
    environment:
      - AGENT_BOM_POSTGRES_URL=postgresql://agent_bom_app@postgres:5432/${POSTGRES_DB:-agent_bom}
      - AGENT_BOM_POSTGRES_PASSWORD_FILE=/run/secrets/postgres_app_password
      - AGENT_BOM_API_KEY_FILE=/run/secrets/api_key
      - AGENT_BOM_OIDC_ISSUER=${AGENT_BOM_OIDC_ISSUER:-}
      - AGENT_BOM_OIDC_AUDIENCE=${AGENT_BOM_OIDC_AUDIENCE:-}
      - AGENT_BOM_AUDIT_HMAC_KEY_FILE=/run/secrets/audit_hmac_key
      - AGENT_BOM_REQUIRE_AUDIT_HMAC=${AGENT_BOM_REQUIRE_AUDIT_HMAC:-1}
      - AGENT_BOM_CONNECTIONS_KEY_FILE=/run/secrets/connections_key
      # Role for any request that reaches the API without an authenticated
      # identity. This stack ships with API-key auth (above), so unauthenticated
      # requests fail closed (401) and this never applies — it only takes effect
      # if an operator removes all auth backends. analyst (not viewer) lets a
      # no-auth local bring-up connect + scan; viewer is read-only.
      - AGENT_BOM_NO_AUTH_ROLE=${AGENT_BOM_NO_AUTH_ROLE:-analyst}
      - AGENT_BOM_BROWSER_SESSION_SIGNING_KEY_FILE=/run/secrets/browser_session_signing_key
      - AGENT_BOM_SESSION_COOKIE_SECURE=${AGENT_BOM_SESSION_COOKIE_SECURE:-1}
      - AGENT_BOM_DISABLE_DOCS=1
      - AGENT_BOM_SKIP_UPDATE_CHECK=1
      - AGENT_BOM_API_LOCAL_PATH_SCANS=disabled
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://ui:3000}
      - NVD_API_KEY=${NVD_API_KEY:-}
    secrets:
      - postgres_app_password
      - api_key
      - audit_hmac_key
      - browser_session_signing_key
      - connections_key
    volumes:
      - agent-bom-state:/home/abom/.agent-bom
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8422/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # API bridges both networks: talks to Postgres on backend, serves UI on frontend
    networks:
      - backend
      - frontend
    restart: unless-stopped

  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    image: agentbom/agent-bom-ui:0.96.3
    container_name: agent-bom-ui
    ports:
      - "${AGENT_BOM_UI_BIND_HOST:-127.0.0.1}:${UI_PORT:-3000}:3000"
    environment:
      # The browser same-origins to this UI; the UI's Node server proxies
      # /v1,/health,/ws to NEXT_PUBLIC_API_URL, which must be the API
      # container's in-network DNS name — not the browser's localhost.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8422}
    depends_on:
      api:
        condition: service_healthy
    # UI on frontend only — cannot reach Postgres directly
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres-data:
  agent-bom-state:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
  postgres_app_password:
    file: ${POSTGRES_APP_PASSWORD_FILE:-./secrets/postgres_app_password}
  api_key:
    file: ${API_KEY_FILE:-./secrets/api_key}
  audit_hmac_key:
    file: ${AUDIT_HMAC_KEY_FILE:-./secrets/audit_hmac_key}
  browser_session_signing_key:
    file: ${BROWSER_SESSION_SIGNING_KEY_FILE:-./secrets/browser_session_signing_key}
  connections_key:
    file: ${CONNECTIONS_KEY_FILE:-./secrets/connections_key}

networks:
  backend:
    name: agent-bom-backend
    # Internal: not routable from host — only containers on this network can reach Postgres
    internal: true
  frontend:
    name: agent-bom-frontend
