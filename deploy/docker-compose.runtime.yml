# ── Profile: PILOT (sidecar example) ─────────────────────────────────────────
# agent-bom runtime sidecar — example deployment
#
# Demonstrates agent-bom proxy running as a sidecar alongside an MCP server.
# The proxy intercepts all JSON-RPC traffic for audit logging and policy
# enforcement. This file ships as an example of the wrapper pattern; for
# production rollout, derive your own compose with hardened images and
# secrets-mounted credentials (see docker-compose.platform.yml for the
# Postgres+secrets layout).
#
# Quick start:
#   docker compose -f deploy/docker-compose.runtime.yml up
#
# The proxy wraps the filesystem MCP server and logs all tool calls to
# ./audit-logs/audit.jsonl on the host.

services:

  # ── MCP server (the target being monitored) ───────────────────────────────
  mcp-server:
    image: node:20-slim
    container_name: mcp-filesystem-server
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
    volumes:
      - workspace:/workspace
    # No ports exposed — communicates via stdio through the proxy
    restart: unless-stopped

  # ── agent-bom runtime proxy (sidecar) ──────────────────────────────────────
  agent-bom-proxy:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.runtime
    image: agentbom/agent-bom:0.82.3
    container_name: agent-bom-runtime-proxy
    depends_on:
      - mcp-server
    environment:
      - AGENT_BOM_LOG=/var/log/agent-bom/audit.jsonl
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-}
      - CURL_CA_BUNDLE=${CURL_CA_BUNDLE:-}
      - PIP_CERT=${PIP_CERT:-}
    volumes:
      # Audit log output (persisted on host)
      - ./audit-logs:/var/log/agent-bom
      # Policy file (optional — mount a custom policy)
      # - ./policy.json:/etc/agent-bom/policy.json:ro
    command:
      - "--log"
      - "/var/log/agent-bom/audit.jsonl"
      - "--block-undeclared"
      - "--"
      - "npx"
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/workspace"
    ports:
      - "8422:8422"
    restart: unless-stopped
    healthcheck:
      # Proxy serves the standard /health endpoint on its API port.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8422/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  workspace:

networks:
  default:
    name: agent-bom-runtime
