apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: agent-bom
  region: us-east-1          # <-- change ONLY if your account/region differs; tell me if you do
  version: "1.31"

# withOIDC is the keystone: it creates the cluster's OIDC provider, which is what
# lets the in-cluster collector assume read-only roles in AWS/Azure/GCP with NO
# stored keys (IRSA + cross-cloud workload-identity federation).
iam:
  withOIDC: true

managedNodeGroups:
  - name: agent-bom-ng
    instanceType: t3.large   # API + UI + collector; RDS is external so nodes stay light
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 40
    privateNetworking: false

addons:
  - name: aws-ebs-csi-driver
    wellKnownPolicies:
      ebsCSIController: true
