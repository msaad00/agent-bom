# Air-gapped control plane: mount a pre-synced vulns.db and disable network refresh.
#
# 1. On a connected bastion: agent-bom db update
# 2. Bundle: scripts/release/bundle-vuln-db.sh dist/airgap
# 3. Create a Secret or PVC with dist/airgap/vulns.db on the disconnected cluster
# 4. helm install/upgrade with -f deploy/helm/agent-bom/examples/airgap-vuln-db-values.yaml
#
# See docs/ENTERPRISE_DEPLOYMENT.md and docs/RELEASE_VERIFICATION.md.

controlPlane:
  enabled: true
  # The chart defaults the Alembic Postgres hook on, and it fails the render
  # when no AGENT_BOM_POSTGRES_URL is in scope. This file is a standalone
  # air-gap profile with no database of its own, so the control plane runs on
  # its SQLite default. Layer examples/byo-postgres-values.yaml after this file
  # (and drop this block) when the disconnected cluster does have Postgres.
  migrations:
    postgres:
      enabled: false
  api:
    env:
      - name: AGENT_BOM_DB_PATH
        value: /var/lib/agent-bom/vulns.db
      - name: AGENT_BOM_VULN_DB_OFFLINE
        value: "1"
      # No egress: skip the CLI's PyPI release check and default every scan
      # path to the local cache, so pod startup does not retry an unreachable
      # pypi.org before serving.
      - name: AGENT_BOM_OFFLINE
        value: "1"
      - name: AGENT_BOM_SKIP_UPDATE_CHECK
        value: "1"
      # Swagger UI and ReDoc fetch assets from public CDNs. Disable those
      # interactive routes in disconnected deployments; use the checked-in
      # OpenAPI contract referenced by the deployment guide instead.
      - name: AGENT_BOM_DISABLE_DOCS
        value: "1"
    extraVolumes:
      - name: vuln-db
        secret:
          secretName: agent-bom-vuln-db
    extraVolumeMounts:
      - name: vuln-db
        mountPath: /var/lib/agent-bom
        readOnly: true

scanner:
  env:
    - name: AGENT_BOM_DB_PATH
      value: /var/lib/agent-bom/vulns.db
    - name: AGENT_BOM_VULN_DB_OFFLINE
      value: "1"
    - name: AGENT_BOM_OFFLINE
      value: "1"
    - name: AGENT_BOM_SKIP_UPDATE_CHECK
      value: "1"
  extraVolumes:
    - name: vuln-db
      secret:
        secretName: agent-bom-vuln-db
  extraVolumeMounts:
    - name: vuln-db
      mountPath: /var/lib/agent-bom
      readOnly: true
