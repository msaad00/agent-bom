controlPlane:
  enabled: true
  serviceMesh:
    enabled: true
    provider: istio
    istio:
      peerAuthentication:
        enabled: true
        mode: STRICT
      authorizationPolicy:
        enabled: true
        allowSameNamespace: true
        allowedNamespaces:
          - ingress-nginx
          - istio-system
  policyController:
    enabled: true
    provider: kyverno
    kyverno:
      validationFailureAction: Enforce
      background: true
      requireControlPlanePodHardening: true
  api:
    env:
      - name: AGENT_BOM_REQUIRE_SHARED_RATE_LIMIT
        value: "1"
      - name: AGENT_BOM_PROXY_CONTROL_PLANE_MTLS_MODE
        value: delegated
      - name: AGENT_BOM_PROXY_CONTROL_PLANE_MTLS_PROVIDER
        value: istio
      - name: AGENT_BOM_PROXY_CONTROL_PLANE_MTLS_CLIENT_CA_REF
        value: secret/agent-bom/proxy-client-ca
      - name: AGENT_BOM_PROXY_CONTROL_PLANE_MTLS_EVIDENCE_REF
        value: deploy/helm/agent-bom/templates/controlplane-istio-peerauthentication.yaml
      - name: AGENT_BOM_PROXY_CONTROL_PLANE_MTLS_CERT_HEADER
        value: x-forwarded-client-cert
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: agent-bom.internal.example.com

networkPolicy:
  enabled: true
  restrictIngress: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-bom
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 8422
        - protocol: TCP
          port: 3000
