controlPlane:
  enabled: true
  api:
    replicas: 2
    envFrom:
      - secretRef:
          name: agent-bom-control-plane
  ui:
    replicas: 2
    env:
      - name: NEXT_PUBLIC_API_URL
        value: ""
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: agent-bom.internal.example.com

scanner:
  enabled: true
  allNamespaces: true
  extraArgs:
    - --k8s-mcp
    - --k8s-all-namespaces
    - --introspect
    - --enforce
    - --preset
    - enterprise

monitor:
  enabled: false

pdb:
  enabled: true
  minAvailable: 1

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::REPLACE_ME_ACCOUNT_ID:role/REPLACE_ME_AGENT_BOM_DISCOVERY_ROLE

networkPolicy:
  enabled: true
  restrictIngress: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-bom
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 8422
        - protocol: TCP
          port: 3000
