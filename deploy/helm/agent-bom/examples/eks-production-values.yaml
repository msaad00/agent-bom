controlPlane:
  enabled: true
  observability:
    grafanaDashboard:
      enabled: true
    prometheusRule:
      enabled: true
  podAntiAffinity:
    enabled: true
  priorityClass:
    create: true
    name: agent-bom-control-plane
  api:
    replicas: 2
    env:
      - name: AGENT_BOM_REQUIRE_SHARED_RATE_LIMIT
        value: "1"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
    envFrom:
      - secretRef:
          name: agent-bom-control-plane-db
      - secretRef:
          name: agent-bom-control-plane-auth
  ui:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
    env:
      - name: NEXT_PUBLIC_API_URL
        value: ""
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-internal
    hosts:
      - host: agent-bom.internal.example.com
    tls:
      - hosts:
          - agent-bom.internal.example.com
        secretName: agent-bom-control-plane-tls
  externalSecrets:
    enabled: true
    secretStoreRef:
      kind: ClusterSecretStore
      name: aws-secrets-manager
    secrets:
      - nameSuffix: control-plane-db
        refreshInterval: 1h
        target:
          name: agent-bom-control-plane-db
        data:
          - secretKey: AGENT_BOM_POSTGRES_URL
            remoteRef:
              key: /agent-bom/prod/control-plane
              property: AGENT_BOM_POSTGRES_URL
      - nameSuffix: control-plane-auth
        refreshInterval: 5m
        target:
          name: agent-bom-control-plane-auth
        data:
          - secretKey: AGENT_BOM_OIDC_ISSUER
            remoteRef:
              key: /agent-bom/prod/control-plane
              property: AGENT_BOM_OIDC_ISSUER
          - secretKey: AGENT_BOM_OIDC_AUDIENCE
            remoteRef:
              key: /agent-bom/prod/control-plane
              property: AGENT_BOM_OIDC_AUDIENCE
          - secretKey: AGENT_BOM_AUDIT_HMAC_KEY
            remoteRef:
              key: /agent-bom/prod/control-plane
              property: AGENT_BOM_AUDIT_HMAC_KEY
          - secretKey: AGENT_BOM_REQUIRE_AUDIT_HMAC
            remoteRef:
              key: /agent-bom/prod/control-plane
              property: AGENT_BOM_REQUIRE_AUDIT_HMAC
  backup:
    enabled: true
    schedule: "0 3 * * *"
    destination:
      bucket: agent-bom-prod-backups
      prefix: agent-bom/postgres
      region: us-east-1
      encryption:
        enabled: true
        mode: aws:kms
        kmsKeyId: alias/agent-bom-backups
    envFrom:
      - secretRef:
          name: agent-bom-control-plane-db

scanner:
  enabled: true
  allNamespaces: true
  extraArgs:
    - --k8s-mcp
    - --k8s-all-namespaces
    - --introspect
    - --enforce
    - --preset
    - enterprise

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/agent-bom-discovery

topologySpread:
  enabled: true

networkPolicy:
  enabled: true
  restrictIngress: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-bom
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 8422
        - protocol: TCP
          port: 3000

pdb:
  enabled: true
  minAvailable: 1
