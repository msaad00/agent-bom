{{- if and .Values.controlPlane.enabled .Values.controlPlane.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-bom.name" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.controlPlane.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent-bom.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "agent-bom.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.controlPlane.api.serviceAccount.create }}
      serviceAccountName: {{ include "agent-bom.controlPlaneApiServiceAccountName" . }}
      automountServiceAccountToken: {{ .Values.controlPlane.api.serviceAccount.automountServiceAccountToken }}
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.controlPlane.api.terminationGracePeriodSeconds | default 30 }}
      {{- $priorityClassName := include "agent-bom.controlPlanePriorityClassName" . }}
      {{- if $priorityClassName }}
      priorityClassName: {{ $priorityClassName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "agent-bom.controlPlaneTopologySpreadConstraints" (dict "Values" .Values "component" "api" "Chart" .Chart "Release" .Release) | nindent 6 }}
      {{- include "agent-bom.controlPlaneAffinity" (dict "Values" .Values "component" "api" "Chart" .Chart "Release" .Release) | nindent 6 }}
      containers:
        {{- $apiReplicaFloor := int .Values.controlPlane.api.replicas }}
        {{- if and .Values.controlPlane.api.autoscaling.enabled (gt (int .Values.controlPlane.api.autoscaling.minReplicas) $apiReplicaFloor) }}
        {{- $apiReplicaFloor = int .Values.controlPlane.api.autoscaling.minReplicas }}
        {{- end }}
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- range .Values.controlPlane.api.args }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.controlPlane.api.port }}
              name: http
              protocol: TCP
          env:
            - name: AGENT_BOM_CONTROL_PLANE_REPLICAS
              value: {{ $apiReplicaFloor | quote }}
            {{- if .Values.controlPlane.connectionsScheduler.enabled }}
            - name: AGENT_BOM_CONNECTIONS_SCHEDULER
              value: "1"
            {{- with .Values.controlPlane.connectionsScheduler.maxConcurrency }}
            - name: AGENT_BOM_CONNECTIONS_SCHEDULER_MAX_CONCURRENCY
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controlPlane.connectionsScheduler.pollSeconds }}
            - name: AGENT_BOM_CONNECTIONS_SCHEDULER_POLL_SECONDS
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.controlPlane.api.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.controlPlane.api.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with .Values.controlPlane.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.controlPlane.api.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.controlPlane.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.controlPlane.api.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.controlPlane.api.startupProbe | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.controlPlane.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
