{{- if .Values.scanner.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "agent-bom.name" . }}-scan
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanner
spec:
  schedule: {{ .Values.scanner.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.scanner.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.scanner.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "agent-bom.labels" . | nindent 12 }}
            app.kubernetes.io/component: scanner
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "agent-bom.scannerServiceAccountName" . }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: scanner
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["agent-bom"]
              args:
                - "scan"
                - "--k8s"
                {{- if .Values.scanner.allNamespaces }}
                - "-A"
                {{- end }}
                - "-f"
                - {{ .Values.scanner.outputFormat | quote }}
                - "-o"
                - "/output/scan.{{ .Values.scanner.outputFormat }}"
                {{- range .Values.scanner.extraArgs }}
                - {{ . | quote }}
                {{- end }}
              {{- with .Values.scanner.env }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: output
                  mountPath: /output
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: output
              emptyDir: {}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: OnFailure
{{- end }}
