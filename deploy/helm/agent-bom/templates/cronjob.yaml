{{- if .Values.scanner.enabled }}
{{- $cloud := .Values.scanner.cloud | default dict }}
{{- $cloudEnabled := and $cloud (eq (toString $cloud.enabled) "true") }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "agent-bom.name" . }}-scan
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanner
  {{- if not .Values.controlPlane.enabled }}
  annotations:
    agent-bom.io/scanner-only-warning: >-
      controlPlane.enabled=false — only the scanner CronJob is deployed.
      Enable the API/UI/gateway with --set controlPlane.enabled=true.
  {{- end }}
spec:
  schedule: {{ .Values.scanner.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.scanner.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.scanner.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "agent-bom.labels" . | nindent 12 }}
            app.kubernetes.io/component: scanner
            {{- if and $cloudEnabled $cloud.azure (eq (toString $cloud.azure.inventory) "true") }}
            # AKS workload identity: the webhook injects the projected token only
            # when this pod label is present.
            azure.workload.identity/use: "true"
            {{- end }}
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "agent-bom.scannerServiceAccountName" . }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: scanner
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["agent-bom"]
              args:
                - "scan"
                {{- if .Values.scanner.k8s }}
                - "--k8s"
                {{- if .Values.scanner.allNamespaces }}
                - "-A"
                {{- end }}
                {{- end }}
                - "-f"
                - {{ .Values.scanner.outputFormat | quote }}
                - "-o"
                - "/output/scan.{{ .Values.scanner.outputFormat }}"
                {{- range .Values.scanner.extraArgs }}
                - {{ . | quote }}
                {{- end }}
              env:
                - name: HOME
                  value: /tmp
                {{- if $cloudEnabled }}
                {{- with $cloud.aws }}
                {{- if eq (toString .inventory) "true" }}
                - name: AGENT_BOM_AWS_INVENTORY
                  value: "1"
                {{- if eq (toString .allRegions) "true" }}
                - name: AGENT_BOM_AWS_ALL_REGIONS
                  value: "1"
                {{- end }}
                {{- if .regions }}
                - name: AGENT_BOM_AWS_REGIONS
                  value: {{ .regions | quote }}
                {{- end }}
                {{- if .maxRegions }}
                - name: AGENT_BOM_AWS_MAX_REGIONS
                  value: {{ .maxRegions | quote }}
                {{- end }}
                {{- end }}
                {{- end }}
                {{- with $cloud.azure }}
                {{- if eq (toString .inventory) "true" }}
                - name: AGENT_BOM_AZURE_INVENTORY
                  value: "1"
                {{- if eq (toString .allSubscriptions) "true" }}
                - name: AGENT_BOM_AZURE_ALL_SUBSCRIPTIONS
                  value: "1"
                {{- end }}
                {{- if .maxSubscriptions }}
                - name: AGENT_BOM_AZURE_MAX_SUBSCRIPTIONS
                  value: {{ .maxSubscriptions | quote }}
                {{- end }}
                {{- if .clientId }}
                - name: AZURE_CLIENT_ID
                  value: {{ .clientId | quote }}
                {{- end }}
                {{- if .tenantId }}
                - name: AZURE_TENANT_ID
                  value: {{ .tenantId | quote }}
                {{- end }}
                {{- end }}
                {{- end }}
                {{- with $cloud.gcp }}
                {{- if eq (toString .inventory) "true" }}
                - name: AGENT_BOM_GCP_INVENTORY
                  value: "1"
                {{- if .impersonateSa }}
                - name: AGENT_BOM_GCP_IMPERSONATE_SA
                  value: {{ .impersonateSa | quote }}
                {{- end }}
                {{- end }}
                {{- end }}
                {{- with $cloud.snowflake }}
                {{- if eq (toString .inventory) "true" }}
                - name: AGENT_BOM_SNOWFLAKE_INVENTORY
                  value: "1"
                {{- if .maxRoles }}
                - name: AGENT_BOM_SNOWFLAKE_MAX_ROLES
                  value: {{ .maxRoles | quote }}
                {{- end }}
                {{- if .account }}
                - name: SNOWFLAKE_ACCOUNT
                  value: {{ .account | quote }}
                {{- end }}
                {{- if .user }}
                - name: SNOWFLAKE_USER
                  value: {{ .user | quote }}
                {{- end }}
                {{- if .keySecretName }}
                - name: SNOWFLAKE_PRIVATE_KEY_PATH
                  value: /snowflake/{{ .keySecretKey | default "key" }}
                {{- end }}
                {{- end }}
                {{- end }}
                {{- end }}
                {{- with .Values.scanner.env }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              {{- with .Values.scanner.envFrom }}
              envFrom:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: output
                  mountPath: /output
                {{- if .Values.scanner.writableTmp }}
                - name: tmp
                  mountPath: /tmp
                {{- end }}
                {{- if and $cloudEnabled $cloud.snowflake (eq (toString $cloud.snowflake.inventory) "true") $cloud.snowflake.keySecretName }}
                - name: snowflake-key
                  mountPath: /snowflake
                  readOnly: true
                {{- end }}
                {{- with .Values.scanner.extraVolumeMounts }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: output
              emptyDir: {}
            {{- if .Values.scanner.writableTmp }}
            - name: tmp
              emptyDir: {}
            {{- end }}
            {{- if and $cloudEnabled $cloud.snowflake (eq (toString $cloud.snowflake.inventory) "true") $cloud.snowflake.keySecretName }}
            - name: snowflake-key
              secret:
                secretName: {{ $cloud.snowflake.keySecretName | quote }}
                defaultMode: 0400
            {{- end }}
            {{- with .Values.scanner.extraVolumes }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: OnFailure
{{- end }}
