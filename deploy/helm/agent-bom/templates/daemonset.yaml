{{- if .Values.monitor.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "agent-bom.name" . }}-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent-bom.name" . }}
      app.kubernetes.io/component: monitor
  template:
    metadata:
      labels:
        {{- include "agent-bom.labels" . | nindent 8 }}
        app.kubernetes.io/component: monitor
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "agent-bom.monitorServiceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: monitor
          image: "{{ .Values.runtimeImage.repository }}:{{ .Values.runtimeImage.tag }}"
          imagePullPolicy: {{ .Values.runtimeImage.pullPolicy }}
          command: ["agent-bom"]
          args:
            - "protect"
            - "--mode"
            - {{ .Values.monitor.mode | quote }}
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.monitor.port | quote }}
          ports:
            - containerPort: {{ .Values.monitor.port }}
              name: protect
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
