{{- $imageRepo := (.Values.eventCollector.image).repository | default "" }}
{{- if .Values.eventCollector.enabled }}
{{- if not $imageRepo }}
{{- fail (printf "%s\n%s\n%s\n%s"
  "agent-bom: eventCollector.enabled=true but eventCollector.image.repository is empty."
  "No event-collector image is published and this repo ships no Dockerfile for it, so the collector would install as nothing."
  "Build and host your own from runtime/event-collector/ (see docs/design/EVENT_COLLECTOR_CONTRACT.md), then set eventCollector.image.repository."
  "Otherwise set eventCollector.enabled=false to install without the collector.") }}
{{- end }}
{{- if not .Values.controlPlane.enabled }}
{{- fail (printf "%s\n%s"
  "agent-bom: eventCollector.enabled=true requires controlPlane.enabled=true — the collector Deployment forwards to the in-cluster control-plane API and is only rendered with it."
  "Set controlPlane.enabled=true, or set eventCollector.enabled=false to install without the collector.") }}
{{- end }}
{{- end }}
{{- if and .Values.controlPlane.enabled .Values.eventCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-bom.name" . }}-event-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: event-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent-bom.name" . }}
      app.kubernetes.io/component: event-collector
  template:
    metadata:
      labels:
        {{- include "agent-bom.labels" . | nindent 8 }}
        app.kubernetes.io/component: event-collector
    spec:
      containers:
        - name: event-collector
          image: "{{ $imageRepo }}:{{ .Values.eventCollector.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          args:
            - --listen={{ .Values.eventCollector.listen | default ":8092" }}
            - --mode={{ .Values.eventCollector.mode | default "stub" }}
            {{- $cpUrl := .Values.eventCollector.controlPlaneUrl | default "" }}
            {{- if not $cpUrl }}
            {{- $cpUrl = printf "http://%s-api:8420" (include "agent-bom.name" .) }}
            {{- end }}
            - --control-plane-url={{ $cpUrl }}
            {{- if and .Values.eventCollector.apiKeySecret.name .Values.eventCollector.apiKeySecret.key }}
            - --api-key-file=/var/run/secrets/agent-bom/api-key
            {{- end }}
          ports:
            - name: http
              containerPort: 8092
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          {{- if and .Values.eventCollector.apiKeySecret.name .Values.eventCollector.apiKeySecret.key }}
          volumeMounts:
            - name: api-key
              mountPath: /var/run/secrets/agent-bom
              readOnly: true
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      {{- if and .Values.eventCollector.apiKeySecret.name .Values.eventCollector.apiKeySecret.key }}
      volumes:
        - name: api-key
          secret:
            secretName: {{ .Values.eventCollector.apiKeySecret.name }}
            items:
              - key: {{ .Values.eventCollector.apiKeySecret.key }}
                path: api-key
      {{- end }}
{{- end }}
