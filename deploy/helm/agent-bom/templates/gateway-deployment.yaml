{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-bom.name" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent-bom.name" . }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "agent-bom.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "agent-bom.gatewayServiceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository | default "agentbom/agent-bom" }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy | default "IfNotPresent" }}
          command:
            - agent-bom
            - gateway
            - serve
            - --bind
            - "0.0.0.0:8090"
            - --upstreams
            - /etc/agent-bom/gateway/upstreams.yaml
            {{- if .Values.gateway.controlPlaneDiscovery.url }}
            - --from-control-plane
            - {{ .Values.gateway.controlPlaneDiscovery.url | quote }}
            {{- end }}
            {{- if .Values.gateway.policyPath }}
            - --policy
            - {{ .Values.gateway.policyPath }}
            {{- end }}
            {{- if gt (int (.Values.gateway.policyReloadSeconds | default 0)) 0 }}
            - --policy-reload-seconds
            - {{ .Values.gateway.policyReloadSeconds | quote }}
            {{- end }}
            {{- if .Values.gateway.firewallPolicyPath }}
            - --firewall-policy
            - {{ .Values.gateway.firewallPolicyPath }}
            {{- end }}
            {{- if gt (int (.Values.gateway.firewallPolicyReloadSeconds | default 0)) 0 }}
            - --firewall-policy-reload-seconds
            - {{ .Values.gateway.firewallPolicyReloadSeconds | quote }}
            {{- end }}
            {{- if gt (int (.Values.gateway.runtimeRateLimitPerTenantPerMinute | default 0)) 0 }}
            - --runtime-rate-limit-per-tenant-per-minute
            - {{ .Values.gateway.runtimeRateLimitPerTenantPerMinute | quote }}
            {{- end }}
            {{- if .Values.gateway.requireSharedRateLimit }}
            - --require-shared-rate-limit
            {{- end }}
            {{- if .Values.gateway.detectVisualLeaks }}
            - --detect-visual-leaks
            {{- end }}
            {{- if .Values.gateway.allowVisualLeakBestEffort }}
            - --allow-visual-leak-best-effort
            {{- end }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          env:
            - name: AGENT_BOM_GATEWAY_RELAY_BACKEND
              value: {{ .Values.gateway.relayBackend | default "python" | quote }}
            {{- if eq (.Values.gateway.relayBackend | default "python") "go" }}
            - name: AGENT_BOM_GATEWAY_RELAY_GO_URL
              value: {{ .Values.gateway.relayGoUrl | default "http://127.0.0.1:8091" | quote }}
            {{- end }}
            {{- with .Values.gateway.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.gateway.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml (.Values.gateway.resources | default dict) | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: upstreams
              mountPath: /etc/agent-bom/gateway
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.gateway.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- $sidecar := .Values.gateway.relayGoSidecar | default dict }}
        {{- if and (eq (.Values.gateway.relayBackend | default "python") "go") ($sidecar.enabled | default false) ($sidecar.image).repository }}
        - name: gateway-relay
          image: "{{ $sidecar.image.repository }}:{{ $sidecar.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ $sidecar.image.pullPolicy | default "IfNotPresent" }}
          args:
            - "-listen"
            - "127.0.0.1:{{ $sidecar.port | default 8091 }}"
          ports:
            - name: relay
              containerPort: {{ $sidecar.port | default 8091 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: relay
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: relay
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            {{- toYaml ($sidecar.resources | default dict) | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        {{- end }}
      volumes:
        - name: upstreams
          configMap:
            name: {{ include "agent-bom.name" . }}-gateway-upstreams
        - name: tmp
          emptyDir: {}
        {{- with .Values.gateway.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-bom.name" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8090
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "agent-bom.name" . }}
    app.kubernetes.io/component: gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-bom.name" . }}-gateway-upstreams
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  upstreams.yaml: |
{{ .Values.gateway.upstreamsYaml | default "upstreams: []\n" | indent 4 }}
{{- end }}
