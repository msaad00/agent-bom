{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-bom.name" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agent-bom.name" . }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "agent-bom.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository | default "agentbom/agent-bom" }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy | default "IfNotPresent" }}
          command:
            - agent-bom
            - gateway
            - serve
            - --bind
            - "0.0.0.0:8090"
            - --upstreams
            - /etc/agent-bom/gateway/upstreams.yaml
            {{- if .Values.gateway.policyPath }}
            - --policy
            - {{ .Values.gateway.policyPath }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          env:
            {{- with .Values.gateway.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.gateway.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml (.Values.gateway.resources | default dict) | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: upstreams
              mountPath: /etc/agent-bom/gateway
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.gateway.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: upstreams
          configMap:
            name: {{ include "agent-bom.name" . }}-gateway-upstreams
        - name: tmp
          emptyDir: {}
        {{- with .Values.gateway.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-bom.name" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8090
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "agent-bom.name" . }}
    app.kubernetes.io/component: gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-bom.name" . }}-gateway-upstreams
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-bom.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  upstreams.yaml: |
{{ .Values.gateway.upstreamsYaml | default "upstreams: []\n" | indent 4 }}
{{- end }}
