image:
  repository: agentbom/agent-bom
  tag: "0.79.0"
  pullPolicy: IfNotPresent

uiImage:
  repository: agentbom/agent-bom-ui
  tag: "0.79.0"
  pullPolicy: IfNotPresent

runtimeImage:
  repository: agentbom/agent-bom-runtime
  tag: "0.79.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpread:
  enabled: false
  whenUnsatisfiable: ScheduleAnyway
  zone:
    enabled: true
    topologyKey: topology.kubernetes.io/zone
  node:
    enabled: true
    topologyKey: kubernetes.io/hostname

scanner:
  enabled: true
  schedule: "0 */6 * * *"
  allNamespaces: true
  outputFormat: json
  extraArgs: []
  env: []
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

monitor:
  enabled: false
  mode: http
  port: 8423
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ─── Multi-MCP gateway (optional) ─────────────────────────────────────────────
# One FastAPI service that fronts N upstream MCP servers so laptops point at
# one URL per MCP instead of configuring a proxy per MCP. Disabled by default
# because the per-MCP sidecar mode (controlPlane.runtime) covers teams that
# prefer local-to-workload enforcement.
#
# See docs/design/MULTI_MCP_GATEWAY.md for the full design + rollout plan.
#
# ── Operator must provide (no auto-discovery): ───────────────────────────────
#   1. gateway.upstreamsYaml — the list of MCP servers the gateway should
#      route to. Start from deploy/helm/agent-bom/examples/gateway-upstreams.example.yaml
#      and customise; pass via --set-file gateway.upstreamsYaml=./my-upstreams.yaml.
#   2. A Kubernetes Secret exposing any bearer tokens referenced by
#      `token_env` in upstreamsYaml (e.g. SNOWFLAKE_JIRA_MCP_TOKEN,
#      GITHUB_MCP_TOKEN). Point gateway.envFrom at it:
#
#        gateway:
#          envFrom:
#            - secretRef:
#                name: agent-bom-gateway-upstream-tokens
#
#   3. An ingress (same cluster as controlPlane) pointing at the
#      agent-bom-{release}-gateway Service on port 8090.
# ─────────────────────────────────────────────────────────────────────────────
gateway:
  enabled: false
  replicas: 2
  image:
    repository: agentbom/agent-bom
    # tag defaults to Chart.AppVersion
    pullPolicy: IfNotPresent
  # Inline YAML for the upstreams ConfigMap. Replace with your environment's
  # MCPs. See deploy/helm/agent-bom/examples/gateway-upstreams.example.yaml
  # for a commented template with three realistic entries. Starting with an
  # empty list is valid — the gateway boots clean and rejects requests
  # until you redeploy with a populated list.
  upstreamsYaml: |
    upstreams: []
  # Optional runtime policy JSON path (mounted via extraVolumes + extraVolumeMounts).
  policyPath: ""
  # Typical deploy-time auth/runtime wiring:
  #   env:
  #     - name: AGENT_BOM_GATEWAY_DETECT_VISUAL_LEAKS
  #       value: "1"
  #   envFrom:
  #     - secretRef:
  #         name: agent-bom-gateway-auth
  #
  # Where `agent-bom-gateway-auth` contains:
  #   AGENT_BOM_GATEWAY_BEARER_TOKEN=<token for incoming gateway clients>
  env: []
  envFrom: []
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  extraVolumes: []
  extraVolumeMounts: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

controlPlane:
  enabled: false
  serviceMesh:
    enabled: false
    provider: istio
    istio:
      peerAuthentication:
        enabled: true
        mode: STRICT
      authorizationPolicy:
        enabled: true
        allowSameNamespace: true
        allowedNamespaces: []
  policyController:
    enabled: false
    provider: kyverno
    kyverno:
      validationFailureAction: Audit
      background: true
      requireControlPlanePodHardening: true
  observability:
    grafanaDashboard:
      enabled: false
      namespace: ""
      labels: {}
      annotations: {}
      folder: agent-bom
    prometheusRule:
      enabled: false
      namespace: ""
      labels: {}
      annotations: {}
      rules:
        apiErrorRate:
          enabled: true
          errorRateThreshold: 0.05
          for: 10m
        scannerFailures:
          enabled: true
          for: 15m
        oidcFailures:
          enabled: true
          for: 10m
          increaseThreshold: 5
        proxyAuditBacklog:
          enabled: true
          for: 10m
          backlogBytesThreshold: 10485760
  podAntiAffinity:
    enabled: false
    topologyKey: kubernetes.io/hostname
  priorityClass:
    create: false
    name: ""
    value: 100000
    preemptionPolicy: PreemptLowerPriority
    description: "Priority class for agent-bom control-plane API and UI workloads."
  api:
    enabled: true
    replicas: 2
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: null
      behavior: {}
    port: 8422
    args:
      - api
      - --host
      - 0.0.0.0
      - --port
      - "8422"
    env: []
    envFrom: []
    service:
      enabled: true
      type: ClusterIP
      annotations: {}
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
    # /readyz goes 503 as soon as graceful shutdown begins so the service
    # endpoint drains before Kubernetes sends SIGTERM. The drain window is
    # AGENT_BOM_SHUTDOWN_DRAIN_SECONDS (default 25s); keep that under
    # terminationGracePeriodSeconds so the pod exits cleanly.
    readinessProbe:
      httpGet:
        path: /readyz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    startupProbe:
      httpGet:
        path: /health
        port: http
      failureThreshold: 18
      periodSeconds: 5
    # Leaves a 5s margin over the default 25s drain window for in-flight
    # requests to finish before Kubernetes force-kills the pod.
    terminationGracePeriodSeconds: 30
  ui:
    enabled: true
    replicas: 2
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: null
      behavior: {}
    port: 3000
    env:
      - name: NEXT_PUBLIC_API_URL
        value: ""
    envFrom: []
    service:
      enabled: true
      type: ClusterIP
      annotations: {}
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    startupProbe:
      httpGet:
        path: /
        port: http
      failureThreshold: 18
      periodSeconds: 5
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        apiPaths:
          - path: /v1
            pathType: Prefix
          - path: /health
            pathType: Prefix
          - path: /docs
            pathType: Prefix
          - path: /redoc
            pathType: Prefix
          - path: /openapi.json
            pathType: Prefix
          - path: /ws
            pathType: Prefix
        uiPaths:
          - path: /
            pathType: Prefix
    tls: []
  externalSecrets:
    enabled: false
    refreshInterval: 1h
    secretStoreRef:
      kind: ClusterSecretStore
      name: ""
    target:
      name: agent-bom-control-plane
      creationPolicy: Owner
    data: []
    secrets: []
  backup:
    enabled: false
    schedule: "0 3 * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    suspend: false
    serviceAccountName: ""
    serviceAccount:
      create: true
      name: ""
      annotations: {}
    image:
      dumpRepository: postgres
      dumpTag: "16-alpine"
      uploadRepository: amazon/aws-cli
      uploadTag: "2.17.52"
      pullPolicy: IfNotPresent
    resources:
      dump:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      upload:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "250m"
    destination:
      bucket: ""
      prefix: "agent-bom/postgres"
      bucketRegion: ""
      region: us-east-1
      endpoint: ""
      encryption:
        enabled: true
        mode: "AES256"
        kmsKeyId: ""
      extraArgs: []
    retentionDays: 14
    env: []
    envFrom: []

rbac:
  create: true

serviceAccount:
  create: true
  name: agent-bom
  annotations: {}

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "500m"

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /status
    port: protect
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /status
    port: protect
  initialDelaySeconds: 2
  periodSeconds: 10

startupProbe:
  httpGet:
    path: /status
    port: protect
  failureThreshold: 12
  periodSeconds: 5

networkPolicy:
  enabled: true
  restrictIngress: true
  ingress: []
  allowDns: true
  allowWeb: true
  webPorts:
    - 80
    - 443
  additionalEgress: []

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: null
