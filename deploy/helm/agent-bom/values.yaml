image:
  repository: agentbom/agent-bom
  tag: "0.75.14"
  pullPolicy: IfNotPresent

runtimeImage:
  repository: agentbom/agent-bom-runtime
  tag: "0.75.14"
  pullPolicy: IfNotPresent

scanner:
  enabled: true
  schedule: "0 */6 * * *"
  allNamespaces: true
  outputFormat: json
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

monitor:
  enabled: false
  mode: http
  port: 8423
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

rbac:
  create: true

serviceAccount:
  create: true
  name: agent-bom

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "500m"

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /status
    port: protect
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /status
    port: protect
  initialDelaySeconds: 2
  periodSeconds: 10

startupProbe:
  httpGet:
    path: /status
    port: protect
  failureThreshold: 12
  periodSeconds: 5

networkPolicy:
  enabled: true
