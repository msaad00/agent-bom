image:
  repository: agentbom/agent-bom
  tag: "0.70.8"
  pullPolicy: IfNotPresent

runtimeImage:
  repository: agentbom/agent-bom-runtime
  tag: "0.70.8"
  pullPolicy: IfNotPresent

scanner:
  enabled: true
  schedule: "0 */6 * * *"
  allNamespaces: true
  outputFormat: json
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

monitor:
  enabled: false
  mode: http
  port: 8423

rbac:
  create: true

serviceAccount:
  create: true
  name: agent-bom

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "500m"
