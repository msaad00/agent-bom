image:
  repository: agentbom/agent-bom
  tag: "0.76.4"
  pullPolicy: IfNotPresent

uiImage:
  repository: agentbom/agent-bom-ui
  tag: "0.76.4"
  pullPolicy: IfNotPresent

runtimeImage:
  repository: agentbom/agent-bom-runtime
  tag: "0.76.4"
  pullPolicy: IfNotPresent

imagePullSecrets: []
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

scanner:
  enabled: true
  schedule: "0 */6 * * *"
  allNamespaces: true
  outputFormat: json
  extraArgs: []
  env: []
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

monitor:
  enabled: false
  mode: http
  port: 8423
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls: []

controlPlane:
  enabled: false
  api:
    enabled: true
    replicas: 2
    port: 8422
    args:
      - api
      - --host
      - 0.0.0.0
      - --port
      - "8422"
    env: []
    envFrom: []
    service:
      enabled: true
      type: ClusterIP
      annotations: {}
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    startupProbe:
      httpGet:
        path: /health
        port: http
      failureThreshold: 18
      periodSeconds: 5
  ui:
    enabled: true
    replicas: 2
    port: 3000
    env:
      - name: NEXT_PUBLIC_API_URL
        value: ""
    envFrom: []
    service:
      enabled: true
      type: ClusterIP
      annotations: {}
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
    startupProbe:
      httpGet:
        path: /
        port: http
      failureThreshold: 18
      periodSeconds: 5
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ""
        apiPaths:
          - path: /v1
            pathType: Prefix
          - path: /health
            pathType: Prefix
          - path: /docs
            pathType: Prefix
          - path: /redoc
            pathType: Prefix
          - path: /openapi.json
            pathType: Prefix
          - path: /ws
            pathType: Prefix
        uiPaths:
          - path: /
            pathType: Prefix
    tls: []

rbac:
  create: true

serviceAccount:
  create: true
  name: agent-bom
  annotations: {}

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "500m"

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /status
    port: protect
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /status
    port: protect
  initialDelaySeconds: 2
  periodSeconds: 10

startupProbe:
  httpGet:
    path: /status
    port: protect
  failureThreshold: 12
  periodSeconds: 5

networkPolicy:
  enabled: true
  restrictIngress: false
  ingress: []
  allowDns: true
  allowWeb: true
  webPorts:
    - 80
    - 443
  additionalEgress: []

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: null
