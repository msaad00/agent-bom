apiVersion: batch/v1
kind: CronJob
metadata:
  name: agent-bom-scan
  namespace: agent-bom
  labels:
    app.kubernetes.io/name: agent-bom
    app.kubernetes.io/component: scanner
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agent-bom
            app.kubernetes.io/component: scanner
        spec:
          serviceAccountName: agent-bom
          containers:
            - name: scanner
              image: msaad02/agent-bom:latest
              command: ["agent-bom"]
              args:
                - "scan"
                - "--k8s"
                - "-A"
                - "-f"
                - "json"
                - "-o"
                - "/output/scan.json"
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: output
                  mountPath: /output
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "500m"
          volumes:
            - name: output
              emptyDir: {}
          restartPolicy: OnFailure
