apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agent-bom-monitor
  namespace: agent-bom
  labels:
    app.kubernetes.io/name: agent-bom
    app.kubernetes.io/component: monitor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-bom
      app.kubernetes.io/component: monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-bom
        app.kubernetes.io/component: monitor
    spec:
      automountServiceAccountToken: false
      serviceAccountName: agent-bom
      containers:
        - name: monitor
          image: agentbom/agent-bom:0.81.2
          command: ["agent-bom"]
          args:
            - "protect"
            - "--mode"
            - "http"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8423"
          ports:
            - containerPort: 8423
              name: protect
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /status
              port: protect
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: protect
            initialDelaySeconds: 2
            periodSeconds: 10
