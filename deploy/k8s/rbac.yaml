apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-bom
  namespace: agent-bom
  labels:
    app.kubernetes.io/name: agent-bom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-bom-reader
  labels:
    app.kubernetes.io/name: agent-bom
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-bom-reader
  labels:
    app.kubernetes.io/name: agent-bom
subjects:
  - kind: ServiceAccount
    name: agent-bom
    namespace: agent-bom
roleRef:
  kind: ClusterRole
  name: agent-bom-reader
  apiGroup: rbac.authorization.k8s.io
