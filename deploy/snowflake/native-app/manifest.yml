manifest_version: 1

version:
  name: agent-bom
  label: "agent-bom — AI Supply Chain Security"
  comment: >-
    Map the full trust chain from AI agents and MCP servers to CVEs,
    credentials, and blast radius. Discover, scan, and secure your
    AI infrastructure from a single Snowflake Native App.

artifacts:
  setup_script: scripts/setup.sql
  default_web_endpoint:
    service: core.agent_bom_api
    endpoint: ui
  container_services:
    images:
      - /db/schema/agent_bom_repo/agent-bom:v0_86_1
      - /db/schema/agent_bom_repo/agent-bom-ui:v0_86_1
      - /db/schema/agent_bom_repo/agent-bom-scanner:v0_86_1
      - /db/schema/agent_bom_repo/agent-bom-mcp-runtime:v0_86_1
  service_roles:
    - name: api
      comment: >-
        Grants USAGE on the FastAPI backend service endpoint (port 8422).
        Assign to roles that need programmatic access to the agent-bom REST API.
    - name: ui
      comment: >-
        Grants USAGE on the Next.js dashboard service endpoint (port 3000).
        Assign to roles that need browser-based access to the agent-bom UI.
    - name: scanner
      comment: >-
        Grants USAGE on the opt-in scanner service endpoint (port 8424).
        Assign only after core.enable_scanner_service() has created the
        service in the consumer account.
    - name: mcp_runtime
      comment: >-
        Grants USAGE on the optional MCP runtime service endpoint (port 8423).
        Assign only after core.enable_mcp_runtime_service() has created the
        bearer-token protected runtime service.

privileges:
  - CREATE COMPUTE POOL:
      description: Required to run the agent-bom API container
  - CREATE SERVICE:
      description: Required to deploy Snowpark Container Service
  - BIND SERVICE ENDPOINT:
      description: Required to expose the API endpoint internally

configuration:
  log_level:
    type: STRING
    default: INFO
  scan_interval_hours:
    type: NUMBER
    default: 6
  network_policy_name:
    type: STRING
    default: ""
  fail_open:
    type: BOOLEAN
    default: false
  prefer_local_db:
    type: BOOLEAN
    default: true
  retention_days:
    type: NUMBER
    default: 90
  enable_scanner_service:
    type: BOOLEAN
    default: false
  enable_mcp_runtime_service:
    type: BOOLEAN
    default: false
  scanner_service_name:
    type: STRING
    default: core.agent_bom_scanner
  mcp_runtime_service_name:
    type: STRING
    default: core.agent_bom_mcp_runtime

references:
  - cloud_asset_tables:
      label: "Cloud Asset Tables"
      description: >-
        SELECT access to the customer's cloud asset inventory tables.
        agent-bom reads these tables to discover cloud resources for scanning.
        No write access is requested or granted.
      object_type: TABLE
      privileges:
        - SELECT
  - iam_tables:
      label: "IAM Tables"
      description: >-
        SELECT access to the customer's IAM/identity tables.
        agent-bom reads these to map principal-to-resource relationships.
        No write access is requested or granted.
      object_type: TABLE
      privileges:
        - SELECT
  - vuln_tables:
      label: "Vulnerability Tables"
      description: >-
        SELECT access to the customer's existing vulnerability data tables
        (optional — agent-bom can populate these itself).
        No write access is requested or granted.
      object_type: TABLE
      privileges:
        - SELECT
  - log_tables:
      label: "Audit Log Tables"
      description: >-
        SELECT access to the customer's audit log / CloudTrail tables.
        agent-bom reads these to correlate access patterns with findings.
        No write access is requested or granted.
      object_type: TABLE
      privileges:
        - SELECT
  - artifact_stages:
      label: "Artifact Stages"
      description: >-
        READ access to the customer's artifact stages (container images,
        model files). agent-bom reads manifest files to enumerate packages.
        No write access is requested or granted.
      object_type: STAGE
      privileges:
        - READ

external_access_integrations:
  - osv_dev:
      label: "OSV.dev Advisory Feed"
      description: >-
        Allows agent-bom to query the OSV.dev vulnerability database for
        open-source package CVEs. Disabled by default — enable only if you
        want agent-bom to enrich findings with OSV data.
      enabled: false
      egress_destinations:
        - api.osv.dev
        - osv.dev
  - cisa_kev:
      label: "CISA KEV Feed"
      description: >-
        Allows agent-bom to fetch the CISA Known Exploited Vulnerabilities
        catalogue. Disabled by default.
      enabled: false
      egress_destinations:
        - www.cisa.gov
  - first_epss:
      label: "FIRST EPSS Feed"
      description: >-
        Allows agent-bom to query FIRST EPSS scores for CVE prioritisation.
        Disabled by default.
      enabled: false
      egress_destinations:
        - api.first.org
  - github_ghsa:
      label: "GitHub Advisory Database (GHSA)"
      description: >-
        Allows agent-bom to query the GitHub Advisory Database for package
        vulnerabilities. Disabled by default.
      enabled: false
      egress_destinations:
        - api.github.com
