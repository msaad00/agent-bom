    <text x="578" y="299" class="node-sub">env · identity · MCP · model</text>
    <text x="546" y="319" class="pill">multi-hop attack-path fusion</text></g>
  <g><rect x="532" y="338" width="182" height="56" rx="9" fill="#161619" stroke="#2a2a31"/>
