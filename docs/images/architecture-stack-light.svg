<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .title { font-size: 20px; font-weight: 800; fill: #111827; }
    .subtitle { font-size: 11px; font-weight: 500; fill: #64748b; }
    .col-title { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; }
    .card-title { font-size: 12px; font-weight: 760; fill: #111827; }
    .card-copy { font-size: 9.5px; font-weight: 500; fill: #475569; }
    .chip { font-size: 8px; font-weight: 700; fill: #334155; }
    .note-title { font-size: 10px; font-weight: 800; fill: #111827; letter-spacing: 0.08em; }
    .note-copy { font-size: 9px; font-weight: 500; fill: #475569; }
    .summary-title { font-size: 10px; font-weight: 800; fill: #111827; }
    .summary-copy { font-size: 10px; font-weight: 600; fill: #334155; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect width="960" height="540" rx="18" fill="url(#bg)" stroke="#e5e7eb"/>

  <text x="480" y="36" text-anchor="middle" class="title">Architecture at a glance</text>
  <text x="480" y="56" text-anchor="middle" class="subtitle">Discovery and runtime inspection feed one persisted graph that powers the product surfaces.</text>

  <path d="M232 230H254" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M464 230H486" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M696 230H718" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="32" y="88" width="200" height="340" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
  <rect x="264" y="88" width="200" height="340" rx="18" fill="#fcfcff" stroke="#e5e7eb"/>
  <rect x="496" y="88" width="200" height="340" rx="18" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="728" y="88" width="200" height="340" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>

  <text x="52" y="116" class="col-title" fill="#7c3aed">DISCOVERY + RUNTIME</text>
  <text x="284" y="116" class="col-title" fill="#e11d48">SCANNERS + ANALYZERS</text>
  <text x="516" y="116" class="col-title" fill="#059669">UNIFIED GRAPH</text>
  <text x="748" y="116" class="col-title" fill="#2563eb">OPERATOR SURFACES</text>

  <rect x="48" y="132" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="62" y="154" class="card-title">Agents and MCP</text>
  <text x="62" y="170" class="card-copy">Claude, Cursor, Windsurf, VS Code, local configs</text>
  <rect x="62" y="172" width="48" height="16" rx="8" fill="#ede9fe"/><text x="86" y="183" text-anchor="middle" class="chip">agents</text>
  <rect x="116" y="172" width="40" height="16" rx="8" fill="#ede9fe"/><text x="136" y="183" text-anchor="middle" class="chip">MCP</text>
  <rect x="162" y="172" width="38" height="16" rx="8" fill="#ede9fe"/><text x="181" y="183" text-anchor="middle" class="chip">tools</text>

  <rect x="48" y="206" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="62" y="228" class="card-title">Supply-chain inputs</text>
  <text x="62" y="244" class="card-copy">Lockfiles, images, IaC, model artifacts, cloud posture</text>
  <rect x="62" y="246" width="56" height="16" rx="8" fill="#ede9fe"/><text x="90" y="257" text-anchor="middle" class="chip">lockfiles</text>
  <rect x="124" y="246" width="42" height="16" rx="8" fill="#ede9fe"/><text x="145" y="257" text-anchor="middle" class="chip">images</text>
  <rect x="172" y="246" width="24" height="16" rx="8" fill="#ede9fe"/><text x="184" y="257" text-anchor="middle" class="chip">IaC</text>

  <rect x="48" y="280" width="168" height="68" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="62" y="302" class="card-title">Runtime signals</text>
  <text x="62" y="318" class="card-copy">Proxy traffic, Shield hooks, drift, credential, and sequence checks</text>
  <rect x="62" y="326" width="40" height="16" rx="8" fill="#ede9fe"/><text x="82" y="337" text-anchor="middle" class="chip">proxy</text>
  <rect x="108" y="326" width="42" height="16" rx="8" fill="#ede9fe"/><text x="129" y="337" text-anchor="middle" class="chip">Shield</text>
  <rect x="156" y="326" width="40" height="16" rx="8" fill="#ede9fe"/><text x="176" y="337" text-anchor="middle" class="chip">policy</text>

  <rect x="48" y="366" width="168" height="44" rx="12" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="62" y="385" class="note-title">INPUTS</text>
  <text x="62" y="401" class="note-copy">Inventory, findings, runtime evidence, config posture</text>

  <rect x="280" y="132" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="294" y="154" class="card-title">Core scanning</text>
  <text x="294" y="170" class="card-copy">Package CVEs, secrets, containers, IaC, cloud posture</text>
  <rect x="294" y="172" width="34" height="16" rx="8" fill="#fee2e2"/><text x="311" y="183" text-anchor="middle" class="chip">CVE</text>
  <rect x="334" y="172" width="46" height="16" rx="8" fill="#fee2e2"/><text x="357" y="183" text-anchor="middle" class="chip">secrets</text>
  <rect x="386" y="172" width="40" height="16" rx="8" fill="#fee2e2"/><text x="406" y="183" text-anchor="middle" class="chip">cloud</text>

  <rect x="280" y="206" width="168" height="68" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="294" y="228" class="card-title">AST + SAST depth</text>
  <text x="294" y="244" class="card-copy">Python, JS/TS, Go, cross-file flows, taint, SARIF</text>
  <rect x="294" y="252" width="32" height="16" rx="8" fill="#fee2e2"/><text x="310" y="263" text-anchor="middle" class="chip">AST</text>
  <rect x="332" y="252" width="38" height="16" rx="8" fill="#fee2e2"/><text x="351" y="263" text-anchor="middle" class="chip">SAST</text>
  <rect x="376" y="252" width="42" height="16" rx="8" fill="#fee2e2"/><text x="397" y="263" text-anchor="middle" class="chip">taint</text>

  <rect x="280" y="290" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="294" y="312" class="card-title">Risk interpretation</text>
  <text x="294" y="328" class="card-copy">Blast radius, CWE impact, compliance tags, trust posture</text>

  <rect x="280" y="366" width="168" height="44" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text x="294" y="385" class="note-title">OUTPUT</text>
  <text x="294" y="401" class="note-copy">Entities, findings, attack-path facts, remediation context</text>

  <rect x="512" y="132" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="526" y="154" class="card-title">Canonical contract</text>
  <text x="526" y="170" class="card-copy">Entities, edges, findings, events, paths, snapshots</text>
  <rect x="526" y="172" width="52" height="16" rx="8" fill="#dcfce7"/><text x="552" y="183" text-anchor="middle" class="chip">entities</text>
  <rect x="584" y="172" width="38" height="16" rx="8" fill="#dcfce7"/><text x="603" y="183" text-anchor="middle" class="chip">edges</text>
  <rect x="628" y="172" width="36" height="16" rx="8" fill="#dcfce7"/><text x="646" y="183" text-anchor="middle" class="chip">diffs</text>

  <rect x="512" y="206" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="526" y="228" class="card-title">Persistence + tenancy</text>
  <text x="526" y="244" class="card-copy">SQLite or Postgres, tenant snapshots, presets, latest-state resolution</text>

  <rect x="512" y="280" width="168" height="68" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="526" y="302" class="card-title">Views and pivots</text>
  <text x="526" y="318" class="card-copy">Current state, diff, search, impact, attack paths, compliance, OCSF export</text>
  <rect x="526" y="326" width="40" height="16" rx="8" fill="#dcfce7"/><text x="546" y="337" text-anchor="middle" class="chip">graph</text>
  <rect x="572" y="326" width="34" height="16" rx="8" fill="#dcfce7"/><text x="589" y="337" text-anchor="middle" class="chip">diff</text>
  <rect x="612" y="326" width="44" height="16" rx="8" fill="#dcfce7"/><text x="634" y="337" text-anchor="middle" class="chip">paths</text>

  <rect x="512" y="366" width="168" height="44" rx="12" fill="#ecfdf5" stroke="#86efac"/>
  <text x="526" y="385" class="note-title">ONE GRAPH</text>
  <text x="526" y="401" class="note-copy">Same contract across CLI, API, dashboard, exports, and policy</text>

  <rect x="744" y="132" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="758" y="154" class="card-title">CLI + CI</text>
  <text x="758" y="170" class="card-copy">Local scans, GitHub Action gates, Docker, SARIF, SBOM</text>

  <rect x="744" y="206" width="168" height="58" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="758" y="228" class="card-title">API + dashboard</text>
  <text x="758" y="244" class="card-copy">Unified graph explorer, search, node detail, diff, compliance</text>

  <rect x="744" y="280" width="168" height="68" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="758" y="302" class="card-title">Runtime + export</text>
  <text x="758" y="318" class="card-copy">Proxy enforcement, OCSF, HTML/PDF reports, evidence bundles</text>
  <rect x="758" y="326" width="40" height="16" rx="8" fill="#dbeafe"/><text x="778" y="337" text-anchor="middle" class="chip">graph</text>
  <rect x="804" y="326" width="38" height="16" rx="8" fill="#dbeafe"/><text x="823" y="337" text-anchor="middle" class="chip">delta</text>
  <rect x="848" y="326" width="40" height="16" rx="8" fill="#dbeafe"/><text x="868" y="337" text-anchor="middle" class="chip">OCSF</text>

  <rect x="744" y="366" width="168" height="44" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="758" y="385" class="note-title">USER PATH</text>
  <text x="758" y="401" class="note-copy">One product surface from local scan to central review</text>

  <rect x="32" y="452" width="896" height="56" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="56" y="475" class="summary-title">Why this matters</text>
  <text x="56" y="494" class="summary-copy">The same persisted graph powers search, impact, diff, attack-path drilldown, OCSF export, and runtime-aware review.</text>
</svg>
