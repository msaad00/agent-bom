  <rect x="24" y="48" width="4" height="328" rx="2" fill="#ef4444"/>
  <text x="52" y="140" text-anchor="middle" class="side-label" fill="#dc2626" transform="rotate(-90, 52, 140)">SECURITY LAYER</text>
  <text x="52" y="260" text-anchor="middle" class="detail" transform="rotate(-90, 52, 260)">redaction · validation · rate limits · signing</text>

  <!-- ═══ RUNTIME SIDEBAR ═══ -->
  <rect x="720" y="48" width="56" height="328" rx="8" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <rect x="772" y="48" width="4" height="328" rx="2" fill="#7c3aed"/>
  <text x="748" y="130" text-anchor="middle" class="side-label" fill="#7c3aed" transform="rotate(90, 748, 130)">DEPLOYMENT</text>
  <text x="748" y="260" text-anchor="middle" class="detail" transform="rotate(90, 748, 260)">proxy · protect · watch · Helm · Docker · Action</text>

  <!-- ═══ BOTTOM LABEL ═══ -->
  <text x="400" y="406" text-anchor="middle" font-size="9" font-weight="500" fill="#a1a1aa" font-family="system-ui, sans-serif">Data flows bottom → top. Postgres RLS, analytics, tracing, and deployment are explicit parts of the stack.</text>
