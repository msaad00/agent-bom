  <text x="922" y="216" text-anchor="end" class="mod-sub" fill="#059669">interactive</text>

  <rect x="776" y="232" width="146" height="28" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="0.5"/>
