  <polygon points="746,190 758,196 746,202" fill="#f43f5e" opacity="0.3"/>
  <text x="739" y="184" text-anchor="middle" class="arrow-text">report</text>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!-- PHASE 4: REPORT                                                         -->
