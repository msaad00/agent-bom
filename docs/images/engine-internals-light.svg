  <text x="702" y="216" text-anchor="end" class="mod-sub" fill="#e11d48">17 conditions</text>

  <rect x="530" y="232" width="172" height="28" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="0.5"/>
