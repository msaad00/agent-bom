<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" fill="none">
  <style>
    .title { font: 700 18px system-ui, -apple-system, sans-serif; fill: #1f2328; }
    .subtitle { font: 500 11px system-ui, -apple-system, sans-serif; fill: #656d76; }
    .step-num { font: 700 24px system-ui, sans-serif; }
    .step-title { font: 700 13px system-ui, sans-serif; fill: #1f2328; }
    .step-detail { font: 400 10px system-ui, sans-serif; fill: #656d76; }
    .step-cmd { font: 600 9.5px 'SF Mono', 'Fira Code', monospace; }
    .connector { font: 600 16px system-ui, sans-serif; fill: #d0d7de; }
    .footer { font: 500 9px system-ui, sans-serif; fill: #656d76; }
  </style>

  <rect width="960" height="360" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" class="title">How It Works</text>
  <text x="480" y="50" text-anchor="middle" class="subtitle">From install to actionable results in three steps</text>

  <!-- ═══ STEP 1: INSTALL ═══ -->
  <rect x="40" y="76" width="240" height="200" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <circle cx="80" cy="102" r="16" fill="#3b82f6"/>
  <text x="80" y="108" text-anchor="middle" class="step-num" fill="#fff">1</text>
  <text x="108" y="106" class="step-title" fill="#1e40af">Install</text>

  <text x="60" y="140" class="step-cmd" fill="#3b82f6">pip install agent-bom</text>

  <text x="60" y="166" class="step-detail">Works out of the box. No config needed.</text>
  <text x="60" y="182" class="step-detail">Also available as:</text>

  <rect x="56" y="194" width="68" height="22" rx="4" fill="#dbeafe"/>
  <text x="90" y="209" text-anchor="middle" class="step-detail" fill="#2563eb">Docker</text>

  <rect x="132" y="194" width="68" height="22" rx="4" fill="#dbeafe"/>
  <text x="166" y="209" text-anchor="middle" class="step-detail" fill="#2563eb">MCP tool</text>

  <rect x="208" y="194" width="56" height="22" rx="4" fill="#dbeafe"/>
  <text x="236" y="209" text-anchor="middle" class="step-detail" fill="#2563eb">Action</text>

  <text x="60" y="240" class="step-detail">Zero dependencies for core scan.</text>
  <text x="60" y="256" class="step-detail">Optional: Grype/Syft for containers.</text>

  <!-- Arrow 1→2 -->
  <text x="308" y="180" class="connector">→</text>

  <!-- ═══ STEP 2: SCAN ═══ -->
  <rect x="340" y="76" width="260" height="200" rx="14" fill="#fef3c7" stroke="#fde68a" stroke-width="2"/>
  <circle cx="380" cy="102" r="16" fill="#d97706"/>
  <text x="380" y="108" text-anchor="middle" class="step-num" fill="#fff">2</text>
  <text x="408" y="106" class="step-title" fill="#92400e">Scan</text>

  <text x="360" y="140" class="step-cmd" fill="#d97706">agent-bom scan</text>

  <text x="360" y="166" class="step-detail">Auto-discovers MCP clients (20 supported),</text>
  <text x="360" y="182" class="step-detail">extracts servers + packages, scans for CVEs</text>
  <text x="360" y="198" class="step-detail">across 5 databases, maps blast radius, checks</text>
  <text x="360" y="214" class="step-detail">compliance (10 frameworks), looks up 427+</text>
  <text x="360" y="230" class="step-detail">MCP servers in registry. All local-first.</text>

  <rect x="360" y="244" width="224" height="22" rx="4" fill="#fde68a"/>
  <text x="472" y="259" text-anchor="middle" class="step-detail" fill="#92400e">Credentials auto-redacted. No data leaves your machine.</text>

  <!-- Arrow 2→3 -->
  <text x="628" y="180" class="connector">→</text>

  <!-- ═══ STEP 3: ACT ═══ -->
  <rect x="660" y="76" width="260" height="200" rx="14" fill="#dcfce7" stroke="#bbf7d0" stroke-width="2"/>
  <circle cx="700" cy="102" r="16" fill="#16a34a"/>
  <text x="700" y="108" text-anchor="middle" class="step-num" fill="#fff">3</text>
  <text x="728" y="106" class="step-title" fill="#166534">Act</text>

  <text x="680" y="136" class="step-detail">Get actionable results:</text>

  <rect x="680" y="146" width="220" height="20" rx="4" fill="#bbf7d0"/>
  <text x="690" y="160" class="step-detail" fill="#166534">Vulnerability report with fix guidance</text>

  <rect x="680" y="172" width="220" height="20" rx="4" fill="#bbf7d0"/>
  <text x="690" y="186" class="step-detail" fill="#166534">SBOM (CycloneDX / SPDX)</text>

  <rect x="680" y="198" width="220" height="20" rx="4" fill="#bbf7d0"/>
  <text x="690" y="212" class="step-detail" fill="#166534">Compliance scorecard (10 frameworks)</text>

  <rect x="680" y="224" width="220" height="20" rx="4" fill="#bbf7d0"/>
  <text x="690" y="238" class="step-detail" fill="#166534">Blast radius map (CVE → creds → tools)</text>

  <rect x="680" y="250" width="220" height="20" rx="4" fill="#bbf7d0"/>
  <text x="690" y="264" class="step-detail" fill="#166534">CI gate (--fail-on-severity high)</text>

  <!-- ═══ FOOTER ═══ -->
  <text x="480" y="312" text-anchor="middle" class="footer">Works the same in every mode: CLI · MCP Server · REST API · GitHub Action · Runtime Proxy · Dashboard</text>
  <text x="480" y="330" text-anchor="middle" class="footer">Open source · Apache 2.0 · github.com/msaad00/agent-bom</text>
  <line x1="40" y1="296" x2="920" y2="296" stroke="#e2e8f0" stroke-width="1"/>
</svg>
