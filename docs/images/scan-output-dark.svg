<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <style>
      .bg    { fill: #0d1117; }
      .bar   { fill: #1c2128; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #28c840; }
      text   { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
      .dim   { fill: #484f58; }
      .norm  { fill: #c9d1d9; }
      .grn   { fill: #3fb950; }
      .yel   { fill: #d29922; }
      .red   { fill: #f85149; }
      .blu   { fill: #58a6ff; }
      .cyn   { fill: #79c0ff; }
      .pur   { fill: #bc8cff; }
      .hdr   { fill: #8b949e; }
    </style>
  </defs>

  <!-- window chrome -->
  <rect width="900" height="600" rx="10" class="bg"/>
  <rect width="900" height="36" rx="10" class="bar"/>
