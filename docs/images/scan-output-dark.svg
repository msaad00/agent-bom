  <text x="36" y="532" class="norm">           </text><text x="110" y="532" class="pur">EU AI Act · NIST CSF · ISO 27001 · SOC 2 · CIS Controls  (13 frameworks)</text>
  <text x="36" y="548" class="norm">Cloud: </text><text x="82" y="548" class="cyn">AWS (EC2 · EKS · Bedrock)  |  12 providers supported</text>
