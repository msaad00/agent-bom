  <text x="20" y="424" class="hdr">  2 new finding(s) since last scan  |  compliance: OWASP LLM05, NIST AI RMF MAP-1.5</text>

  <!-- divider -->
  <line x1="20" y1="436" x2="880" y2="436" stroke="#21262d" stroke-width="1"/>

