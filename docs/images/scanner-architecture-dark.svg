  <line x1="134" y1="160" x2="146" y2="160" stroke="#6e7681" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ STAGE 2: EXTRACT ═══ -->
  <rect x="150" y="56" width="118" height="210" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="0.8"/>
