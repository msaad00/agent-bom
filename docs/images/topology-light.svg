  <text x="16" y="260" class="layer-label" transform="rotate(-90, 16, 260)">MCP SERVERS</text>
  <text x="16" y="420" class="layer-label" transform="rotate(-90, 16, 420)">TOOLS + CREDENTIALS</text>

