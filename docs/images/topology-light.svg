  <rect x="24" y="452" width="912" height="52" rx="10" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>

  <text x="52" y="472" font-size="10" font-weight="600" fill="#18181b">What this view tells you:</text>

