  <path d="M190 138 C190 170, 360 190, 360 218" stroke="#3b82f6" stroke-width="2" opacity="0.3" fill="none"/>
  <path d="M220 138 C230 170, 580 185, 580 218" stroke="#3b82f6" stroke-width="1.5" opacity="0.2" fill="none"/>
