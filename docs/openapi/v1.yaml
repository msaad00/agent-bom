  /v1/gateway/upstreams/discovered:
    get:
      description: "Return the remote MCP servers discovered across the tenant's fleet.\n\
        \nAggregates every MCP server surfaced by the fleet-scan path (pushed\nvia\
        \ ``/v1/fleet/sync`` or returned from in-cluster scans) that has a\nstreamable\
        \ HTTP URL \u2014 i.e. something this multi-MCP gateway can\nrelay with JSON-RPC-over-HTTP\
        \ POST. stdio servers are excluded because\nthey only make sense as a per-workload\
        \ sidecar / wrapper\n(``agent-bom proxy -- <cmd>``); legacy SSE endpoints\
        \ are excluded\nbecause the gateway does not maintain persistent upstream\
        \ SSE clients.\n\nResponse shape matches the ``upstreams.yaml`` the gateway\
        \ consumes,\nso a gateway pod can pull this endpoint at startup and every\
        \ N\nseconds to auto-populate its registry without the operator hand-\nediting\
        \ YAML. Auth / bearer-token wiring is still operator-supplied\nvia `gateway.envFrom`\
        \ because tokens live in Secrets, not scan data.\n\nShape::\n\n    {\n   \
        \   \"generated_at\": \"2026-04-20T00:00:00Z\",\n      \"tenant_id\": \"...\"\
        ,\n      \"source\": \"fleet_scan_aggregate\",\n      \"upstreams\": [\n \
        \       {\"name\": \"jira\", \"url\": \"https://...\", \"transport\": \"streamable-http\"\
        ,\n         \"auth\": \"none\", \"source_agents\": [\"agent-a\", ...]},\n\
        \        ...\n      ]\n    }\n\nThe ``auth`` field is always ``\"none\"``\
        \ from discovery \u2014 discovery can\nsee the URL but not the credential.\
        \ The gateway operator decides per\nupstream whether to switch it to ``bearer``\
        \ + ``token_env`` when\nmerging with their authored overrides."
      operationId: discovered_upstreams_v1_gateway_upstreams_discovered_get
      parameters:
      - in: header
        name: X-Agent-Bom-Role
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Role
      - in: header
        name: X-Agent-Bom-Tenant-ID
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Tenant-Id
      - in: header
        name: X-Agent-Bom-Proxy-Secret
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Proxy-Secret
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Discovered Upstreams V1 Gateway Upstreams Discovered
                  Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Discovered Upstreams
      tags:
      - gateway
