  /v1/compliance/{framework}/report:
    get:
      description: "Export a tamper-evident signed evidence bundle for a single framework.\n\
        \nThe bundle pairs each control with the blast-radius findings that map to\n\
        its tags, the audit-log entries within the requested time window, and\nintegrity\
        \ totals from the HMAC-chained log.\n\nSecurity properties of the bundle:\n\
        \n- **Integrity** \u2014 ``X-Agent-Bom-Compliance-Report-Signature`` is the\n\
        \  HMAC-SHA256 of the canonical body. Any tampering with any field\n  invalidates\
        \ the signature.\n- **Replay protection** \u2014 the body carries ``nonce``\
        \ (128-bit) and\n  ``expires_at``; both are inside the signed envelope so\
        \ a captured\n  bundle cannot be re-used after its expiry window. Consumers\
        \ should\n  reject bundles where ``expires_at`` is in the past.\n- **Confidentiality**\
        \ \u2014 the bundle is cleartext at the application\n  layer by design (auditors\
        \ need to read it). Operators MUST serve\n  ``/v1/compliance/*`` over TLS\
        \ so evidence is not sniffable in\n  transit.\n- **Non-repudiation** \u2014\
        \ HMAC is a shared secret so it does not provide\n  true non-repudiation;\
        \ for forensic use, correlate with the\n  ``compliance.report_exported`` entry\
        \ in the audit log (which\n  records the nonce of every exported bundle).\n\
        - **Tenant isolation** \u2014 controls evidence and audit events are\n  filtered\
        \ by the authed tenant; cross-tenant data never appears\n  in a bundle belonging\
        \ to another tenant.\n\nQuery params:\n  - ``since`` ISO-8601 timestamp (default:\
        \ now \u2212 30 days)\n  - ``until`` ISO-8601 timestamp (default: now)\n \
        \ - ``format`` ``json`` (default) or ``jsonl`` for streaming consumers"
      operationId: export_compliance_report_v1_compliance__framework__report_get
      parameters:
      - in: path
        name: framework
        required: true
        schema:
          title: Framework
          type: string
      - in: query
        name: since
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Since
      - in: query
        name: until
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Until
      - in: query
        name: format
        required: false
        schema:
          default: json
          title: Format
          type: string
      - in: header
        name: X-Agent-Bom-Role
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Role
      - in: header
        name: X-Agent-Bom-Tenant-ID
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Tenant-Id
      - in: header
        name: X-Agent-Bom-Proxy-Secret
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Proxy-Secret
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceReportBundle'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Export Compliance Report
      tags:
      - compliance
