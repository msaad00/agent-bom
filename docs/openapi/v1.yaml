components:
  schemas:
    AnalyticsHealth:
      properties:
        backend:
          default: disabled
          title: Backend
          type: string
        buffered:
          default: false
          title: Buffered
          type: boolean
        clickhouse_url_configured:
          default: false
          title: Clickhouse Url Configured
          type: boolean
        enabled:
          default: false
          title: Enabled
          type: boolean
        flush_interval_seconds:
          anyOf:
          - type: number
          - type: 'null'
          title: Flush Interval Seconds
        max_batch:
          anyOf:
          - type: integer
          - type: 'null'
          title: Max Batch
      title: AnalyticsHealth
      type: object
    AuditExportVerifyRequest:
      additionalProperties: false
      properties:
        payload:
          description: Audit export payload object, JSON string, or JSONL text
          title: Payload
        signature:
          description: X-Agent-Bom-Audit-Export-Signature value
          maxLength: 128
          minLength: 64
          title: Signature
          type: string
      required:
      - payload
      - signature
      title: AuditExportVerifyRequest
      type: object
    BrowserExtensionsRequest:
      additionalProperties: false
      description: Request body for POST /v1/scan/browser-extensions.
      properties:
        include_low_risk:
          default: false
          title: Include Low Risk
          type: boolean
      title: BrowserExtensionsRequest
      type: object
    BrowserSessionRequest:
      additionalProperties: false
      properties:
        api_key:
          description: API key to exchange for a same-origin httpOnly browser session
            cookie
          minLength: 1
          title: Api Key
          type: string
      required:
      - api_key
      title: BrowserSessionRequest
      type: object
    BulkFindingsRequest:
      additionalProperties: false
      description: Normalized finding ingest for headless clients and agent runtimes.
      properties:
        findings:
          items:
            additionalProperties: true
            type: object
          maxItems: 1000
          minItems: 1
          title: Findings
          type: array
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        schema_version:
          default: v1
          maxLength: 32
          minLength: 1
          title: Schema Version
          type: string
        source:
          default: api
          maxLength: 128
          minLength: 1
          title: Source
          type: string
        tenant_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Deprecated compatibility field; request tenant scope is authoritative.
          title: Tenant Id
      required:
      - findings
      title: BulkFindingsRequest
      type: object
    CloudConnectionCreate:
      additionalProperties: false
      description: Request body for creating a connection. ``external_id`` is write-only.
      properties:
        display_name:
          maxLength: 200
          minLength: 1
          title: Display Name
          type: string
        external_id:
          maxLength: 1024
          minLength: 1
          title: External Id
          type: string
        provider:
          title: Provider
          type: string
        regions:
          items:
            type: string
          title: Regions
          type: array
        role_ref:
          maxLength: 2048
          minLength: 1
          title: Role Ref
          type: string
      required:
      - provider
      - display_name
      - role_ref
      - external_id
      title: CloudConnectionCreate
      type: object
    ComplianceAuditIntegrity:
      properties:
        checked:
          default: 0
          title: Checked
          type: integer
        tampered:
          default: 0
          title: Tampered
          type: integer
        verified:
          default: 0
          title: Verified
          type: integer
      title: ComplianceAuditIntegrity
      type: object
    ComplianceEvidenceItem:
      properties:
        agents_at_risk:
          items:
            type: string
          title: Agents At Risk
          type: array
        control_tag:
          title: Control Tag
          type: string
        finding_id:
          title: Finding Id
          type: string
        fixed_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Fixed Version
        package:
          anyOf:
          - type: string
          - type: 'null'
          title: Package
        scan_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Scan Id
        severity:
          anyOf:
          - type: string
          - type: 'null'
          title: Severity
        vulnerability_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Vulnerability Id
      required:
      - finding_id
      - control_tag
      title: ComplianceEvidenceItem
      type: object
    ComplianceReportBundle:
      properties:
        audit_events:
          items:
            additionalProperties: true
            type: object
          title: Audit Events
          type: array
        audit_log_integrity:
          $ref: '#/components/schemas/ComplianceAuditIntegrity'
        controls:
          items:
            $ref: '#/components/schemas/ComplianceReportControl'
          title: Controls
          type: array
        expires_at:
          title: Expires At
          type: string
        framework:
          title: Framework
          type: string
        framework_key:
          title: Framework Key
          type: string
        framework_label:
          title: Framework Label
          type: string
        generated_at:
          title: Generated At
          type: string
        nonce:
          title: Nonce
          type: string
        schema_version:
          default: v1
          title: Schema Version
          type: string
        scope:
          $ref: '#/components/schemas/ComplianceReportScope'
        signature_algorithm:
          title: Signature Algorithm
          type: string
        summary:
          $ref: '#/components/schemas/ComplianceReportSummary'
        tenant_id:
          title: Tenant Id
          type: string
        threat_model:
          $ref: '#/components/schemas/ComplianceThreatModel'
      required:
      - framework
      - framework_key
      - framework_label
      - tenant_id
      - generated_at
      - expires_at
      - nonce
      - scope
      - summary
      - audit_log_integrity
      - signature_algorithm
      - threat_model
      title: ComplianceReportBundle
      type: object
    ComplianceReportControl:
      properties:
        control_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Control Id
        control_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Control Name
        evidence:
          items:
            $ref: '#/components/schemas/ComplianceEvidenceItem'
          title: Evidence
          type: array
        finding_count:
          default: 0
          title: Finding Count
          type: integer
        status:
          default: unknown
          title: Status
          type: string
      title: ComplianceReportControl
      type: object
    ComplianceReportScope:
      properties:
        audit_event_count:
          default: 0
          title: Audit Event Count
          type: integer
        control_count:
          default: 0
          title: Control Count
          type: integer
        finding_count:
          default: 0
          title: Finding Count
          type: integer
        since:
          title: Since
          type: string
        until:
          title: Until
          type: string
      required:
      - since
      - until
      title: ComplianceReportScope
      type: object
    ComplianceReportSummary:
      properties:
        fail:
          default: 0
          title: Fail
          type: integer
        pass:
          title: Pass
          type: integer
        score:
          default: 100.0
          title: Score
          type: number
        warning:
          default: 0
          title: Warning
          type: integer
      required:
      - pass
      title: ComplianceReportSummary
      type: object
    ComplianceThreatModel:
      properties:
        confidentiality:
          title: Confidentiality
          type: string
        integrity:
          title: Integrity
          type: string
        non_repudiation:
          title: Non Repudiation
          type: string
        replay:
          title: Replay
          type: string
      required:
      - integrity
      - confidentiality
      - replay
      - non_repudiation
      title: ComplianceThreatModel
      type: object
    CreateKeyRequest:
      additionalProperties: false
      properties:
        expires_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Expires At
        name:
          title: Name
          type: string
        role:
          default: viewer
          title: Role
          type: string
        scopes:
          items:
            type: string
          title: Scopes
          type: array
      required:
      - name
      title: CreateKeyRequest
      type: object
    CredentialRefCreate:
      additionalProperties: false
      properties:
        credential_class:
          default: generic
          title: Credential Class
          type: string
        description:
          default: ''
          title: Description
          type: string
        display_name:
          title: Display Name
          type: string
        enabled:
          default: true
          title: Enabled
          type: boolean
        expires_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Expires At
        expiry_warning_days:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          title: Expiry Warning Days
        external_ref:
          title: External Ref
          type: string
        last_rotated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Rotated At
        max_age_days:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          title: Max Age Days
        mode:
          default: external_ref
          title: Mode
          type: string
        owner:
          default: ''
          title: Owner
          type: string
        provider:
          title: Provider
          type: string
        rotation_interval_days:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          title: Rotation Interval Days
        scopes:
          items:
            type: string
          title: Scopes
          type: array
        tenant_id:
          default: default
          title: Tenant Id
          type: string
      required:
      - display_name
      - provider
      - external_ref
      title: CredentialRefCreate
      type: object
    CredentialRefStatus:
      enum:
      - configured
      - healthy
      - degraded
      - disabled
      - retired
      title: CredentialRefStatus
      type: string
    CredentialRefUpdate:
      additionalProperties: false
      properties:
        credential_class:
          anyOf:
          - type: string
          - type: 'null'
          title: Credential Class
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Enabled
        expires_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Expires At
        expiry_warning_days:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          title: Expiry Warning Days
        external_ref:
          anyOf:
          - type: string
          - type: 'null'
          title: External Ref
        last_rotated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Rotated At
        max_age_days:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          title: Max Age Days
        mode:
          anyOf:
          - type: string
          - type: 'null'
          title: Mode
        owner:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner
        provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
        rotation_interval_days:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          title: Rotation Interval Days
        scopes:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Scopes
        status:
          anyOf:
          - $ref: '#/components/schemas/CredentialRefStatus'
          - type: 'null'
      title: CredentialRefUpdate
      type: object
    DatasetCardsRequest:
      additionalProperties: false
      description: Request body for POST /v1/scan/dataset-cards.
      properties:
        directories:
          items:
            type: string
          title: Directories
          type: array
      required:
      - directories
      title: DatasetCardsRequest
      type: object
    DatasetVersionCreate:
      additionalProperties: false
      properties:
        artifact_uri:
          anyOf:
          - maxLength: 2048
            type: string
          - type: 'null'
          title: Artifact Uri
        digest:
          anyOf:
          - maxLength: 256
            type: string
          - type: 'null'
          title: Digest
        digest_algorithm:
          default: sha256
          maxLength: 32
          minLength: 1
          title: Digest Algorithm
          type: string
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        source:
          default: api
          maxLength: 128
          minLength: 1
          title: Source
          type: string
        tenant_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Deprecated compatibility field; request tenant scope is authoritative.
          title: Tenant Id
        version_id:
          anyOf:
          - maxLength: 128
            minLength: 1
            type: string
          - type: 'null'
          title: Version Id
      title: DatasetVersionCreate
      type: object
    EntitlementHealth:
      properties:
        current_oss_paths_gated:
          default: false
          title: Current Oss Paths Gated
          type: boolean
        enabled_feature_count:
          default: 0
          title: Enabled Feature Count
          type: integer
        lane:
          default: oss
          title: Lane
          type: string
        metadata_only:
          default: true
          title: Metadata Only
          type: boolean
        status:
          default: missing
          title: Status
          type: string
        support_tier:
          default: community
          title: Support Tier
          type: string
      title: EntitlementHealth
      type: object
    EvaluateRequest:
      additionalProperties: false
      properties:
        agent_name:
          default: ''
          title: Agent Name
          type: string
        arguments:
          additionalProperties: true
          title: Arguments
          type: object
        tool_name:
          title: Tool Name
          type: string
      required:
      - tool_name
      title: EvaluateRequest
      type: object
    EvaluationCase:
      additionalProperties: false
      properties:
        case_id:
          maxLength: 128
          minLength: 1
          title: Case Id
          type: string
        expected_ref:
          anyOf:
          - maxLength: 2048
            type: string
          - type: 'null'
          title: Expected Ref
        findings:
          items:
            additionalProperties: true
            type: object
          maxItems: 100
          title: Findings
          type: array
        input_ref:
          anyOf:
          - maxLength: 2048
            type: string
          - type: 'null'
          title: Input Ref
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        output_ref:
          anyOf:
          - maxLength: 2048
            type: string
          - type: 'null'
          title: Output Ref
        scores:
          additionalProperties:
            type: number
          title: Scores
          type: object
        trace_id:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Trace Id
      required:
      - case_id
      title: EvaluationCase
      type: object
    EvaluationRunCreate:
      additionalProperties: false
      properties:
        cases:
          items:
            $ref: '#/components/schemas/EvaluationCase'
          maxItems: 500
          title: Cases
          type: array
        dataset_id:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Dataset Id
        dataset_version_id:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Dataset Version Id
        evaluation_id:
          anyOf:
          - maxLength: 128
            minLength: 1
            type: string
          - type: 'null'
          title: Evaluation Id
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        model:
          anyOf:
          - maxLength: 256
            type: string
          - type: 'null'
          title: Model
        name:
          anyOf:
          - maxLength: 256
            type: string
          - type: 'null'
          title: Name
        prompt_hash:
          anyOf:
          - maxLength: 256
            type: string
          - type: 'null'
          title: Prompt Hash
        scores:
          additionalProperties:
            type: number
          title: Scores
          type: object
        source:
          default: api
          maxLength: 128
          minLength: 1
          title: Source
          type: string
        status:
          default: completed
          title: Status
          type: string
        summary:
          additionalProperties: true
          title: Summary
          type: object
        tenant_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Deprecated compatibility field; request tenant scope is authoritative.
          title: Tenant Id
        trace_id:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Trace Id
      title: EvaluationRunCreate
      type: object
    ExceptionRequest:
      additionalProperties: false
      properties:
        expires_at:
          default: ''
          title: Expires At
          type: string
        package_name:
          title: Package Name
          type: string
        reason:
          default: ''
          title: Reason
          type: string
        requested_by:
          default: ''
          title: Requested By
          type: string
        server_name:
          default: ''
          title: Server Name
          type: string
        tenant_id:
          default: default
          title: Tenant Id
          type: string
        vuln_id:
          title: Vuln Id
          type: string
      required:
      - vuln_id
      - package_name
      title: ExceptionRequest
      type: object
    FalsePositiveRequest:
      additionalProperties: false
      description: Request body for POST /v1/findings/false-positive.
      properties:
        marked_by:
          default: ''
          title: Marked By
          type: string
        package:
          title: Package
          type: string
        reason:
          default: ''
          title: Reason
          type: string
        vulnerability_id:
          title: Vulnerability Id
          type: string
      required:
      - vulnerability_id
      - package
      title: FalsePositiveRequest
      type: object
    FindingFeedbackRequest:
      additionalProperties: false
      description: Request body for POST /v1/findings/feedback.
      properties:
        expires_at:
          default: ''
          maxLength: 64
          title: Expires At
          type: string
        package:
          default: '*'
          maxLength: 256
          minLength: 1
          title: Package
          type: string
        reason:
          default: ''
          maxLength: 2000
          title: Reason
          type: string
        server_name:
          default: ''
          maxLength: 256
          title: Server Name
          type: string
        state:
          default: false_positive
          enum:
          - false_positive
          - accepted_risk
          - not_affected
          - not_applicable
          - fixed_verified
          - needs_review
          title: State
          type: string
        vulnerability_id:
          maxLength: 128
          minLength: 1
          title: Vulnerability Id
          type: string
      required:
      - vulnerability_id
      title: FindingFeedbackRequest
      type: object
    FindingTriageDecisionRequest:
      additionalProperties: false
      description: Request body for PUT /v1/findings/triage/{triage_id}/decision.
      properties:
        assignee:
          anyOf:
          - maxLength: 256
            type: string
          - type: 'null'
          title: Assignee
        decision:
          enum:
          - not_affected
          - affected
          - under_investigation
          title: Decision
          type: string
        decision_reason:
          default: ''
          maxLength: 2000
          title: Decision Reason
          type: string
        expires_at:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          title: Expires At
        justification:
          anyOf:
          - enum:
            - component_not_present
            - vulnerable_code_not_present
            - vulnerable_code_not_in_execute_path
            - vulnerable_code_cannot_be_controlled_by_adversary
            - inline_mitigations_already_exist
            type: string
          - type: 'null'
          title: Justification
      required:
      - decision
      title: FindingTriageDecisionRequest
      type: object
    FindingTriageRequest:
      additionalProperties: false
      description: Request body for POST /v1/findings/triage.
      properties:
        assignee:
          default: ''
          maxLength: 256
          title: Assignee
          type: string
        decision:
          default: under_investigation
          enum:
          - not_affected
          - affected
          - under_investigation
          title: Decision
          type: string
        decision_reason:
          default: ''
          maxLength: 2000
          title: Decision Reason
          type: string
        expires_at:
          default: ''
          maxLength: 64
          title: Expires At
          type: string
        justification:
          anyOf:
          - enum:
            - component_not_present
            - vulnerable_code_not_present
            - vulnerable_code_not_in_execute_path
            - vulnerable_code_cannot_be_controlled_by_adversary
            - inline_mitigations_already_exist
            type: string
          - type: 'null'
          title: Justification
        package:
          default: '*'
          maxLength: 256
          minLength: 1
          title: Package
          type: string
        queue_state:
          default: open
          enum:
          - open
          - assigned
          - reviewing
          - decided
          title: Queue State
          type: string
        server_name:
          default: ''
          maxLength: 256
          title: Server Name
          type: string
        vulnerability_id:
          maxLength: 128
          minLength: 1
          title: Vulnerability Id
          type: string
      required:
      - vulnerability_id
      title: FindingTriageRequest
      type: object
    FleetAgentUpdate:
      additionalProperties: false
      properties:
        environment:
          anyOf:
          - type: string
          - type: 'null'
          title: Environment
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
        owner:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
      title: FleetAgentUpdate
      type: object
    GraphDeployDecisionRequest:
      additionalProperties: false
      properties:
        blockRisk:
          default: 80.0
          description: Risk threshold for blocking
          maximum: 100.0
          minimum: 0.0
          title: Blockrisk
          type: number
        candidate:
          anyOf:
          - type: string
          - additionalProperties: true
            type: object
          description: Package, image, service, or structured candidate descriptor
          title: Candidate
        context:
          additionalProperties: true
          description: Optional caller context for future policy extensions
          title: Context
          type: object
        limit:
          default: 5
          description: Maximum matched exposure paths
          maximum: 25.0
          minimum: 1.0
          title: Limit
          type: integer
        scan_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Scan snapshot ID; latest if omitted
          title: Scan Id
        tenant_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Accepted for SDK compatibility; request tenant scope is authoritative
          title: Tenant Id
        warnRisk:
          default: 40.0
          description: Risk threshold for warning
          maximum: 100.0
          minimum: 0.0
          title: Warnrisk
          type: number
      required:
      - candidate
      title: GraphDeployDecisionRequest
      type: object
    GraphQueryRequest:
      additionalProperties: false
      properties:
        compliance_prefixes:
          items:
            type: string
          title: Compliance Prefixes
          type: array
        data_sources:
          items:
            type: string
          title: Data Sources
          type: array
        direction:
          default: forward
          enum:
          - forward
          - reverse
          - both
          title: Direction
          type: string
        dynamic_only:
          default: false
          title: Dynamic Only
          type: boolean
        entity_types:
          items:
            type: string
          title: Entity Types
          type: array
        include_attack_paths:
          default: false
          title: Include Attack Paths
          type: boolean
        include_roots:
          default: true
          title: Include Roots
          type: boolean
        max_depth:
          default: 4
          maximum: 10.0
          minimum: 1.0
          title: Max Depth
          type: integer
        max_edges:
          default: 10000
          maximum: 25000.0
          minimum: 1.0
          title: Max Edges
          type: integer
        max_nodes:
          default: 500
          maximum: 5000.0
          minimum: 1.0
          title: Max Nodes
          type: integer
        min_severity:
          default: ''
          title: Min Severity
          type: string
        relationship_types:
          items:
            type: string
          title: Relationship Types
          type: array
        roots:
          description: One or more starting node IDs
          items:
            type: string
          minItems: 1
          title: Roots
          type: array
        scan_id:
          default: ''
          title: Scan Id
          type: string
        static_only:
          default: false
          title: Static Only
          type: boolean
