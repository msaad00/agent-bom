info:
  description: "Security scanner for AI supply chain and infrastructure \u2014 map\
    \ the full trust chain from agents to CVEs, credentials, and blast radius."
  title: agent-bom API
  version: 0.89.2
openapi: 3.1.0
paths:
  /health:
    get:
      description: Liveness probe.
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Health
      tags:
      - meta
  /healthz:
    get:
      description: Kubernetes-style liveness probe alias for /health.
      operationId: healthz_healthz_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Healthz
      tags:
      - meta
  /livez:
    get:
      description: Kubernetes-style liveness probe alias for /health.
      operationId: liveness_livez_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Liveness
      tags:
      - meta
  /metrics:
    get:
      operationId: prometheus_metrics_metrics_get
      parameters:
      - in: header
        name: X-Agent-Bom-Role
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Role
      - in: header
        name: X-Agent-Bom-Tenant-ID
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Tenant-Id
      - in: header
        name: X-Agent-Bom-Proxy-Secret
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Agent-Bom-Proxy-Secret
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Prometheus Metrics
      tags:
      - observability
  /ping:
    get:
      description: Minimal ping endpoint for load balancers and smoke checks.
      operationId: ping_ping_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Ping Ping Get
                type: object
          description: Successful Response
      summary: Ping
      tags:
      - meta
  /readyz:
    get:
      description: "Readiness probe \u2014 returns 503 once graceful shutdown has\
        \ started.\n\nKubernetes removes the pod from the service endpoint list on\
        \ first 503,\nso new requests stop arriving while in-flight work drains under\
        \ the\noperator-configured drain budget (AGENT_BOM_SHUTDOWN_DRAIN_SECONDS)."
      operationId: readiness_readyz_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Readiness
      tags:
      - meta
  /scim/v2/Bulk:
    post:
      operationId: scim_bulk_scim_v2_Bulk_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Body
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Scim Bulk Scim V2 Bulk Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Scim Bulk
