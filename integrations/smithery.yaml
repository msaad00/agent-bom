runtime: "python"
startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties:
      nvdApiKey:
        type: string
        title: NVD API Key
        description: "Optional. Increases NVD CVSS enrichment rate limit from 5/30s to 50/30s. Free at https://nvd.nist.gov/developers/request-an-api-key"
      clickhouseUrl:
        type: string
        title: ClickHouse URL
        description: "Optional. HTTP URL for ClickHouse analytics backend (e.g. http://localhost:8123). Enables vuln trend storage and posture tracking."
      snykToken:
        type: string
        title: Snyk Token
        description: "Optional. Snyk API token for additional vulnerability enrichment."
  commandFunction: |-
    config => ({
      command: 'uvx',
      args: ['agent-bom[mcp-server]', 'mcp', 'server'],
      env: {
        ...(config.nvdApiKey ? { NVD_API_KEY: config.nvdApiKey } : {}),
        ...(config.clickhouseUrl ? { AGENT_BOM_CLICKHOUSE_URL: config.clickhouseUrl } : {}),
        ...(config.snykToken ? { SNYK_TOKEN: config.snykToken } : {})
      }
    })
