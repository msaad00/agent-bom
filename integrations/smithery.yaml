# Smithery listing metadata. Keep this aligned with integrations/glama/server.json
# and pyproject.toml so the next successful deploy carries current information.
# The startCommand / configSchema / commandFunction block below is the runtime
# contract Smithery executes — do not change its shape.
name: agent-bom
description: "Open security scanner and self-hosted control plane for AI/MCP infrastructure — agents, MCP servers, runtime, and blast radius. Exposes 70 MCP tools for scanning, compliance, and graph analysis."
homepage: "https://github.com/msaad00/agent-bom"

runtime: "python"
startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties:
      nvdApiKey:
        type: string
        title: NVD API Key
        description: "Optional. Increases NVD CVSS enrichment rate limit from 5/30s to 50/30s. Free at https://nvd.nist.gov/developers/request-an-api-key"
      clickhouseUrl:
        type: string
        title: ClickHouse URL
        description: "Optional. HTTP URL for ClickHouse analytics backend (e.g. http://localhost:8123). Enables vuln trend storage and posture tracking."
  commandFunction:
    type: python
    module: agent_bom.mcp_server
    function: create_smithery_server
